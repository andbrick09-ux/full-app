<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#080c14"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Dom Sub Hub — Training</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="nav.css"/>
  <style>
    .menu-card.locked {
      opacity: 0.45;
      cursor: default;
      position: relative;
      filter: grayscale(0.4);
    }
    .menu-card.locked::after {
      content: 'Locked by Sir';
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold, #D4AF37);
      opacity: 0.6;
    }
    .progress-bar {
      height: 6px;
      background: rgba(212,175,55,0.2);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      transition: width 0.3s ease;
    }
    .training-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }
    .assign-btn {
      margin-top: 10px;
      padding: 6px 14px;
      font-size: 10px;
      font-weight: 700;
      border-radius: 999px;
      border: 1px solid var(--gold);
      color: var(--gold);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    .assign-btn:hover {
      background: var(--gold);
      color: #080c14;
    }
  </style>
</head>
<body data-nav="training">

  <div class="topbar">
    <div class="topbar-center">
      <div class="topbar-title">Dom Sub Hub</div>
      <div class="topbar-sub">Discipline Through Devotion</div>
    </div>
  </div>

  <div class="main">
    <div class="menu-grid" id="trainingGrid">
      <!-- Populated by JavaScript -->
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { requireAuth, getMyProfile, dataRef, partnerDataRef } from './auth.js';
    import { getDoc, setDoc, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const trainings = [
      { id: 'the-5', name: 'The "5" Training', icon: '🖐️', desc: 'Classical conditioning protocol to cum on Sir\'s command.' },
      { id: 'anal-plug', name: 'Anal Plug Training', icon: '💎', desc: 'Progressive size and duration training program.' },
      { id: 'deepthroat', name: 'Deep Throat Training', icon: '👄', desc: 'Step-by-step depth and endurance conditioning.' },
      { id: 'kegel', name: 'Kegel Training', icon: '🔐', desc: 'Pelvic floor strengthening routines.' },
      { id: 'positions', name: 'Position Training', icon: '🧎‍♀️', desc: '12 submissive positions with mastery tracking.' },
      { id: 'heel', name: 'Heel Training', icon: '👠', desc: 'Progressive heel height and endurance protocol.' }
    ];

    async function renderTrainingMenu() {
      await requireAuth();
      const profile = await getMyProfile();
      const isDom = profile?.role === 'dom';
      const grid = document.getElementById('trainingGrid');
      grid.innerHTML = '';

      for (const t of trainings) {
        const card = document.createElement('div');
        card.className = 'menu-card';

        let progress = 0;
        let isAssigned = false;
        let assignedData = {};

        // Check if this training is assigned to the sub
        try {
          let ref;
          if (isDom) {
            // Dom checks the partner's (sub's) training document
            const partnerRef = await partnerDataRef(`training/${t.id}`);
            const snap = await getDoc(partnerRef);
            if (snap.exists()) {
              isAssigned = true;
              assignedData = snap.data();
              progress = assignedData.progress || 0;
            }
          } else {
            // Sub checks their own training document
            const snap = await getDoc(dataRef(`training/${t.id}`));
            if (snap.exists()) {
              isAssigned = true;
              assignedData = snap.data();
              progress = assignedData.progress || 0;
            }
          }
        } catch (e) {
          console.log(`Error checking training ${t.id}`);
        }

        let html = `
          <span class="menu-card-icon">${t.icon}</span>
          <span class="menu-card-title">${t.name}</span>
          <span class="menu-card-desc">${t.desc}</span>
        `;

        if (isDom) {
          // DOM VIEW
          html += `
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${progress}%"></div>
            </div>
            <div class="training-meta">
              ${isAssigned ? `Progress: ${progress}%` : 'Not assigned yet'}
            </div>
          `;

          if (isAssigned) {
            html += `<button class="assign-btn" onclick="unassignTraining('${t.id}', this)">Unassign</button>`;
          } else {
            html += `<button class="assign-btn" onclick="assignTraining('${t.id}', this)">Assign to Sub</button>`;
          }

          card.innerHTML = html;
          // Dom can always click to view the training (no locks for Dom)
          card.onclick = () => {
            window.location.href = `${t.id}-training.html`;
          };

        } else {
          // SUB VIEW
          if (!isAssigned) {
            card.classList.add('locked');
            card.onclick = (e) => {
              e.preventDefault();
              const toast = document.getElementById('toast');
              if (toast) {
                toast.textContent = 'Locked by Sir';
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
              }
            };
          } else {
            card.onclick = () => window.location.href = `${t.id}-training.html`;
          }

          html += `
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${progress}%"></div>
            </div>
            <div class="training-meta">Progress: ${progress}%</div>
          `;

          card.innerHTML = html;
        }

        grid.appendChild(card);
      }
    }

    // Assign training (Dom only) - with due date and note
    window.assignTraining = async function(trainingId, btn) {
      const dueDate = prompt("Optional due date (YYYY-MM-DD) or leave blank:");
      const note = prompt("Optional note to your sub (or leave blank):");

      btn.disabled = true;
      btn.textContent = 'Assigning...';

      try {
        const ref = await partnerDataRef(`training/${trainingId}`);
        await setDoc(ref, {
          progress: 0,
          assignedBy: (await requireAuth()).uid,
          assignedAt: serverTimestamp(),
          dueDate: dueDate || null,
          noteFromSir: note || null,
          status: 'assigned'
        }, { merge: true });

        btn.textContent = 'Unassign';
        btn.onclick = () => unassignTraining(trainingId, btn);
        showToast('Training assigned successfully');
        
        // Refresh the menu
        setTimeout(() => renderTrainingMenu(), 800);
      } catch (e) {
        console.error(e);
        showToast('Failed to assign training');
        btn.textContent = 'Assign to Sub';
        btn.disabled = false;
      }
    };

    // Unassign training (Dom only)
    window.unassignTraining = async function(trainingId, btn) {
      if (!confirm('Unassign this training from your sub?')) return;

      btn.disabled = true;
      btn.textContent = 'Removing...';

      try {
        const ref = await partnerDataRef(`training/${trainingId}`);
        await deleteDoc(ref);
        btn.textContent = 'Assign to Sub';
        btn.onclick = () => assignTraining(trainingId, btn);
        showToast('Training unassigned');
        
        // Refresh the menu
        setTimeout(() => renderTrainingMenu(), 800);
      } catch (e) {
        console.error(e);
        showToast('Failed to unassign');
        btn.textContent = 'Unassign';
        btn.disabled = false;
      }
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      if (t) {
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
      }
    }

    renderTrainingMenu();
  </script>

  <script src="nav.js"></script>
</body>
</html>
