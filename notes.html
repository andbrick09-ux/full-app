<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#051024" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Notes • Dom Sub Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* ── Safe body ── */
    body { min-height: 100dvh; overflow-x: hidden; }

    /* ── Ambient glow (matches index) ── */
    .glow-orb {
      position: fixed; width: 460px; height: 460px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.07) 0%, transparent 70%);
      top: -120px; left: 50%; transform: translateX(-50%);
      pointer-events: none; z-index: 0;
      animation: orbFloat 8s ease-in-out infinite;
    }
    @keyframes orbFloat {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(28px); }
    }

    /* ── Page container ── */
    .page-wrap {
      position: relative; z-index: 1;
      max-width: 600px; margin: 0 auto;
      padding: 20px 20px calc(120px + var(--safe-b));
    }

    /* ── Page heading strip ── */
    .page-hero {
      text-align: center;
      padding: 18px 0 10px;
      animation: fadeUp 0.4s ease both;
    }
    .page-eyebrow {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 4px; color: var(--gold); opacity: 0.45; margin-bottom: 4px;
    }
    .page-title {
      font-family: 'Great Vibes', cursive; font-size: clamp(38px,11vw,56px);
      background: linear-gradient(135deg,#D4AF37 0%,#F5E6A3 40%,#D4AF37 70%,#c9a227 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; margin: 0; line-height: 1.1;
      animation: shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 0% center; }
      50%  { background-position: 100% center; }
      100% { background-position: 0% center; }
    }

    /* ── Ornament divider ── */
    .ornament-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 10px 0 20px;
      animation: fadeUp 0.4s ease 0.05s both;
    }
    .ornament-line { flex:1; height:1px; background: linear-gradient(to right, transparent, rgba(212,175,55,0.2), transparent); }
    .ornament-icon { color: var(--gold); font-size: 13px; opacity: 0.4; }

    /* ── Search ── */
    .search-wrap {
      position: relative; margin-bottom: 14px;
      animation: fadeUp 0.4s ease 0.08s both;
    }
    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: rgba(212,175,55,0.4); font-size: 18px; pointer-events: none;
    }
    .search-input {
      width: 100%; background: var(--glass2);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 14px 16px 14px 44px;
      color: #ddd; font-family: 'Montserrat', sans-serif; font-size: 13px;
      font-weight: 400; outline: none; transition: border-color 0.25s, box-shadow 0.25s;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.2); }
    .search-input:focus {
      border-color: rgba(212,175,55,0.4);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.08);
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 14px;
      animation: fadeUp 0.4s ease 0.12s both;
    }
    .filter-btn {
      flex: 1; padding: 10px 8px; border-radius: 25px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: #888; font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .filter-btn.active {
      background: var(--luxury-gradient); color: var(--midnight);
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(212,175,55,0.3);
    }

    /* ── Sort + Export row ── */
    .controls-row {
      display: flex; gap: 10px; margin-bottom: 20px;
      animation: fadeUp 0.4s ease 0.15s both;
    }
    .sort-select {
      flex: 1; background: var(--glass2); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 16px;
      color: #bbb; font-family: 'Montserrat', sans-serif; font-size: 11px;
      font-weight: 500; outline: none; cursor: pointer;
    }
    .export-btn {
      padding: 0 20px; border-radius: 14px;
      background: transparent; border: 1px solid var(--border);
      color: rgba(212,175,55,0.6);
      font-family: 'Montserrat', sans-serif; font-size: 9px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .export-btn:hover { border-color: var(--gold); color: var(--gold); }
    .export-btn:active { transform: scale(0.96); }

    /* ── Section label ── */
    .notes-section-label {
      font-size: 8px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 3px; color: #444; margin-bottom: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .notes-section-label::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05);
    }

    /* ── Note cards ── */
    #notes-list { display: flex; flex-direction: column; gap: 12px; }

    .note-card {
      position: relative; overflow: hidden;
      background: var(--glass2); backdrop-filter: blur(14px);
      border: 1px solid var(--border); border-radius: 18px;
      padding: 18px 18px 18px 24px;
      cursor: pointer; transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      opacity: 0; animation: cardSlideIn 0.5s ease forwards;
    }
    .note-card:hover {
      border-color: rgba(212,175,55,0.35);
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.55), 0 0 16px rgba(212,175,55,0.07);
    }
    .note-card:active { transform: translateY(0) scale(0.98); }

    /* Colored left accent bar */
    .note-accent {
      position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      border-radius: 18px 0 0 18px;
    }
    .accent-gold   { background: var(--luxury-gradient); }
    .accent-rose   { background: linear-gradient(180deg,#F44336,#FF6B6B); }
    .accent-blue   { background: linear-gradient(180deg,#64B5F6,#42A5F5); }
    .accent-purple { background: linear-gradient(180deg,#BA68C8,#9C27B0); }
    .accent-green  { background: linear-gradient(180deg,#4CAF50,#66BB6A); }

    /* Top bar: title + badges */
    .note-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 10px; margin-bottom: 8px;
    }
    .note-title {
      font-family: 'Playfair Display', serif;
      font-size: 15px; font-weight: 600; color: var(--gold); line-height: 1.3;
      flex: 1; min-width: 0;
    }
    .note-badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
    .note-badge {
      font-size: 8px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; padding: 3px 9px; border-radius: 20px;
    }
    .badge-private  { background: rgba(212,175,55,0.1); color: var(--gold); border: 1px solid rgba(212,175,55,0.2); }
    .badge-shared   { background: rgba(100,181,246,0.1); color: #64B5F6; border: 1px solid rgba(100,181,246,0.2); }
    .badge-archived { background: rgba(255,255,255,0.06); color: #666; border: 1px solid rgba(255,255,255,0.08); }

    /* Body text */
    .note-body {
      font-size: 12px; font-weight: 300; color: #999;
      line-height: 1.65; white-space: pre-wrap;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Footer: tags + date */
    .note-footer {
      display: flex; align-items: center; gap: 8px; margin-top: 12px;
      flex-wrap: wrap;
    }
    .note-tag {
      font-size: 8px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; padding: 3px 10px; border-radius: 20px;
      color: var(--midnight);
    }
    .note-date {
      margin-left: auto; font-size: 9px; color: #555; letter-spacing: 0.5px;
      font-family: 'Playfair Display', serif; font-style: italic;
    }

    /* Stagger card animations */
    .note-card:nth-child(1) { animation-delay: 0.05s; }
    .note-card:nth-child(2) { animation-delay: 0.12s; }
    .note-card:nth-child(3) { animation-delay: 0.19s; }
    .note-card:nth-child(4) { animation-delay: 0.26s; }
    .note-card:nth-child(5) { animation-delay: 0.33s; }
    .note-card:nth-child(6) { animation-delay: 0.40s; }
    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Empty state ── */
    #empty-state {
      display: none; text-align: center; padding: 60px 24px;
      background: var(--glass2); border: 1px solid var(--border);
      border-radius: 20px; margin-top: 8px;
    }
    .empty-ornament { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.4; }
    .empty-title {
      font-family: 'Playfair Display', serif; font-size: 18px;
      color: var(--gold); margin-bottom: 8px; font-style: italic;
    }
    .empty-sub { font-size: 11px; color: #555; letter-spacing: 0.5px; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: calc(24px + var(--safe-b)); right: 22px;
      width: 58px; height: 58px; border-radius: 50%;
      background: var(--luxury-gradient); color: var(--midnight);
      border: none; font-size: 26px; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 90;
      box-shadow: 0 8px 24px rgba(212,175,55,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab:hover { transform: scale(1.06); box-shadow: 0 12px 32px rgba(212,175,55,0.55); }
    .fab:active { transform: scale(0.94); }

    /* ── Modal overlay ── */
    .modal-back {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.82); backdrop-filter: blur(10px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-back.open { opacity: 1; pointer-events: all; }

    .modal-sheet {
      background: rgba(5,16,36,0.97); backdrop-filter: blur(24px);
      border: 1px solid var(--border); border-radius: 28px 28px 0 0;
      width: 100%; max-width: 600px;
      padding: 0 22px calc(28px + var(--safe-b));
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.22,0.68,0,1.2);
      max-height: 92vh; overflow-y: auto;
    }
    .modal-back.open .modal-sheet { transform: translateY(0); }

    .modal-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.1); margin: 14px auto 20px;
    }
    .modal-heading {
      font-family: 'Great Vibes', cursive; font-size: 32px;
      background: var(--luxury-gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .modal-subheading {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 3px; color: rgba(212,175,55,0.4); margin-bottom: 22px;
    }

    /* Modal inputs */
    .field-label {
      font-size: 8px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: rgba(212,175,55,0.5); margin-bottom: 8px; display: block;
    }
    .field-input, .field-textarea, .field-select {
      width: 100%; background: var(--glass2);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 13px 16px; color: #ddd;
      font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 400;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 18px;
    }
    .field-textarea { min-height: 110px; resize: vertical; line-height: 1.6; }
    .field-input:focus, .field-textarea:focus, .field-select:focus {
      border-color: rgba(212,175,55,0.4);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.07);
    }
    .field-input::placeholder, .field-textarea::placeholder { color: rgba(255,255,255,0.18); }

    /* Tag accent picker */
    .accent-picker { display: flex; gap: 10px; margin-bottom: 20px; }
    .accent-dot {
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all 0.2s;
      flex-shrink: 0;
    }
    .accent-dot.selected { border-color: rgba(255,255,255,0.6); transform: scale(1.18); }

    /* Visibility toggle */
    .vis-toggle { display: flex; gap: 8px; margin-bottom: 22px; }
    .vis-btn {
      flex: 1; padding: 10px; border-radius: 25px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      color: #777; font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
    }
    .vis-btn.active {
      background: rgba(212,175,55,0.12); border-color: rgba(212,175,55,0.35);
      color: var(--gold);
    }

    /* Modal action row */
    .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
    .modal-cancel {
      flex: 1; padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03); color: #666;
      font-family: 'Montserrat', sans-serif; font-size: 10px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer;
      transition: all 0.2s;
    }
    .modal-save {
      flex: 2; padding: 14px; border-radius: 14px; border: none;
      background: var(--luxury-gradient); color: var(--midnight);
      font-family: 'Montserrat', sans-serif; font-size: 10px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer;
      box-shadow: 0 6px 20px rgba(212,175,55,0.25); transition: all 0.2s;
    }
    .modal-save:active { transform: scale(0.97); }
    .modal-cancel:active { transform: scale(0.97); }

    /* ── View note modal ── */
    .view-modal-back {
      position: fixed; inset: 0; z-index: 310;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
      padding: 20px;
    }
    .view-modal-back.open { opacity: 1; pointer-events: all; }
    .view-modal-card {
      background: rgba(5,16,36,0.97); border: 1px solid var(--border);
      border-radius: 24px; width: 100%; max-width: 480px; max-height: 82vh;
      overflow-y: auto; padding: 28px 24px calc(24px + var(--safe-b));
      transform: scale(0.9) translateY(16px);
      transition: transform 0.35s cubic-bezier(0.22,0.68,0,1.2);
      position: relative;
    }
    .view-modal-back.open .view-modal-card { transform: scale(1) translateY(0); }
    .view-top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .view-close-btn {
      width: 34px; height: 34px; border-radius: 10px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07);
      color: #888; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .view-close-btn:hover { background: rgba(212,175,55,0.08); color: var(--gold); border-color: rgba(212,175,55,0.2); }
    .view-note-title {
      font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600;
      color: var(--gold); margin-bottom: 12px; line-height: 1.3;
    }
    .view-note-meta {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: #555; margin-bottom: 18px;
    }
    .view-note-body {
      font-size: 13px; font-weight: 300; color: #bbb; line-height: 1.85;
      white-space: pre-wrap; margin-bottom: 22px;
    }
    .view-note-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .view-actions { display: flex; gap: 8px; margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.05); }
    .view-edit-btn {
      flex: 1; padding: 12px; border-radius: 12px;
      background: var(--luxury-gradient); color: var(--midnight); border: none;
      font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s;
    }
    .view-delete-btn {
      padding: 12px 16px; border-radius: 12px;
      background: rgba(244,67,54,0.07); border: 1px solid rgba(244,67,54,0.2);
      color: #F44336;
      font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s;
    }
    .view-edit-btn:active, .view-delete-btn:active { transform: scale(0.97); }

    /* ── Note count badge ── */
    .note-count {
      font-size: 10px; font-weight: 700; color: #555;
      letter-spacing: 1px; text-align: right; margin-bottom: 14px;
      font-family: 'Playfair Display', serif; font-style: italic;
    }
  </style>
</head>

<body>
  <div class="glow-orb"></div>

  <!-- Topbar -->
  <div class="topbar">
    <a href="index.html" class="back-btn" aria-label="Back">
      <span class="material-symbols-rounded">arrow_back</span>
    </a>
    <div class="topbar-center">
      <div class="topbar-title">Notes</div>
      <div class="topbar-sub">Our Thoughts</div>
    </div>
  </div>

  <!-- Main -->
  <div class="page-wrap">

    <!-- Hero -->
    <div class="page-hero">
      <div class="page-eyebrow">Dom Sub Hub</div>
      <h1 class="page-title">Notes</h1>
    </div>

    <div class="ornament-divider">
      <div class="ornament-line"></div>
      <span class="ornament-icon">❦</span>
      <div class="ornament-line"></div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="material-symbols-rounded search-icon">search</span>
      <input id="search-input" class="search-input" type="text" placeholder="Search notes…" oninput="renderNotes()" />
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <button class="filter-btn active" id="filter-all"      onclick="setFilter('all')">All</button>
      <button class="filter-btn"        id="filter-shared"   onclick="setFilter('shared')">Shared</button>
      <button class="filter-btn"        id="filter-private"  onclick="setFilter('private')">Private</button>
      <button class="filter-btn"        id="filter-archived" onclick="setFilter('archived')">Archived</button>
    </div>

    <!-- Sort + Export -->
    <div class="controls-row">
      <select id="sort-select" class="sort-select" onchange="renderNotes()">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="az">A – Z</option>
        <option value="za">Z – A</option>
      </select>
      <button class="export-btn" onclick="exportNotes()">Export ↗</button>
    </div>

    <!-- Count -->
    <div class="note-count" id="note-count"></div>

    <!-- Section label -->
    <div class="notes-section-label">Your Notes</div>

    <!-- Notes list -->
    <div id="notes-list"></div>

    <!-- Empty state -->
    <div id="empty-state">
      <div class="empty-ornament">✦</div>
      <div class="empty-title">No notes found</div>
      <div class="empty-sub">Try a different filter, or tap + to create one.</div>
    </div>

  </div>

  <!-- FAB -->
  <button class="fab" onclick="openNewNoteModal()" aria-label="New note">+</button>

  <!-- ══ New / Edit Note Modal ══ -->
  <div id="note-modal" class="modal-back" onclick="handleModalBackdropClick(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>

      <div class="modal-heading" id="modal-heading">New Note</div>
      <div class="modal-subheading" id="modal-subheading">Add to your note</div>

      <label class="field-label">Title</label>
      <input id="note-title-input" class="field-input" type="text" placeholder="Note heading…" />

      <label class="field-label">Content</label>
      <textarea id="note-body-input" class="field-textarea" placeholder="Write your thoughts here…"></textarea>

      <label class="field-label">Tags (comma-separated)</label>
      <input id="note-tags-input" class="field-input" type="text" placeholder="e.g. scene, reflection, rule" />

      <label class="field-label">Accent Colour</label>
      <div class="accent-picker" id="accent-picker">
        <div class="accent-dot accent-gold selected"   data-accent="gold"   style="background:linear-gradient(135deg,#D4AF37,#F5E6A3);" onclick="selectAccent(this,'gold')"></div>
        <div class="accent-dot accent-rose"            data-accent="rose"   style="background:linear-gradient(135deg,#F44336,#FF6B6B);" onclick="selectAccent(this,'rose')"></div>
        <div class="accent-dot accent-blue"            data-accent="blue"   style="background:linear-gradient(135deg,#64B5F6,#42A5F5);" onclick="selectAccent(this,'blue')"></div>
        <div class="accent-dot accent-purple"          data-accent="purple" style="background:linear-gradient(135deg,#BA68C8,#9C27B0);" onclick="selectAccent(this,'purple')"></div>
        <div class="accent-dot accent-green"           data-accent="green"  style="background:linear-gradient(135deg,#4CAF50,#66BB6A);" onclick="selectAccent(this,'green')"></div>
      </div>

      <label class="field-label">Visibility</label>
      <div class="vis-toggle">
        <button class="vis-btn active" id="vis-private"  onclick="setVisibility('private')">🔒 Private</button>
        <button class="vis-btn"        id="vis-shared"   onclick="setVisibility('shared')">🔗 Shared</button>
        <button class="vis-btn"        id="vis-archived" onclick="setVisibility('archived')">📦 Archived</button>
      </div>

      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-save"   onclick="saveNote()">Save Note</button>
      </div>
    </div>
  </div>

  <!-- ══ View Note Modal ══ -->
  <div id="view-modal" class="view-modal-back" onclick="handleViewBackdropClick(event)">
    <div class="view-modal-card">
      <div class="view-top-bar">
        <div class="view-note-badges" id="view-badges"></div>
        <button class="view-close-btn" onclick="closeViewModal()">✕</button>
      </div>
      <div class="view-note-title" id="view-title"></div>
      <div class="view-note-meta"  id="view-meta"></div>
      <div class="view-note-body"  id="view-body"></div>
      <div class="view-note-footer" id="view-tags"></div>
      <div class="view-actions">
        <button class="view-edit-btn"   onclick="editCurrentNote()">Edit Note</button>
        <button class="view-delete-btn" onclick="deleteCurrentNote()">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    /* ── Data store ── */
    const STORAGE_KEY = 'dsh_notes_v2';
    let notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let activeFilter = 'all';
    let selectedAccent = 'gold';
    let selectedVisibility = 'private';
    let editingId = null;
    let viewingId = null;

    /* Seed demo notes if empty */
    if (!notes.length) {
      notes = [
        { id: uid(), title: 'Scene Reflection — April', body: 'Felt deeply grounded throughout. The restraint was precise and intentional. Aftercare was perfect — the warmth and silence allowed full re-entry into myself.', tags: ['reflection','scene'], accent: 'gold', visibility: 'private', created: Date.now() - 86400000*3 },
        { id: uid(), title: 'New Rule: No Speaking Without Permission', body: 'Introduced this week during structured time. Easier than expected to maintain. The silence created a new layer of intimacy and focus.', tags: ['rule','protocol'], accent: 'purple', visibility: 'shared', created: Date.now() - 86400000 },
        { id: uid(), title: 'Wishlist — Predicament Ideas', body: 'Rope suspension\nBlindfold + sensory\nPublic collar outing\nWax play revisit', tags: ['wishlist'], accent: 'rose', visibility: 'private', created: Date.now() - 3600000 },
      ];
      persist();
    }

    /* ── Utilities ── */
    function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
    function persist() { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    /* ── Filter ── */
    function setFilter(f) {
      activeFilter = f;
      ['all','shared','private','archived'].forEach(k => {
        document.getElementById('filter-'+k).classList.toggle('active', k === f);
      });
      renderNotes();
    }

    /* ── Render ── */
    function renderNotes() {
      const q     = document.getElementById('search-input').value.toLowerCase().trim();
      const sort  = document.getElementById('sort-select').value;
      const list  = document.getElementById('notes-list');
      const empty = document.getElementById('empty-state');
      const count = document.getElementById('note-count');

      let filtered = notes.filter(n => {
        if (activeFilter !== 'all' && n.visibility !== activeFilter) return false;
        if (q && !n.title.toLowerCase().includes(q) && !n.body.toLowerCase().includes(q)) return false;
        return true;
      });

      filtered.sort((a,b) => {
        if (sort === 'newest') return b.created - a.created;
        if (sort === 'oldest') return a.created - b.created;
        if (sort === 'az')     return a.title.localeCompare(b.title);
        if (sort === 'za')     return b.title.localeCompare(a.title);
      });

      if (!filtered.length) {
        list.innerHTML = ''; empty.style.display = 'block';
        count.textContent = 'No notes'; return;
      }
      empty.style.display = 'none';
      count.textContent = filtered.length + ' note' + (filtered.length !== 1 ? 's' : '');

      list.innerHTML = filtered.map(n => noteCardHTML(n)).join('');
    }

    function noteCardHTML(n) {
      const date = new Date(n.created).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
      const visiBadge = n.visibility === 'private'  ? `<span class="note-badge badge-private">🔒 Private</span>`
                      : n.visibility === 'shared'   ? `<span class="note-badge badge-shared">🔗 Shared</span>`
                      : `<span class="note-badge badge-archived">📦 Archived</span>`;
      const tagColors = { gold:'#D4AF37', rose:'#F44336', blue:'#64B5F6', purple:'#BA68C8', green:'#4CAF50' };
      const tagBg     = (tagColors[n.accent] || '#D4AF37') + '22';
      const tagCol    = tagColors[n.accent] || '#D4AF37';
      const tagHTML   = (n.tags||[]).map(t =>
        `<span class="note-tag" style="background:${tagBg};color:${tagCol};">${t}</span>`
      ).join('');

      return `
        <div class="note-card" onclick="openViewModal('${n.id}')">
          <div class="note-accent accent-${n.accent}"></div>
          <div class="note-top">
            <div class="note-title">${escHtml(n.title)}</div>
            <div class="note-badges">${visiBadge}</div>
          </div>
          <div class="note-body">${escHtml(n.body)}</div>
          <div class="note-footer">
            ${tagHTML}
            <div class="note-date">${date}</div>
          </div>
        </div>`;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ── New note modal ── */
    function openNewNoteModal() {
      editingId = null;
      document.getElementById('modal-heading').textContent   = 'New Note';
      document.getElementById('modal-subheading').textContent = 'Add to your private record';
      document.getElementById('note-title-input').value = '';
      document.getElementById('note-body-input').value  = '';
      document.getElementById('note-tags-input').value  = '';
      selectAccent(document.querySelector('[data-accent="gold"]'), 'gold');
      setVisibility('private');
      document.getElementById('note-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('note-modal').classList.remove('open');
    }

    function handleModalBackdropClick(e) {
      if (e.target === document.getElementById('note-modal')) closeModal();
    }

    /* ── Accent / visibility ── */
    function selectAccent(el, accent) {
      selectedAccent = accent;
      document.querySelectorAll('.accent-dot').forEach(d => d.classList.remove('selected'));
      el.classList.add('selected');
    }

    function setVisibility(v) {
      selectedVisibility = v;
      ['private','shared','archived'].forEach(k => {
        document.getElementById('vis-'+k).classList.toggle('active', k === v);
      });
    }

    /* ── Save ── */
    function saveNote() {
      const title = document.getElementById('note-title-input').value.trim();
      const body  = document.getElementById('note-body-input').value.trim();
      if (!title) { showToast('Please add a title'); return; }

      const tags = document.getElementById('note-tags-input').value
        .split(',').map(t => t.trim()).filter(Boolean);

      if (editingId) {
        const idx = notes.findIndex(n => n.id === editingId);
        if (idx > -1) {
          notes[idx] = { ...notes[idx], title, body, tags, accent: selectedAccent, visibility: selectedVisibility };
        }
        showToast('Note updated');
      } else {
        notes.unshift({ id: uid(), title, body, tags, accent: selectedAccent, visibility: selectedVisibility, created: Date.now() });
        showToast('Note saved');
      }

      persist(); closeModal(); renderNotes();
    }

    /* ── View modal ── */
    function openViewModal(id) {
      const n = notes.find(n => n.id === id);
      if (!n) return;
      viewingId = id;

      const date = new Date(n.created).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
      const tagColors = { gold:'#D4AF37', rose:'#F44336', blue:'#64B5F6', purple:'#BA68C8', green:'#4CAF50' };
      const tagBg = (tagColors[n.accent]||'#D4AF37') + '22';
      const tagCol = tagColors[n.accent]||'#D4AF37';

      const visiBadge = n.visibility === 'private'  ? `<span class="note-badge badge-private">🔒 Private</span>`
                      : n.visibility === 'shared'   ? `<span class="note-badge badge-shared">🔗 Shared</span>`
                      : `<span class="note-badge badge-archived">📦 Archived</span>`;

      document.getElementById('view-badges').innerHTML = visiBadge;
      document.getElementById('view-title').textContent = n.title;
      document.getElementById('view-meta').textContent  = date;
      document.getElementById('view-body').textContent  = n.body;
      document.getElementById('view-tags').innerHTML = (n.tags||[]).map(t =>
        `<span class="note-tag" style="background:${tagBg};color:${tagCol};">${t}</span>`
      ).join('');

      document.getElementById('view-modal').classList.add('open');
    }

    function closeViewModal() {
      document.getElementById('view-modal').classList.remove('open');
      viewingId = null;
    }

    function handleViewBackdropClick(e) {
      if (e.target === document.getElementById('view-modal')) closeViewModal();
    }

    function editCurrentNote() {
      const n = notes.find(n => n.id === viewingId);
      if (!n) return;
      closeViewModal();
      editingId = n.id;
      document.getElementById('modal-heading').textContent    = 'Edit Note';
      document.getElementById('modal-subheading').textContent = 'Update your record';
      document.getElementById('note-title-input').value = n.title;
      document.getElementById('note-body-input').value  = n.body;
      document.getElementById('note-tags-input').value  = (n.tags||[]).join(', ');
      const dot = document.querySelector(`[data-accent="${n.accent}"]`);
      if (dot) selectAccent(dot, n.accent);
      setVisibility(n.visibility || 'private');
      document.getElementById('note-modal').classList.add('open');
    }

    function deleteCurrentNote() {
      if (!viewingId) return;
      notes = notes.filter(n => n.id !== viewingId);
      persist(); closeViewModal(); renderNotes();
      showToast('Note deleted');
    }

    /* ── Export ── */
    function exportNotes() {
      const data = JSON.stringify(notes, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'dsh-notes.json';
      a.click();
      showToast('Notes exported');
    }

    /* ── Init ── */
    renderNotes();
  </script>
</body>
</html>
