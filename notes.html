<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#080c14" />
<title>Notes • Dom Sub Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="nav.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;
  --gold-l:#e2c47a;
  --gold-b:rgba(201,168,76,0.2);
  --crimson:#8b2230;
  --bg:#080c14;
  --surface:#0e1420;
  --text:#f0e6d2;
  --muted:#68707f;
}
body{
  min-height:100dvh;
  background:var(--bg);
  color:var(--text);
  font-family:'Raleway',sans-serif;
  padding:20px 16px 120px;
}
.page{max-width:480px;margin:0 auto}
.header{text-align:center;margin-bottom:24px}
.app-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--gold-l);letter-spacing:3px;text-transform:uppercase}
textarea{
  width:100%;
  min-height:140px;
  background:var(--surface);
  border:1px solid var(--gold-b);
  border-radius:16px;
  padding:16px;
  color:var(--text);
  font-size:15px;
  font-family:'Raleway',sans-serif;
  resize:vertical;
}
.btn{
  width:100%;
  background:var(--gold);
  color:#080c14;
  border:none;
  padding:14px;
  font-size:15px;
  font-weight:700;
  letter-spacing:1px;
  border-radius:999px;
  margin-top:12px;
  cursor:pointer;
}
.note-list{margin-top:24px}
.note-item{
  background:var(--surface);
  border:1px solid var(--gold-b);
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:10px;
}
.note-text{font-size:14px;line-height:1.5}
.note-time{font-size:10px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="app-name">DOM SUB HUB</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px">Private Journal</div>
  </div>

  <textarea id="noteInput" placeholder="Write your thoughts, reflections, or report to Sir..."></textarea>
  <button class="btn" onclick="saveNote()">Save Note</button>

  <div class="note-list" id="noteList">
    <!-- Populated by JS -->
  </div>
</div>

<script type="module">
import { requireAuth, dataCol } from './auth.js';
import { addDoc, serverTimestamp, onSnapshot, query, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

let user = null;

async function init() {
  user = await requireAuth();
  loadNotes();
}

async function saveNote() {
  const input = document.getElementById('noteInput');
  const text = input.value.trim();
  if (!text) return;

  try {
    await addDoc(dataCol('notes'), {
      content: text,
      type: 'note',
      timestamp: serverTimestamp()
    });

    input.value = '';
    // The live listener will update the list automatically
  } catch (error) {
    alert('Error saving note: ' + error.message);
  }
}

function loadNotes() {
  const list = document.getElementById('noteList');
  const q = query(dataCol('notes'), orderBy('timestamp', 'desc'), limit(10));

  onSnapshot(q, (snap) => {
    list.innerHTML = '';
    if (snap.empty) {
      list.innerHTML = `<p style="color:var(--muted);font-size:13px;text-align:center;margin-top:20px">No notes yet. Write your first one above.</p>`;
      return;
    }
    snap.forEach(doc => {
      const n = doc.data();
      const el = document.createElement('div');
      el.className = 'note-item';
      el.innerHTML = `
        <div class="note-text">${n.content}</div>
        <div class="note-time">${n.timestamp ? new Date(n.timestamp.toDate()).toLocaleString() : 'just now'}</div>
      `;
      list.appendChild(el);
    });
  });
}

init();
</script>

<script src="nav.js"></script>
</body>
</html>
