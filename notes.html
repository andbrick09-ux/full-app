<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#051024" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Notes • Dom Sub Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Header matching screenshot */
    .page-hero {
      text-align: center; padding: 20px 0 12px;
    }
    .page-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(42px, 12vw, 58px);
      background: linear-gradient(135deg, #D4AF37, #F5E6A3, #D4AF37);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0; line-height: 1;
    }
    .page-eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: 3px;
      color: #D4AF37; opacity: 0.6; margin-bottom: 2px;
    }

    /* New Note button - big & gold like screenshot */
    .new-note-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 0 20px; height: 46px;
      background: linear-gradient(135deg, #D4AF37, #f0d060);
      color: #051024; border: none; border-radius: 9999px;
      font-family: 'Montserrat', sans-serif; font-weight: 700;
      font-size: 13px; letter-spacing: 1px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(212,175,55,0.4);
    }
    .new-note-btn:hover { transform: translateY(-1px); }
    .new-note-btn:active { transform: scale(0.96); }

    /* Rich body (bullets work) */
    .note-body {
      font-size: 14px; line-height: 1.6; color: #ccc;
      white-space: normal;
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .note-body ul, .note-body ol { padding-left: 20px; margin: 8px 0; }
    .note-body li { margin-bottom: 4px; }
  </style>

  <link rel="stylesheet" href="nav.css" />

  <!-- Quill -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
</head>

<body data-nav="more">
  <div class="glow-orb"></div>

  <!-- Hero Header (matches screenshot) -->
  <div class="page-hero">
    <div class="page-eyebrow">OUR THOUGHTS</div>
    <h1 class="page-title">Notes</h1>
  </div>

  <div class="page-wrap">

    <!-- Search -->
    <div class="search-wrap">
      <span class="material-symbols-rounded search-icon">search</span>
      <input id="search-input" class="search-input" type="text" placeholder="Search notes…" oninput="renderNotes()" />
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" id="filter-shared" onclick="setFilter('shared')">Shared</button>
      <button class="filter-btn" id="filter-private" onclick="setFilter('private')">Private</button>
      <button class="filter-btn" id="filter-archived" onclick="setFilter('archived')">Archived</button>
    </div>

    <!-- Controls + Add Note -->
    <div class="controls-row">
      <select id="sort-select" class="sort-select" onchange="renderNotes()">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="az">A – Z</option>
        <option value="za">Z – A</option>
      </select>
      <button class="new-note-btn" onclick="openNewNoteModal()">
        <span class="material-symbols-rounded">add</span>
        New Note
      </button>
    </div>

    <div class="note-count" id="note-count"></div>
    <div class="notes-section-label">Your Notes</div>

    <div id="notes-list"></div>
    <div id="empty-state">...</div>
  </div>

  <!-- Modals and rest of your existing HTML stay the same -->
  <!-- (New/Edit Modal, View Modal, Toast) -->

  <script type="module">
    // Your full script from before (imports, init, noteCardHTML with rich text, etc.)
    // ... keep everything you had in the working version ...

    function noteCardHTML(n) {
      // ... your current noteCardHTML with sanitizeHTML and rich text support ...
      // (the one that already shows bullets correctly)
    }

    // Make sure these are exposed:
    window.openNewNoteModal = openNewNoteModal;
    window.setFilter = setFilter;
    // ... other window. assignments ...

    init();
  </script>
  <script src="nav.js"></script>
</body>
</html>
