    </button>
    <button class="model-btn" data-model="grok" onclick="selectModel('grok')">

    </button>
  </div>

  <!-- PROGRESS -->
  <div style="display:flex;justify-content:center;gap:8px;margin-bottom:32px;">

    <div class="progress-dot" id="dot-3"></div>

  <div class="step-view active" id="step-0">

        <div class="section-label">Import Her Map</div>
        <div style="background:rgba(2,8,20,0.6);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px;">
          <textarea class="paste-input" id="herMapInput" placeholder="Role: Good Girl | Vibe: Dark & Intense | Bondage: Hogtie | Toys: Wand, Ferri | Impact: Flogger (Heavy) | Subspace Goal: Float & Drift..."></textarea>
        </div>
        <!-- Duration & Intention chips (same as before) -->
        <div class="question-block">
          <div class="section-label">Scene Duration</div>
          <div class="chips" id="durationChips">...</div>
          <input type="hidden" id="durationInput" value="90 minutes" />
        </div>
        <div class="question-block">
          <div class="section-label">Sir's Primary Intention</div>
          <div class="chips" id="intentionChips">...</div>
          <input type="hidden" id="intentionInput" value="Psychological control and dominance" />
        </div>
        <div style="display:flex;gap:12px;margin-top:24px">
          <button class="btn btn-ghost" onclick="goToStep(1)">Skip → Build Freely</button>
          <button class="btn btn-gold" onclick="goToStep(1)">Next</button>
        </div>
      </div>
    </div>
  </div>
