<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Becca's Sirende</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --midnight: #051024;
            --gold: #d4af37;
            --luxury-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #b38728 100%);
            --border: rgba(212, 175, 55, 0.35);
        }

        /* Full-screen setup with your signature grid background */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--midnight);
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        #splash-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        /* Background Video */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Overlay Branding */
        header {
            position: absolute;
            top: 12%; 
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .app-title {
            font-family: 'Great Vibes', cursive;
            font-size: 48px;
            background: var(--luxury-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            padding-bottom: 5px;
            letter-spacing: 1px;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.6));
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: -5px;
            opacity: 0.9;
        }

        /* Branded Enter/Skip Button */
        .enter-btn {
            position: absolute;
            bottom: 50px;
            width: 80%;
            max-width: 300px;
            background: var(--luxury-gradient);
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: #051024;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
            z-index: 100;
            text-decoration: none;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .enter-btn:active {
            transform: scale(0.95);
        }

        .fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="splash-container">
        <header>
            <h1 class="app-title">Becca's Sirender</h1>
            <div class="subtitle">Selecting Her Path: A Journey in Submission</div>
        </header>

        <video id="splash-video" autoplay muted playsinline>
            <source src="https://andbrick09-ux.github.io/full-app/intro.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    
    </div>

    <script>
        const video = document.getElementById('splash-video');
        const container = document.getElementById('splash-container');
        const destination = "https://andbrick09-ux.github.io/full-app/home.html";

        function navigate() {
            container.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = destination;
            }, 800);
        }

        // Redirect when video ends
        video.onended = navigate;

        // Fallback: Redirect if video fails or hangs
        setTimeout(navigate, 8500); 
    </script>

</body>
</Motionnn
