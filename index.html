<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#080c14" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="description" content="Dom Sub Hub — A private protocol app for training, assessments, and scenes." />
<title>Dom Sub Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="icon-512.png" />
<link rel="stylesheet" href="nav.css" />

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --gold:#c9a84c;
  --gold-l:#e2c47a;
  --gold-dim:rgba(201,168,76,0.11);
  --gold-b:rgba(201,168,76,0.2);
  --gold-glow:rgba(201,168,76,0.45);
  --crimson:#8b2230;
  --bg:#080c14;
  --surface:#0e1420;
  --text:#f0e6d2;
  --muted:#68707f;
  --muted2:#939aaa;
  --safe-t:env(safe-area-inset-top,0px);
}

html{height:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100dvh;
  background:var(--bg);
  color:var(--text);
  font-family:'Raleway',sans-serif;
  overflow-x:hidden;
}

/* orbs */
.orb{position:fixed;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.055) 0%,transparent 68%);top:-180px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:0;animation:floatA 9s ease-in-out infinite}
.orb2{position:fixed;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(139,34,48,0.045) 0%,transparent 70%);bottom:120px;right:-60px;pointer-events:none;z-index:0;animation:floatB 11s ease-in-out infinite}
@keyframes floatA{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(22px)}}
@keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}

/* page */
.page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 8px}

/* header */
.hdr{text-align:center;padding-top:max(var(--safe-t),28px);padding-bottom:16px;border-bottom:1px solid var(--gold-b);margin-bottom:6px}
.app-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--gold-l);letter-spacing:3px;text-transform:uppercase;display:block;animation:fadeD .5s ease both}
.app-sub{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);display:block;margin-top:3px;animation:fadeD .5s .08s ease both}

@keyframes fadeD{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeU{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;margin-top:18px;animation:fadeU .5s .18s ease both}
.card{background:var(--surface);border:1px solid var(--gold-b);border-radius:22px;padding:18px 16px 15px;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(--gold) 50%,transparent 95%);opacity:.28}
.card.wide{grid-column:1/-1}
.card.accent::after{background:linear-gradient(90deg,transparent 5%,var(--crimson) 50%,transparent 95%);opacity:.55}
.card-val{font-family:'Playfair Display',serif;font-size:38px;color:var(--gold-l);line-height:1;display:block;letter-spacing:-.5px}
.card.accent .card-val{color:#e07585}
.card-lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);display:block;margin-top:6px;font-weight:600}

/* week dots */
.week-row{display:flex;gap:7px;margin-top:13px;align-items:center}
.wdot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;letter-spacing:.3px;border:1px solid rgba(255,255,255,0.07);color:var(--muted);cursor:pointer;transition:background .2s,border-color .2s,box-shadow .2s,transform .15s;flex-shrink:0;-webkit-tap-highlight-color:transparent;font-family:'Raleway',sans-serif;user-select:none}
.wdot:active{transform:scale(.9)}
.wdot.done{background:var(--gold);color:#06090f;border-color:transparent;box-shadow:0 0 14px var(--gold-glow)}
.wdot.today{border-color:var(--gold);color:var(--gold)}
.wdot.future{opacity:.28;cursor:default;pointer-events:none}

/* section label */
.sec-lbl{font-size:9px;letter-spacing:3.5px;text-transform:uppercase;color:var(--muted);margin:20px 0 11px 2px;font-weight:600;display:flex;align-items:center;gap:10px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--gold-b)}

/* quick grid */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;animation:fadeU .5s .26s ease both}
.qbtn{background:var(--surface);border:1px solid var(--gold-b);border-radius:20px;padding:17px 8px 14px;text-align:center;cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;gap:8px;transition:border-color .2s,transform .18s,box-shadow .2s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
.qbtn::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .2s}
.qbtn:hover{border-color:rgba(201,168,76,.5);box-shadow:0 4px 24px rgba(201,168,76,.07);transform:translateY(-2px)}
.qbtn:hover::before{opacity:.5}
.qbtn:active{transform:scale(.97)}
.qi{font-size:26px;display:block}
.ql{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;line-height:1.25;font-family:'Raleway',sans-serif}

/* scenes list */
.scenes-list{display:flex;flex-direction:column;gap:9px;animation:fadeU .5s .34s ease both}
.srow{background:var(--surface);border:1px solid var(--gold-b);border-radius:18px;padding:13px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;text-decoration:none;color:inherit;transition:border-color .2s,transform .15s;-webkit-tap-highlight-color:transparent}
.srow:hover{border-color:rgba(201,168,76,.45);transform:translateX(2px)}
.srow:active{transform:scale(.99)}
.sico{width:42px;height:42px;border-radius:13px;background:var(--gold-dim);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sname{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold-l);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smeta{font-size:10px;color:var(--muted);margin-top:2px;display:block;letter-spacing:.5px}
.sstars{margin-left:auto;color:var(--gold);font-size:11px;flex-shrink:0;letter-spacing:1px}
.empty{background:var(--surface);border:1px dashed rgba(201,168,76,.18);border-radius:18px;padding:28px 20px;text-align:center}
.empty p{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--muted);line-height:1.6}
.empty a{display:inline-block;margin-top:14px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);text-decoration:none;border:1px solid var(--gold-b);border-radius:20px;padding:9px 20px;font-weight:600;font-family:'Raleway',sans-serif;transition:background .2s,border-color .2s}
.empty a:hover{background:var(--gold-dim);border-color:var(--gold)}
</style>
</head>

<body data-nav="home">

<div class="orb"></div>
<div class="orb2"></div>

<div class="page">

  <!-- Header -->
  <header class="hdr">
    <span class="app-name">Dom Sub Hub</span>
    <span class="app-sub">Devotion through discipline</span>
  </header>

  <!-- Stats -->
  <div class="stat-grid">
    <div class="card">
      <span class="card-val" id="streakVal">0</span>
      <span class="card-lbl">Day Streak</span>
    </div>
    <div class="card accent">
      <span class="card-val" id="compVal">—</span>
      <span class="card-lbl">Compliance</span>
    </div>
    <div class="card wide">
      <span class="card-lbl" style="margin-bottom:10px">This Week</span>
      <div class="week-row" id="weekRow"></div>
    </div>
    <div class="card">
      <span class="card-val" id="scenesVal">0</span>
      <span class="card-lbl">Scenes Saved</span>
    </div>
    <div class="card">
      <span class="card-val">5</span>
      <span class="card-lbl">Programs Active</span>
    </div>
  </div>

  <!-- Quick Access -->
  <div class="sec-lbl">Quick Access</div>
  <div class="quick-grid">
    <a href="scene-menu.html" class="qbtn">
      <span class="qi">🎭</span><span class="ql">New Scene</span>
    </a>
    <a href="training-menu.html" class="qbtn">
      <span class="qi">🏆</span><span class="ql">Training</span>
    </a>
    <a href="bdsm-checklist.html" class="qbtn">
      <span class="qi">📋</span><span class="ql">Checklist</span>
    </a>
  </div>

  <!-- Recent Scenes -->
  <div class="sec-lbl">Recent Scenes</div>
  <div class="scenes-list" id="scenesList"></div>

</div>

<script>
'use strict';

/* ── Week tracker ── */
(function(){
  var LABELS=['M','T','W','T','F','S','S'];
  var today=new Date(); today.setHours(0,0,0,0);
  var dow=today.getDay();
  var mon=new Date(today); mon.setDate(today.getDate()-((dow+6)%7));
  var KEY='dsh_week_done';
  var saved=[];
  try{saved=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){}
  var cut=new Date(today); cut.setDate(today.getDate()-14);
  saved=saved.filter(function(d){return new Date(d)>=cut;});

  var row=document.getElementById('weekRow');
  for(var i=0;i<7;i++){
    var day=new Date(mon); day.setDate(mon.getDate()+i);
    var iso=day.toISOString().slice(0,10);
    var isToday=day.getTime()===today.getTime();
    var isFuture=day>today;
    var isDone=saved.indexOf(iso)!==-1;
    var dot=document.createElement('div');
    dot.className='wdot';
    dot.textContent=LABELS[i];
    dot.dataset.iso=iso;
    if(isDone)dot.classList.add('done');
    else if(isToday)dot.classList.add('today');
    else if(isFuture)dot.classList.add('future');
    if(!isFuture){
      dot.addEventListener('click',function(){
        var d=this.dataset.iso;
        var idx=saved.indexOf(d);
        if(idx===-1){saved.push(d);this.classList.add('done');this.classList.remove('today');}
        else{saved.splice(idx,1);this.classList.remove('done');
          if(d===new Date().toISOString().slice(0,10))this.classList.add('today');}
        try{localStorage.setItem(KEY,JSON.stringify(saved));}catch(e){}
        recalc(saved,mon,today);
      });
    }
    row.appendChild(dot);
  }
  recalc(saved,mon,today);
})();

function recalc(saved,mon,today){
  var streak=0,cur=new Date(today);
  while(true){
    var iso=cur.toISOString().slice(0,10);
    if(saved.indexOf(iso)!==-1){streak++;cur.setDate(cur.getDate()-1);}
    else if(cur.getTime()===today.getTime()&&streak===0){
      cur.setDate(cur.getDate()-1);
      if(saved.indexOf(cur.toISOString().slice(0,10))!==-1){streak++;cur.setDate(cur.getDate()-1);}
      else break;
    }else break;
  }
  document.getElementById('streakVal').textContent=streak;
  var elapsed=Math.floor((today-mon)/86400000)+1,done=0;
  for(var i=0;i<elapsed;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);if(saved.indexOf(d.toISOString().slice(0,10))!==-1)done++;}
  document.getElementById('compVal').textContent=elapsed>0?Math.round(done/elapsed*100)+'%':'—';
}

/* ── Recent scenes ── */
(function(){
  var list=document.getElementById('scenesList');
  var scenes=[],keys=['dsh_saved_scenes','savedScenes','scenes'];
  for(var k=0;k<keys.length;k++){try{var r=localStorage.getItem(keys[k]);if(r){scenes=JSON.parse(r);break;}}catch(e){}}
  document.getElementById('scenesVal').textContent=scenes.length;
  if(!scenes.length){
    list.innerHTML='<div class="empty"><p>No scenes saved yet.<br>Build your first map for Sir.</p><a href="scene-menu.html">Begin Building \u2192</a></div>';
    return;
  }
  var ICONS=['🎭','🌹','⚡','🔒','🕯️','🎲'];
  scenes.slice(-3).reverse().forEach(function(s,i){
    var name=esc(s.name||s.title||('Scene '+(scenes.length-i)));
    var date=s.savedAt||s.date||'';
    var stars=parseInt(s.rating)||0;
    var ds=date?new Date(date).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'Saved scene';
    var ss=stars?'\u2605'.repeat(stars)+'\u2606'.repeat(5-stars):'';
    var a=document.createElement('a');
    a.href='scene-menu.html';a.className='srow';
    a.innerHTML='<div class="sico">'+ICONS[i%ICONS.length]+'</div><div style="flex:1;min-width:0"><span class="sname">'+name+'</span><span class="smeta">'+ds+'</span></div>'+(ss?'<span class="sstars">'+ss+'</span>':'');
    list.appendChild(a);
  });
})();

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>

<!-- nav.js injects the nav bar, overlay and More sheet automatically -->
<script src="nav.js"></script>

</body>
</html>
