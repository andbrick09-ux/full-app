<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Splash</title>
    <style>
        /* Ensure the splash takes up the full mobile viewport */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050a1a; /* Matches the dark blue in your video */
        }

        #splash-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        video {
            width: 100%;
            height: 100%;
            /* 'cover' ensures no black bars, though some cropping may occur */
            object-fit: cover; 
        }

        /* Optional: A "Skip" button for better UX */
        #skip-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-family: sans-serif;
            font-size: 14px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="splash-container">
        <video id="splash-video" autoplay muted playsinline>
            <source src="intro.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <a href="home.html" id="skip-btn">Skip</a>
    </div>

    <script>
        const video = document.getElementById('splash-video');
        const destination = "https://andbrick09-ux.github.io/full-app/home.html"; // Change this to your main app page

        // Redirect when the video finishes playing
        video.onended = function() {
            window.location.href = destination;
        };

        // Fallback: If the video fails to load or play within 8 seconds, redirect anyway
        setTimeout(() => {
            window.location.href = destination;
        }, 8000); 
    </script>

</body>
</html>
