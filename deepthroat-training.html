<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#080c14"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Deep Throat Training • Dom Sub Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="nav.css"/>
  <style>
    .training-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
    }
    .progress-section {
      background: var(--surface);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .level-display {
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 10px;
      background: rgba(212,175,55,0.2);
      border-radius: 5px;
      margin: 12px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      transition: width 0.4s ease;
    }
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--gold);
      color: #080c14;
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
    }
  </style>
</head>
<body data-nav="training">

  <div class="topbar">
    <div class="topbar-center">
      <div class="topbar-title">Deep Throat Training</div>
      <div class="topbar-sub">Discipline Through Devotion</div>
    </div>
  </div>

  <div class="training-container">

    <div class="progress-section">
      <div class="level-display" id="levelDisplay">Level 1</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="stats">
        <span>Progress: <span id="progressText">0%</span></span>
        <span>Level: <span id="levelText">1</span></span>
      </div>
    </div>

    <button class="btn btn-primary" onclick="completeLevel()">
      Complete Current Level
    </button>

  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { requireAuth, dataRef } from './auth.js';
    import { setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { logTrainingCompletion } from './training-log.js';

    let currentLevel = 1;
    let currentProgress = 0;

    async function loadTrainingData() {
      await requireAuth();
      const docRef = dataRef('training/deepthroat');
      const snap = await getDoc(docRef);

      if (snap.exists()) {
        const data = snap.data();
        currentLevel = data.level || 1;
        currentProgress = data.progress || 0;
      }

      updateUI();
    }

    function updateUI() {
      document.getElementById('levelDisplay').textContent = `Level ${currentLevel}`;
      document.getElementById('progressFill').style.width = `${currentProgress}%`;
      document.getElementById('progressText').textContent = `${currentProgress}%`;
      document.getElementById('levelText').textContent = currentLevel;
    }

    async function completeLevel() {
      currentProgress = 100;

      // Save to Firestore
      await setDoc(dataRef('training/deepthroat'), {
        level: currentLevel,
        progress: currentProgress,
        lastUpdated: serverTimestamp()
      }, { merge: true });

      // Log the completion
      await logTrainingCompletion('deepthroat', currentLevel);

      // Move to next level
      currentLevel++;
      currentProgress = 0;

      // Save new level
      await setDoc(dataRef('training/deepthroat'), {
        level: currentLevel,
        progress: currentProgress,
        lastUpdated: serverTimestamp()
      }, { merge: true });

      updateUI();
      showToast(`Level ${currentLevel - 1} completed!`);

      // Optional: Show completion message
      setTimeout(() => {
        showToast(`Now on Level ${currentLevel}`);
      }, 1500);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Initialize
    loadTrainingData();
  </script>

  <script src="nav.js"></script>
</body>
</html>
