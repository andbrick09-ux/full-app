<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDSM Checklist - Professional Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
:root {
  --midnight: #051024; --paper-dark: #081226; --gold: #d4af37; --gold-dim: rgba(212,175,55,0.4);
  --glass: rgba(5,16,36,0.85); --border: rgba(212,175,55,0.25); --green: #4CAF50; --red: #F44336;
  --luxury-gradient: linear-gradient(135deg,#bf953f 0%,#fcf6ba 50%,#b38728 100%);
}
*{box-sizing:border-box;margin:0;padding:0;}
body {
  background-color: var(--midnight); color:#f0f0f0; font-family:'Montserrat',sans-serif;
  background-image: radial-gradient(ellipse at top,#0f172a 0%,transparent 80%);
  min-height:100vh; overflow-x: hidden;
}

/* HEADER & SWITCHER */
.header { text-align:center; padding:25px 15px; border-bottom:1px solid var(--border); background:rgba(5,16,36,0.7); backdrop-filter:blur(15px); position:sticky; top:0; z-index:100; }
.brand { font-family:'Great Vibes',cursive; font-size:36px; background:var(--luxury-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:15px; }
.profile-switcher { display:inline-flex; background:rgba(8,18,38,0.8); border:1px solid var(--border); border-radius:30px; padding:4px; position:relative; width: 220px; }
.profile-btn { width: 50%; padding:8px 0; border-radius:25px; border:none; background:transparent; color:var(--gold-dim); font-size:10px; font-weight:700; text-transform:uppercase; cursor:pointer; position:relative; z-index:2; transition: 0.4s; }
.profile-btn.active { color:var(--midnight); }
.slider-bg { position:absolute; top:4px; left:4px; width:calc(50% - 4px); height:calc(100% - 8px); background:var(--luxury-gradient); border-radius:25px; transition:0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index:1; }
.p2-active .slider-bg { transform:translateX(100%); }

/* TOOLS */
.persistence-bar { display:flex; justify-content:center; align-items:center; gap:12px; padding:12px; background:rgba(8,18,38,0.7); border-bottom:1px solid var(--border); font-size:10px; color:var(--gold-dim); }
.btn-mini { background:transparent; border: 1.5px solid var(--gold-dim); color: var(--gold); padding: 5px 15px; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; transition: 0.3s; }
.btn-mini:hover { border-color: var(--gold); background: rgba(212,175,55,0.1); }

.tabs-nav { display:flex; overflow-x:auto; gap:10px; padding:15px; border-bottom:1px solid var(--border); scrollbar-width:none; }
.tab-btn { flex-shrink:0; background:transparent; border:1px solid var(--border); border-radius:25px; color:var(--gold-dim); font-size:11px; padding:8px 18px; cursor:pointer; white-space:nowrap; text-transform: uppercase; letter-spacing: 1px; }
.tab-btn.active { background:var(--luxury-gradient); color:var(--midnight); border-color:transparent; font-weight: 700; }

/* SEARCH & FILTERS */
.filter-bar { display:flex; flex-direction: column; gap:15px; padding:20px 15px; border-bottom:1px solid rgba(212,175,55,0.15); align-items:stretch; }
.search-container { display: flex; gap: 10px; align-items: center; }
.search-input { 
  background:rgba(8,18,38,0.9); 
  border: 1.5px solid var(--border); 
  border-radius:30px; 
  color:white; 
  padding:14px 25px; 
  font-size:14px; 
  flex:1; 
  outline:none; 
  transition: 0.3s;
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
}
.search-input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.2); }

.filter-chips { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
.filter-chip { 
  font-size:10px; font-weight:700; padding:8px 16px; border-radius:25px; 
  border:1.5px solid rgba(212,175,55,0.2); background:transparent; color:#888; 
  cursor:pointer; text-transform:uppercase; white-space: nowrap; transition: 0.3s;
}
.filter-chip.active { border-color:var(--gold); color:var(--gold); background:rgba(212,175,55,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

/* MAIN CONTENT */
.main { padding:15px; max-width:1200px; margin:0 auto; }
.category-section { background:var(--glass); border:1px solid var(--border); border-radius:15px; margin-bottom:40px; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.category-header { padding:18px 25px; background:rgba(212,175,55,0.04); border-bottom: 1px solid rgba(212,175,55,0.1); }
.category-title { font-family:'Playfair Display',serif; font-size:22px; color:var(--gold); text-transform: uppercase; letter-spacing: 3px; }

.activity-item { padding:25px; border-bottom:1px solid rgba(212,175,55,0.08); transition:0.3s; }
.activity-item.match { border-left:6px solid var(--green); background:rgba(76,175,80,0.05); }
.activity-item.limit-active { border-left:6px solid var(--red); background:rgba(244,67,54,0.05); }

.item-grid { display:flex; gap:30px; align-items:flex-start; width: 100%; flex-direction: column; }
.name-area { width: 100%; }
.name-col { font-weight:700; font-size:20px; color: #fff; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
.desc-text { font-size: 12px; color: #888; font-style: italic; line-height: 1.6; display: block; max-width: 850px; }

.profile-cols { display:flex; gap:30px; width: 100%; }
.profile-cell { flex:1; display:flex; flex-direction:column; gap:12px; min-width: 0; }

/* 2-ROW INTERACTION GRID */
.kink-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.kink-grid-row2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }

.kink-pill { 
  padding:14px 10px; border-radius:10px; background:rgba(255,255,255,0.02); 
  border:1.5px solid var(--border); cursor:pointer; text-align:center;
  display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 65px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.kink-pill:hover { border-color: rgba(212,175,55,0.6); background: rgba(255,255,255,0.05); }

.pill-title { font-size: 10px; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
.pill-value { font-size: 10px; font-weight: 700; color: transparent; text-transform: uppercase; line-height: 1.3; margin-top: 6px; }

/* ACTIVE STATE */
.kink-pill.filled { border-color: rgba(212,175,55,0.5); background: rgba(255,255,255,0.04); border-width: 2px; }
.kink-pill.filled .pill-title { color: var(--gold); }
.kink-pill.filled .pill-value { color: #fff; }

.kink-pill.status-yes { border-color: var(--green); }
.kink-pill.status-yes .pill-title, .kink-pill.status-yes .pill-value { color: var(--green); }

.kink-pill.status-want { border-color: var(--gold); }
.kink-pill.status-want .pill-title, .kink-pill.status-want .pill-value { color: var(--gold); }

.kink-pill.status-limit { border-color: var(--red); }
.kink-pill.status-limit .pill-title, .kink-pill.status-limit .pill-value { color: var(--red); }

.note-input { width:100%; margin-top:20px; background:transparent; border:none; border-left:3px solid rgba(212,175,55,0.2); color:#bbb; font-style:italic; font-size:13px; padding: 8px 15px; outline:none; }

/* MODALS */
#sheetOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:2000; }
#bottomSheet { position:fixed; bottom:-100%; left:0; width:100%; background:rgba(8, 18, 38, 0.98); border-top: 4px solid var(--gold); border-radius: 30px 30px 0 0; padding: 30px; z-index:2001; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); max-height: 85vh; overflow-y:auto; }
#bottomSheet.open { bottom:0; }
.sheet-option { background:rgba(255,255,255,0.04); border:1px solid rgba(212,175,55,0.1); padding:20px; border-radius:18px; margin-bottom:15px; display:flex; align-items:center; gap:25px; cursor:pointer; font-size: 16px; color: #fff; font-weight: 600; transition: 0.2s; }
.sheet-option:active { background: rgba(212,175,55,0.1); transform: scale(0.98); }

@media(min-width: 900px) {
    .filter-bar { flex-direction: row; justify-content: space-between; }
    .item-grid { flex-direction: row; align-items: center; }
    .profile-cols { flex: 2; }
    .name-area { flex: 1; }
}
</style>
</head>
<body onload="init()">

<div class="header">
  <div class="brand">BDSM Checklist</div>
  <div class="profile-switcher" id="profileSwitcher">
    <div class="slider-bg"></div>
    <button class="profile-btn active" id="p1-btn" onclick="setProfile('p1')">Partner 1</button>
    <button class="profile-btn" id="p2-btn" onclick="setProfile('p2')">Partner 2</button>
  </div>
</div>

<div class="persistence-bar">
  <span id="saveLabel">Ready</span>
  <button class="btn-mini" onclick="openSnapshotModal()">Snapshot</button>
  <select class="btn-mini" id="historySelect" onchange="compareHistory(this.value)" style="background:#081226; max-width: 150px;">
    <option value="">History Vault</option>
  </select>
  <button class="btn-mini" onclick="resetApp()" style="color:var(--red); border-color:var(--red);">Reset Portal</button>
</div>

<div class="tabs-nav" id="tabsNav">
  <button class="tab-btn active" id="tab-all" onclick="setTab('all', this)">All Categories</button>
</div>

<div class="filter-bar">
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="🔍 Search activities or descriptions..." oninput="handleSearch(this.value)" class="search-input">
    <button class="btn-mini" onclick="clearFilters()" style="height: 48px; border-radius: 30px;">Clear</button>
  </div>
  <div class="filter-chips">
    <button class="filter-chip" id="f-tried" onclick="toggleFilter('tried', this)">✓ Tried</button>
    <button class="filter-chip" id="f-loved" onclick="toggleFilter('loved', this)">★ Loved</button>
    <button class="filter-chip" id="f-limit" onclick="toggleFilter('limit', this)">✕ Limit</button>
  </div>
</div>

<div class="main" id="mainContent"></div>

<div id="sheetOverlay" onclick="closeSheet()"></div>
<div id="bottomSheet">
  <div style="text-align:center; margin-bottom:25px;">
    <div style="width: 50px; height: 5px; background: rgba(212,175,55,0.3); border-radius: 3px; margin: 0 auto 20px;"></div>
    <div id="sheetTitle" style="color:var(--gold); font-family:'Playfair Display'; font-size:22px; text-transform: uppercase; letter-spacing: 2px;">Selection</div>
    <div id="sheetSubtitle" style="font-size:12px; color:#888; text-transform:uppercase; margin-top: 8px;">Item</div>
  </div>
  <div id="sheetOptions"></div>
  <button onclick="closeSheet()" style="width:100%; padding:20px; margin-top:15px; background:transparent; border:none; color:#888; text-transform:uppercase; font-size:12px; font-weight: 800; letter-spacing: 1px;">Cancel</button>
</div>

<div id="snapModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; backdrop-filter:blur(10px);">
  <div style="background:var(--paper-dark); margin: 20% auto; padding:40px; border:1px solid var(--gold); border-radius:20px; max-width:450px; width:90%; text-align:center;">
    <h3 style="color:var(--gold); font-family:'Playfair Display'; margin-bottom:20px; font-size:24px;">Create Snapshot</h3>
    <input type="text" id="snapName" style="width:100%; padding:18px; margin:25px 0; background:#051024; border:1px solid var(--border); color:white; border-radius:10px; font-size:16px;" placeholder="Snapshot Name (e.g. Baseline)">
    <div style="display:flex; gap:15px;">
      <button class="btn-mini" style="flex:1; height: 50px;" onclick="saveSnapshot()">Save</button>
      <button class="btn-mini" style="flex:1; border-color:#555; color:#888; height: 50px;" onclick="closeSnapshotModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── DATA TEMPLATE ───────────────────────────────────────────────
const DATABASE_TEMPLATE = [
  { id:'bondage', label:'Bondage', items:[
    {n:'Anal Hook', d:'A curved blunt device for internal weighted play and restraint.'},
    {n:'Arm Binding', d:'Tying arms together behind the back or to the body to restrict movement.'},
    {n:'Bed bondage', d:'Fixing a partner to a bed using straps, ropes, or spreader bars.'},
    {n:'Cage', d:'Full physical containment in a small, secure enclosure.'},
    {n:'Chains', d:'Heavy metal restraint providing weight, cold sensation, and specific sounds.'},
    {n:'Chastity', d:'Mechanical prevention of sexual access using specialized cages or belts.'},
    {n:'Gags', d:'Devices that limit or prevent speech and vocalization.'},
    {n:'Restraints', d:'Handcuffs, leg irons, or leather cuffs to limit mobility.'},
    {n:'Suspension', d:'Lifting a partner partially or fully off the ground using ropes.'}
  ]},
  { id:'impact', label:'Impact Play', items:[
    {n:'Caning', d:'Intense, localized impact using flexible or rigid sticks.'},
    {n:'Face slapping', d:'Dominance strikes to the face for psychological or physical thrill.'},
    {n:'Riding crops', d:'Stiff-shafted tools delivering a sharp, stinging sensation.'},
    {n:'Spanking (OTK)', d:'Over-the-knee strikes, usually with the hand or paddle.'},
    {n:'Whipping - Flogger', d:'Multi-tailed tools delivering thuddy or stinging sensations.'}
  ]},
  { id:'sensation', label:'Sensation Play', items:[
    {n:'Blindfold', d:'Sensory deprivation by blocking sight to heighten other senses.'},
    {n:'Hot wax', d:'Dripping low-temperature candles for a heat-based thrill.'},
    {n:'Ice', d:'Using extreme cold for sensory contrast.'},
    {n:'Nuru', d:'Body-to-body massage with highly slippery seaweed gel.'},
    {n:'Skin Sensation', d:'Using textures like feathers or claws to explore nerve sensitivity.'}
  ]}
];

let APP_STATE = { p1: { data: [], history: [] }, p2: { data: [], history: [] } };
let activeP = 'p1', activeTab = 'all', activeFilters = new Set(), searchQ = '', sheetCtx = null;

function init() {
  const saved = localStorage.getItem('bdsm_portal_vSTRUCTURAL');
  if (saved) { APP_STATE = JSON.parse(saved); } else {
    DATABASE_TEMPLATE.forEach(cat => {
      APP_STATE.p1.data.push({ id: cat.id, label: cat.label, items: cat.items.map(i => buildItem(i.n, i.d)) });
      APP_STATE.p2.data.push({ id: cat.id, label: cat.label, items: cat.items.map(i => buildItem(i.n, i.d)) });
    });
  }
  const nav = document.getElementById('tabsNav');
  DATABASE_TEMPLATE.forEach(c => {
    const b = document.createElement('button'); b.className = 'tab-btn'; b.textContent = c.label;
    b.onclick = () => setTab(c.id, b); nav.appendChild(b);
  });
  render(); updateHistDropdown();
}

function buildItem(name, desc) { return { n: name, d: desc, tried: '', rating: '', role: '', limit: '', motive: '', note: '' }; }

function setProfile(p) {
  activeP = p; document.getElementById('profileSwitcher').className = `profile-switcher ${p}-active`;
  document.getElementById('p1-btn').classList.toggle('active', p === 'p1');
  document.getElementById('p2-btn').classList.toggle('active', p === 'p2');
  render(); updateHistDropdown();
}

function setTab(id, btn) { activeTab = id; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); }
function handleSearch(v) { searchQ = v.toLowerCase(); render(); }
function toggleFilter(f, btn) { if(activeFilters.has(f)) activeFilters.delete(f); else activeFilters.add(f); btn.classList.toggle('active'); render(); }
function clearFilters() { activeFilters.clear(); searchQ = ''; document.getElementById('searchInput').value = ''; document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active')); render(); }
function save() { localStorage.setItem('bdsm_portal_vSTRUCTURAL', JSON.stringify(APP_STATE)); document.getElementById('saveLabel').textContent = 'Saved'; }

function render() {
  const main = document.getElementById('mainContent');
  const cats = activeTab === 'all' ? APP_STATE[activeP].data : APP_STATE[activeP].data.filter(c => c.id == activeTab);
  let html = '';

  cats.forEach(cat => {
    const visItems = cat.items.filter(item => {
      const matchText = item.n.toLowerCase().includes(searchQ) || item.d.toLowerCase().includes(searchQ);
      if (activeFilters.size === 0) return matchText;
      let matchFilter = false;
      if (activeFilters.has('tried') && item.tried === 'yes') matchFilter = true;
      if (activeFilters.has('loved') && item.rating === 'Loved it') matchFilter = true;
      if (activeFilters.has('limit') && item.limit !== '') matchFilter = true;
      return matchText && matchFilter;
    });

    if (visItems.length === 0) return;
    html += `<div class="category-section"><div class="category-header"><span class="category-title">${cat.label}</span></div><div class="category-body">`;
    visItems.forEach((item) => {
      const idx = cat.items.indexOf(item);
      html += `<div class="activity-item">
        <div class="item-grid"><div class="name-area"><span class="name-col">${item.n}</span><span class="desc-text">${item.d}</span></div><div class="profile-cols">${renderCell(item, activeP, cat.id, idx)}</div></div>
        <input type="text" class="note-input" placeholder="Notes & Conditions..." value="${item.note || ''}" onchange="updateNote('${cat.id}', ${idx}, this.value)">
      </div>`;
    });
    html += `</div></div>`;
  });
  main.innerHTML = html || '<div style="text-align:center; padding:40px; color:#444;">No matches found.</div>';
}

function renderCell(res, pKey, cid, idx) {
  return `<div class="profile-cell">
        <div class="kink-grid">
            <div class="kink-pill ${res.tried !== '' ? 'filled' : ''} ${res.tried==='yes'?'status-yes':(res.tried==='no-want'?'status-want':'')}" onclick="triggerSheet('${cid}', ${idx}, 'tried')">
                <span class="pill-title">Status</span><span class="pill-value">${res.tried==='yes'?'YES':(res.tried==='no-want'?'WANT':'')}</span>
            </div>
            <div class="kink-pill ${res.rating !== '' ? 'filled' : ''} ${res.rating==='Loved it'?'status-yes':''}" onclick="triggerSheet('${cid}', ${idx}, 'rating')">
                <span class="pill-title">Enthusiasm</span><span class="pill-value">${res.rating ? res.rating.toUpperCase() : ''}</span>
            </div>
            <div class="kink-pill ${res.limit !== '' ? 'filled' : ''} ${res.limit ? 'status-limit' : ''}" onclick="triggerSheet('${cid}', ${idx}, 'limit')">
                <span class="pill-title">Boundary</span><span class="pill-value">${res.limit ? res.limit.toUpperCase() : ''}</span>
            </div>
        </div><div class="kink-grid-row2">
            <div class="kink-pill ${res.role !== '' ? 'filled' : ''}" onclick="triggerSheet('${cid}', ${idx}, 'role')">
                <span class="pill-title">Dynamic</span><span class="pill-value">${res.role ? res.role.toUpperCase() : ''}</span>
            </div>
            <div class="kink-pill ${res.motive !== '' ? 'filled' : ''}" onclick="triggerSheet('${cid}', ${idx}, 'motive')">
                <span class="pill-title">Motivation</span><span class="pill-value">${res.motive ? res.motive.toUpperCase() : ''}</span>
            </div>
        </div></div>`;
}

function openSheet(cid, idx, field, title, opts) {
  sheetCtx = { cid, idx, field };
  document.getElementById('sheetTitle').textContent = title;
  document.getElementById('sheetSubtitle').textContent = APP_STATE[activeP].data.find(c=>c.id==cid).items[idx].n;
  const cont = document.getElementById('sheetOptions'); cont.innerHTML = '';
  opts.forEach(o => {
    const d = document.createElement('div'); d.className = 'sheet-option';
    d.onclick = () => { APP_STATE[activeP].data.find(c=>c.id==cid).items[idx][field] = o.val; save(); render(); closeSheet(); };
    d.innerHTML = `<span style="font-size:22px; color:${o.col || 'var(--gold)'}">${o.icon}</span><span>${o.lab}</span>`;
    cont.appendChild(d);
  });
  document.getElementById('sheetOverlay').style.display='block'; document.getElementById('bottomSheet').classList.add('open');
}

function triggerSheet(cid, i, f) {
  if(f==='limit') openSheet(cid, i, 'limit', 'Boundary', [{lab:'No Limit', val:'', icon:'○'}, {lab:'Soft Limit', val:'Soft Limit', icon:'△', col:'var(--gold)'}, {lab:'Hard Limit', val:'Hard Limit', icon:'✕', col:'var(--red)'}]);
  if(f==='tried') openSheet(cid, i, 'tried', 'Status', [{lab:'Yes', val:'yes', icon:'✓', col:'var(--green)'}, {lab:'No but I want to', val:'no-want', icon:'+', col:'var(--gold)'}, {lab:'No and I dont want to', val:'no-dont', icon:'✕', col:'#666'}]);
  if(f==='rating') openSheet(cid, i, 'rating', 'Enthusiasm', [{lab:'Loved it', val:'Loved it', icon:'★'}, {lab:'Liked it', val:'Liked it', icon:'♥'}, {lab:'Take it or leave it', val:'Take it or leave it', icon:'~'}, {lab:'Fetish', val:'Fetish', icon:'✦', col:'#bf953f'}]);
  if(f==='role') openSheet(cid, i, 'role', 'Dynamic', [{lab:'Giving', val:'Giving', icon:'↓'}, {lab:'Receiving', val:'Receiving', icon:'↑'}, {lab:'Both', val:'Both', icon:'↕'}, {lab:'Wearing', val:'Wearing', icon:'👗'}, {lab:'Others Wearing', val:'Others Wearing', icon:'👁️'}]);
  if(f==='motive') openSheet(cid, i, 'motive', 'Motivation', [{lab:'Arousal', val:'Arousal', icon:'🔥'}, {lab:'Discipline', val:'Discipline', icon:'⚖️'}, {lab:'Fun', val:'Fun', icon:'🎈'}, {lab:'Stress Relief', val:'Stress Relief', icon:'🧘'}]);
}

function closeSheet() { document.getElementById('sheetOverlay').style.display='none'; document.getElementById('bottomSheet').classList.remove('open'); }
function updateNote(cid, idx, val) { APP_STATE[activeP].data.find(c=>c.id==cid).items[idx].note = val; save(); }
function openSnapshotModal() { document.getElementById('snapModal').style.display='block'; }
function closeSnapshotModal() { document.getElementById('snapModal').style.display='none'; }
function saveSnapshot() {
  const name = document.getElementById('snapName').value || 'Snapshot';
  APP_STATE[activeP].history.unshift({ id: Date.now(), name, date: new Date().toLocaleDateString(), data: JSON.parse(JSON.stringify(APP_STATE[activeP].data)) });
  save(); updateHistDropdown(); closeSnapshotModal();
}
function updateHistDropdown() {
  const d = document.getElementById('historySelect'); d.innerHTML = '<option value="">History</option>';
  APP_STATE[activeP].history.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = `${s.name} (${s.date})`; d.appendChild(o); });
}
function compareHistory(id) { 
  const snap = APP_STATE[activeP].history.find(h => h.id == id);
  if(snap) { APP_STATE[activeP].data = JSON.parse(JSON.stringify(snap.data)); render(); }
}
function resetApp() { if(confirm("Clear all data?")) { localStorage.removeItem('bdsm_portal_vSTRUCTURAL'); location.reload(); } }
