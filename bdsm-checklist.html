<style>

*{box-sizing:border-box;margin:0;padding:0;}

/* HEADER & SWITCHER */
.header { text-align:center; padding:20px 15px; border-bottom:1px solid var(--border); background:rgba(5,16,36,0.7); backdrop-filter:blur(15px); position:sticky; top:0; z-index:100; }
.brand { font-family:'Great Vibes',cursive; font-size:32px; background:var(--luxury-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:12px; }
.profile-switcher { display:inline-flex; background:rgba(8,18,38,0.8); border:1px solid var(--border); border-radius:30px; padding:3px; position:relative; width: 220px; }
.profile-btn { width: 50%; padding:8px 0; border-radius:25px; border:none; background:transparent; color:var(--gold-dim); font-size:10px; font-weight:700; text-transform:uppercase; cursor:pointer; position:relative; z-index:2; transition: 0.4s; }
.profile-btn.active { color:var(--midnight); }
.slider-bg { position:absolute; top:3px; left:3px; width:calc(50% - 3px); height:calc(100% - 6px); background:var(--luxury-gradient); border-radius:25px; transition:0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index:1; }
.p2-active .slider-bg { transform:translateX(100%); }

.persistence-bar { display:flex; justify-content:center; align-items:center; gap:12px; padding:10px; background:rgba(8,18,38,0.7); border-bottom:1px solid var(--border); font-size:9px; color:var(--gold-dim); }
.btn-mini { background:transparent; border: 1px solid var(--border); color: var(--gold); padding: 4px 12px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 8px; letter-spacing: 0.5px; }

/* TABS */
.tabs-nav { display:flex; overflow-x:auto; gap:8px; padding:12px 15px; border-bottom:1px solid var(--border); scrollbar-width:none; }
.tab-btn { flex-shrink:0; background:transparent; border:1px solid var(--border); border-radius:20px; color:var(--gold-dim); font-size:10px; padding:7px 16px; cursor:pointer; white-space:nowrap; text-transform: uppercase; letter-spacing: 1px; }
.tab-btn.active { background:var(--luxury-gradient); color:var(--midnight); border-color:transparent; font-weight: 700; }

/* SEARCH & FILTERS */
.filter-bar { padding:20px 15px; border-bottom:1px solid rgba(212,175,55,0.1); }
.search-container { display: flex; gap: 10px; margin-bottom: 15px; }
.search-input { 
  background:rgba(8,18,38,0.8); border:1.5px solid var(--border); border-radius:30px; color:white; 
  padding:12px 20px; font-size:14px; flex:1; outline:none; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
}
.filter-chips { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.filter-chip { 
  font-size:9px; font-weight:700; padding:8px 16px; border-radius:20px; border:1.5px solid rgba(212,175,55,0.15); 
  background:transparent; color:#777; cursor:pointer; text-transform:uppercase; white-space: nowrap; transition: 0.3s;
}
.filter-chip.active { border-color:var(--gold); color:var(--gold); background:rgba(212,175,55,0.05); }

/* CONTENT */
.main { padding:15px; max-width:1200px; margin:0 auto; }
.category-section { background:var(--glass); border:1px solid var(--border); border-radius:12px; margin-bottom:30px; overflow:hidden; }
.category-header { padding:15px 20px; background:rgba(212,175,55,0.03); border-bottom: 1px solid rgba(212,175,55,0.05); }
.category-title { font-family:'Playfair Display',serif; font-size:20px; color:var(--gold); text-transform: uppercase; letter-spacing: 2px; }

.activity-item { padding:20px; border-bottom:1px solid rgba(212,175,55,0.08); transition:0.3s; }
.activity-item.match { border-left:5px solid var(--green); background:rgba(76,175,80,0.03); }

.item-grid { display:flex; gap:25px; align-items:flex-start; width: 100%; flex-direction: column; }
.name-area { width: 100%; }
.name-col { font-weight:700; font-size:18px; color: #fff; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
.desc-text { font-size: 11px; color: #888; font-style: italic; line-height: 1.4; display: block; max-width: 800px; }

.profile-cols { display:flex; gap:25px; width: 100%; }
.profile-cell { flex:1; display:flex; flex-direction:column; gap:10px; min-width: 0; }

/* 2-ROW GRID SYSTEM */
.kink-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.kink-grid-row2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 8px; }

.kink-pill { 
  padding:12px 8px; border-radius:8px; background:rgba(255,255,255,0.02); 
  border:1px solid var(--border); cursor:pointer; text-align:center;
  display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 55px;
  transition: all 0.3s ease;
}
.pill-title { font-size: 9px; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 1.2px; transition: 0.3s; }
.pill-value { font-size: 9px; font-weight: 600; color: transparent; text-transform: uppercase; line-height: 1.2; margin-top: 4px; }

/* FILLED STATE */
.kink-pill.filled { border-color: rgba(212,175,55,0.4); background: rgba(255,255,255,0.04); border-width: 1.5px; }
.kink-pill.filled .pill-title { color: var(--gold); }
.kink-pill.filled .pill-value { color: #eee; }

.kink-pill.status-yes { border-color: var(--green); background: rgba(76,175,80,0.05); }
.kink-pill.status-yes .pill-title, .kink-pill.status-yes .pill-value { color: var(--green); }
.kink-pill.status-want { border-color: var(--gold); }
.kink-pill.status-want .pill-title, .kink-pill.status-want .pill-value { color: var(--gold); }
.kink-pill.status-limit { border-color: var(--red); background: rgba(244,67,54,0.05); }
.kink-pill.status-limit .pill-title, .kink-pill.status-limit .pill-value { color: var(--red); }

.note-input { width:100%; margin-top:15px; background:transparent; border:none; border-left:3px solid rgba(212,175,55,0.15); color:#999; font-style:italic; font-size:12px; padding: 5px 12px; outline:none; }

/* OVERLAYS */
#sheetOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(6px); z-index:2000; }
#bottomSheet { position:fixed; bottom:-100%; left:0; width:100%; background:rgba(8, 18, 38, 0.98); border-top: 3px solid var(--gold); border-radius: 25px 25px 0 0; padding: 25px; z-index:2001; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-height: 85vh; overflow-y:auto; }
#bottomSheet.open { bottom:0; }
.sheet-option { background:rgba(255,255,255,0.04); border:1px solid rgba(212,175,55,0.1); padding:18px; border-radius:15px; margin-bottom:12px; display:flex; align-items:center; gap:20px; cursor:pointer; font-size: 14px; color: #fff; font-weight: 600; }

@media(min-width: 900px) {
    .item-grid { flex-direction: row; align-items: center; }
    .profile-cols { flex: 2; }
    .name-area { flex: 1; }
}
</style>

}

function triggerSheet(cid, i, f) {
  if(f==='limit') openSheet(cid, i, 'limit', 'Boundary', [{lab:'No Limit', val:'', icon:'○'}, {lab:'Soft Limit', val:'Soft Limit', icon:'△', col:'var(--gold)'}, {lab:'Hard Limit', val:'Hard Limit', icon:'✕', col:'var(--red)'}]);
  if(f==='tried') openSheet(cid, i, 'tried', 'Status', [{lab:'Yes', val:'yes', icon:'✓', col:'var(--green)'}, {lab:'No but I want to', val:'no-want', icon:'+', col:'var(--gold)'}, {lab:'No and I dont want to', val:'no-dont', icon:'✕', col:'#666'}]);
  if(f==='rating') openSheet(cid, i, 'rating', 'Enthusiasm', [{lab:'Loved it', val:'Loved it', icon:'★'}, {lab:'Liked it', val:'Liked it', icon:'♥'}, {lab:'Take it or leave it', val:'Take it or leave it', icon:'~'}, {lab:'Fetish', val:'Fetish', icon:'✦', col:'#bf953f'}]);
  if(f==='role') openSheet(cid, i, 'role', 'Dynamic', [{lab:'Giving', val:'Giving', icon:'↓'}, {lab:'Receiving', val:'Receiving', icon:'↑'}, {lab:'Both', val:'Both', icon:'↕'}, {lab:'Wearing', val:'Wearing', icon:'👗'}, {lab:'Others Wearing', val:'Others Wearing', icon:'👁️'}]);
  if(f==='motive') openSheet(cid, i, 'motive', 'Motivation', [{lab:'Arousal', val:'Arousal', icon:'🔥'}, {lab:'Discipline', val:'Discipline', icon:'⚖️'}, {lab:'Fun', val:'Fun', icon:'🎈'}, {lab:'Stress Relief', val:'Stress Relief', icon:'🧘'}]);
}

function closeSheet() { document.getElementById('sheetOverlay').style.display='none'; document.getElementById('bottomSheet').classList.remove('open'); }
function updateNote(cid, idx, val) { APP_STATE[activeP].data.find(c=>c.id==cid).items[idx].note = val; save(); }
function openSnapshotModal() { document.getElementById('snapModal').style.display='block'; }
function closeSnapshotModal() { document.getElementById('snapModal').style.display='none'; }
function saveSnapshot() {
  const name = document.getElementById('snapName').value || 'Snapshot';
  APP_STATE[activeP].history.unshift({ id: Date.now(), name, date: new Date().toLocaleDateString(), data: JSON.parse(JSON.stringify(APP_STATE[activeP].data)) });
  save(); updateHistDropdown(); closeSnapshotModal();
}
function updateHistDropdown() {
  const d = document.getElementById('historySelect'); d.innerHTML = '<option value="">Vault</option>';
  APP_STATE[activeP].history.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = `${s.name} (${s.date})`; d.appendChild(o); });
}
function compareHistory(id) { 
  const snap = APP_STATE[activeP].history.find(h => h.id == id);
  if(snap) { APP_STATE[activeP].data = JSON.parse(JSON.stringify(snap.data)); render(); }
}
function resetApp() { if(confirm("Clear all data?")) { localStorage.removeItem('bdsm_portal_vFINAL_SYNC'); location.reload(); } }
</script>
</body>
