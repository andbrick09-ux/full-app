<style>
:root {

/* HEADER & SWITCHER */

.adv-filter-btn {

.desc-text { font-size: 11px; color: #888; font-style: italic; line-height: 1.4; display: block; max-width: 800px; }

.profile-cols { display:flex; gap:25px; width: 100%; }

/* INTERACTION PILLS */
.kink-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.kink-grid-row2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 8px; }

/* FILTER MODAL SPECIFICS */

.filter-opt.selected { background: var(--gold); color: var(--midnight); border-color: var(--gold); }

/* OVERLAYS */

#bottomSheet, #filterSheet { position:fixed; bottom:-100%; left:0; width:100%; background:rgba(8, 18, 38, 0.98); border-top: 3px solid var(--gold); border-radius: 25px 25px 0 0; padding: 25px; z-index:2001; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-height: 90vh; overflow-y:auto; }
#bottomSheet.open, #filterSheet.open { bottom:0; }
.sheet-option { background:rgba(255,255,255,0.04); border:1px solid rgba(212,175,55,0.1); padding:18px; border-radius:15px; margin-bottom:12px; display:flex; align-items:center; gap:20px; cursor:pointer; font-size: 14px; color: #fff; font-weight: 600; }

@media(min-width: 900px) {
    .item-grid { flex-direction: row; align-items: center; }
    .profile-cols { flex: 2; }
    .name-area { flex: 1; }
}
</style>

        </div><div class="kink-grid-row2">
            <div class="kink-pill ${rF?'filled':''}" onclick="triggerSheet('${cid}', ${idx}, 'role')"><span class="pill-title">Dynamic</span><span class="pill-value">${res.role ? res.role.toUpperCase() : ''}</span></div>
            <div class="kink-pill ${mF?'filled':''}" onclick="triggerSheet('${cid}', ${idx}, 'motive')"><span class="pill-title">Motivation</span><span class="pill-value">${res.motive ? res.motive.toUpperCase() : ''}</span></div>
        </div></div>`;
}

function renderFilterDashboard() {
    const dash = document.getElementById('filterDashboard'); dash.innerHTML = '';
    Object.keys(FILTER_CONFIG).forEach(key => {
        const cat = FILTER_CONFIG[key];
        let h = `<div class="filter-category"><div class="filter-cat-title">${cat.title}</div><div class="filter-options">`;
        cat.opts.forEach(opt => {
            const isSel = filters[key].includes(opt);
            h += `<div class="filter-opt ${isSel?'selected':''}" onclick="toggleFilterValue('${key}', '${opt}')">${opt}</div>`;
        });
        h += `</div></div>`;
        dash.innerHTML += h;
    });
}

function toggleFilterValue(key, val) {
    if(filters[key].includes(val)) filters[key] = filters[key].filter(v => v !== val);
    else filters[key].push(val);
    renderFilterDashboard(); render();
}

function openFilterSheet() { document.getElementById('sheetOverlay').style.display='block'; document.getElementById('filterSheet').classList.add('open'); }
function triggerSheet(cid, i, f) {
  const item = APP_STATE[activeP].data.find(c=>c.id==cid).items[i];
  document.getElementById('sheetSubtitle').textContent = item.n;
  const cont = document.getElementById('sheetOptions'); cont.innerHTML = '';
  let opts = [];
  if(f==='limit') opts = [{lab:'No Limit', val:''}, {lab:'Soft Limit', val:'Soft Limit'}, {lab:'Hard Limit', val:'Hard Limit'}];
  if(f==='tried') opts = [{lab:'Yes', val:'yes'}, {lab:'Want to try', val:'no-want'}, {lab:'No Interest', val:'no-dont'}];
  if(f==='rating') opts = [{lab:'Loved it', val:'Loved it'}, {lab:'Liked it', val:'Liked it'}, {lab:'Take it or leave it', val:'Take it or leave it'}, {lab:'Fetish', val:'Fetish'}];
  if(f==='role') opts = [{lab:'Giving', val:'Giving'}, {lab:'Receiving', val:'Receiving'}, {lab:'Both', val:'Both'}, {lab:'Wearing', val:'Wearing'}, {lab:'Others Wearing', val:'Others Wearing'}];
  if(f==='motive') opts = [{lab:'Arousal', val:'Arousal'}, {lab:'Discipline', val:'Discipline'}, {lab:'Fun', val:'Fun'}, {lab:'Stress Relief', val:'Stress Relief'}];
  
  opts.forEach(o => {
    const d = document.createElement('div'); d.className = 'sheet-option';
    d.onclick = () => { item[f] = o.val; save(); render(); closeSheets(); };
    d.textContent = o.lab; cont.appendChild(d);
  });
  document.getElementById('sheetOverlay').style.display='block'; document.getElementById('bottomSheet').classList.add('open');
}

function closeSheets() { document.getElementById('sheetOverlay').style.display='none'; document.getElementById('bottomSheet').classList.remove('open'); document.getElementById('filterSheet').classList.remove('open'); }
function updateNote(cid, idx, val) { APP_STATE[activeP].data.find(c=>c.id==cid).items[idx].note = val; save(); }
function openSnapshotModal() { document.getElementById('snapModal').style.display='block'; }
function closeSnapshotModal() { document.getElementById('snapModal').style.display='none'; }
function saveSnapshot() {
  const name = document.getElementById('snapName').value || 'Snapshot';
  APP_STATE[activeP].history.unshift({ id: Date.now(), name, date: new Date().toLocaleDateString(), data: JSON.parse(JSON.stringify(APP_STATE[activeP].data)) });
  save(); updateHistDropdown(); closeSnapshotModal();
}
function updateHistDropdown() {
  const d = document.getElementById('historySelect'); d.innerHTML = '<option value="">Vault</option>';
  APP_STATE[activeP].history.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = `${s.name} (${s.date})`; d.appendChild(o); });
}
function compareHistory(id) { 
  const snap = APP_STATE[activeP].history.find(h => h.id == id);
  if(snap) { APP_STATE[activeP].data = JSON.parse(JSON.stringify(snap.data)); render(); }
}
function resetApp() { if(confirm("Wipe portal session? Snapshot remains.")) { localStorage.removeItem('bdsm_portal_vADV_FILTERS'); location.reload(); } }
</script>
