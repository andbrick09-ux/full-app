.brand { font-family:'Great Vibes',cursive; font-size:30px; background:var(--luxury-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:10px; }

.profile-btn { width: 50%; padding:8px 0; border-radius:25px; border:none; background:transparent; color:var(--gold-dim); font-size:10px; font-weight:700; text-transform:uppercase; cursor:pointer; position:relative; z-index:2; transition: 0.4s; }
.profile-btn.active { color:var(--midnight); }
.slider-bg { position:absolute; top:3px; left:3px; width:calc(50% - 3px); height:calc(100% - 6px); background:var(--luxury-gradient); border-radius:25px; transition:0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index:1; }
.p2-active .slider-bg { transform:translateX(100%); }

.persistence-bar { display:flex; justify-content:center; align-items:center; gap:10px; padding:8px; background:rgba(8,18,38,0.7); border-bottom:1px solid var(--border); font-size:9px; color:var(--gold-dim); }
.btn-mini { background:transparent; border: 1px solid var(--border); color: var(--gold); padding: 4px 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 8px; }

.tabs-nav { display:flex; overflow-x:auto; gap:6px; padding:12px 15px; border-bottom:1px solid var(--border); scrollbar-width:none; }
.tab-btn { flex-shrink:0; background:transparent; border:1px solid var(--border); border-radius:20px; color:var(--gold-dim); font-size:10px; padding:6px 14px; cursor:pointer; white-space:nowrap; }
.tab-btn.active { background:var(--luxury-gradient); color:var(--midnight); border-color:transparent; }

.summary-bar { display:flex; gap:8px; padding:12px 15px; background:rgba(8,18,38,0.8); border-bottom:1px solid rgba(212,175,55,0.15); overflow-x:auto; }
.stat-pill { flex-shrink:0; display:flex; align-items:center; gap:4px; background:var(--glass); border:1px solid var(--border); border-radius:20px; padding:4px 10px; font-size:9px; }

/* FILTERS */
.filter-bar { display:flex; gap:8px; padding:12px 15px; border-bottom:1px solid rgba(212,175,55,0.1); align-items:center; }
.search-input { background:rgba(8,18,38,0.8); border:1px solid var(--border); border-radius:20px; color:white; padding:8px 15px; font-size:11px; flex:1; outline:none; }
.filter-chip { font-size:9px; font-weight:700; padding:6px 12px; border-radius:20px; border:1px solid rgba(212,175,55,0.25); background:transparent; color:#888; cursor:pointer; text-transform:uppercase; }
.filter-chip.active { border-color:var(--gold); color:var(--gold); background:rgba(212,175,55,0.1); }

.category-section { background:var(--glass); border:1px solid var(--border); border-radius:12px; margin-bottom:25px; overflow:hidden; }
.category-header { padding:12px 18px; background:rgba(212,175,55,0.05); }
.category-title { font-family:'Playfair Display',serif; font-size:18px; color:var(--gold); }

.activity-item { padding:15px 18px; border-bottom:1px solid rgba(212,175,55,0.08); transition:0.3s; }
.activity-item.match { border-left:4px solid var(--green); background:rgba(76,175,80,0.05); }
.activity-item.limit-active { border-left:4px solid var(--red); background:rgba(244,67,54,0.05); }

.item-grid { display:flex; gap:15px; align-items:flex-start; width: 100%; flex-direction: column; }
.name-col { font-weight:700; font-size:15px; color: #fff; letter-spacing: 0.5px; }
.profile-cols { display:flex; gap:20px; width: 100%; }
.profile-cell { flex:1; display:flex; flex-direction:column; gap:8px; min-width: 0; }

.label-sub { font-size:9px; text-transform:uppercase; color:var(--gold-dim); letter-spacing:1px; margin-bottom: 2px; }

let APP_STATE = { p1: { data: [], history: [] }, p2: { data: [], history: [] } };
let activeP = 'p1', activeTab = 'all', isCompare = false, activeFilters = new Set(), searchQ = '', comparisonData = null;

function init() {
  const saved = localStorage.getItem('bdsm_checklist_vULTIMATE_SYNC');
  if (saved) { APP_STATE = JSON.parse(saved); } else {
    DATABASE_TEMPLATE.forEach(cat => {
      APP_STATE.p1.data.push({ id: cat.id, label: cat.label, items: cat.items.map(n => buildItem(n, AUDIT_ANDY[n])) });
      APP_STATE.p2.data.push({ id: cat.id, label: cat.label, items: cat.items.map(n => buildItem(n, AUDIT_BECCA[n])) });
    });
    createSnapshotEntry('p1', 'March 2026 Baseline'); createSnapshotEntry('p2', 'March 2026 Baseline');
  }
  if(APP_STATE.p1.history.length > 0) APP_STATE.p1.data = JSON.parse(JSON.stringify(APP_STATE.p1.history[0].data));
  if(APP_STATE.p2.history.length > 0) APP_STATE.p2.data = JSON.parse(JSON.stringify(APP_STATE.p2.history[0].data));
  const nav = document.getElementById('tabsNav');
  DATABASE_TEMPLATE.forEach(c => {
    const b = document.createElement('button'); b.className = 'tab-btn'; b.textContent = c.label;
    b.onclick = () => setTab(c.id, b); nav.appendChild(b);
  });
  render(); updateHistDropdown();
}

function buildItem(name, audit) { return { n: name, tried: audit?.t||'', rating: audit?.r||'', role: audit?.ro||'', limit: audit?.l||'', motive: audit?.m||'', note: audit?.n||'' }; }
function createSnapshotEntry(p, name) { APP_STATE[p].history.unshift({ id: Date.now() + (p==='p2'?1:0), name, date: '3/31/2026', data: JSON.parse(JSON.stringify(APP_STATE[p].data)) }); }
function setProfile(p) {
  activeP = p; isCompare = false; comparisonData = null;
  document.getElementById('profileSwitcher').className = `profile-switcher ${p}-active`;
  document.getElementById('p1-btn').classList.toggle('active', p === 'p1');
  document.getElementById('p2-btn').classList.toggle('active', p === 'p2');
  render(); updateHistDropdown();
}
function setTab(id, btn) { activeTab = id; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); }
function toggleCompare() { isCompare = !isCompare; comparisonData = null; render(); }
function handleSearch(v) { searchQ = v.toLowerCase(); render(); }
function toggleFilter(f, btn) { if(activeFilters.has(f)) activeFilters.delete(f); else activeFilters.add(f); btn.classList.toggle('active'); render(); }
function clearFilters() { activeFilters.clear(); searchQ = ''; document.getElementById('searchInput').value = ''; document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active')); render(); }
function save() { localStorage.setItem('bdsm_checklist_vULTIMATE_SYNC', JSON.stringify(APP_STATE)); document.getElementById('saveLabel').textContent = 'Saved'; }
function openSnapshotModal() { document.getElementById('snapModal').style.display='block'; }
function closeSnapshotModal() { document.getElementById('snapModal').style.display='none'; }
function saveSnapshot() {
  const name = document.getElementById('snapName').value || 'Snapshot';
  APP_STATE[activeP].history.unshift({ id: Date.now(), name, date: new Date().toLocaleDateString(), data: JSON.parse(JSON.stringify(APP_STATE[activeP].data)) });
  save(); updateHistDropdown(); closeSnapshotModal(); render();
}
function updateHistDropdown() {
  const d = document.getElementById('historySelect'); d.innerHTML = '<option value="">History Vault</option>';
  APP_STATE[activeP].history.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = `${s.name} (${s.date})`; d.appendChild(o); });
}
function compareHistory(id) { const snap = APP_STATE[activeP].history.find(h => h.id == id); comparisonData = snap ? snap.data : null; isCompare = false; render(); }

function render() {
  const main = document.getElementById('mainContent');
  const cats = activeTab === 'all' ? APP_STATE[activeP].data : APP_STATE[activeP].data.filter(c => c.id == activeTab);
  let html = '';
  cats.forEach(cat => {
    const visItems = cat.items.filter(item => {
      const matchesSearch = item.n.toLowerCase().includes(searchQ);
      if (activeFilters.size === 0) return matchesSearch;
      let m = false;
      if (activeFilters.has('tried') && item.tried === 'yes') m = true;
      if (activeFilters.has('loved') && item.rating === 'Loved it') m = true;
      if (activeFilters.has('limit') && item.limit) m = true;
      return matchesSearch && m;
    });
    if (visItems.length === 0) return;
    html += `<div class="category-section"><div class="category-header"><span class="category-title">${cat.label}</span></div><div class="category-body">`;
    visItems.forEach((item) => {
      const idx = cat.items.indexOf(item);
      let isMatch = false, hasLimit = false;
      if(isCompare) {
        const p1 = APP_STATE.p1.data.find(c=>c.id===cat.id).items[idx];
        const p2 = APP_STATE.p2.data.find(c=>c.id===cat.id).items[idx];
        isMatch = (p1.tried==='yes' || p1.tried==='no-want') && (p2.tried==='yes' || p2.tried==='no-want');
        hasLimit = p1.limit==='Hard Limit' || p2.limit==='Hard Limit';
      }
      html += `<div class="activity-item ${isCompare && isMatch ? 'match' : ''} ${isCompare && hasLimit ? 'limit-active' : ''}">
        <div class="item-grid"><div class="name-col">${item.n} ${isCompare && isMatch ? '<br><span style="color:var(--green); font-size:7px;">✦ MUTUAL</span>' : ''}</div><div class="profile-cols">
            ${isCompare ? renderCell(APP_STATE.p1.data.find(c=>c.id==cat.id).items[idx], 'Andy', 'p1', cat.id, idx) : ''}
            ${isCompare ? renderCell(APP_STATE.p2.data.find(c=>c.id==cat.id).items[idx], 'Becca', 'p2', cat.id, idx) : ''}
            ${!isCompare ? renderCell(item, activeP==='p1'?'Andy':'Becca', activeP, cat.id, idx) : ''}
        </div></div>${!isCompare ? `<input type="text" class="note-input" placeholder="Notes..." value="${item.note || ''}" onchange="updateNote('${cat.id}', ${idx}, this.value)">` : ''}</div>`;
    });
    html += `</div></div>`;
  });
  main.innerHTML = html || '<div style="text-align:center; padding:30px; color:#444; font-size:10px;">No matches.</div>';
  updateStats();
}

function renderCell(res, name, pKey, cid, idx) {
  const isEdit = activeP === pKey && !isCompare && !comparisonData;
  return `<div class="profile-cell" style="opacity:${isCompare || activeP===pKey ? '1' : '0.2'}"><div class="label-sub">${name}</div><div class="kink-grid">
        <div class="kink-pill ${res.tried==='yes'?'status-yes':(res.tried==='no-want'?'status-want':'')}" onclick="${isEdit ? `triggerSheet('${cid}', ${idx}, 'tried')` : ''}"><span class="pill-label">Try</span>${res.tried==='yes'?'✓ YES':(res.tried==='no-want'?'+ WANT':'STATE')}</div>
        <div class="kink-pill ${res.rating==='Loved it'?'status-yes':''}" onclick="${isEdit ? `triggerSheet('${cid}', ${idx}, 'rating')` : ''}"><span class="pill-label">Rate</span>${res.rating ? (res.rating==='Take it or leave it'?'LEAVE':res.rating.substring(0,5).toUpperCase()) : 'RATE'}</div>
        <div class="kink-pill ${res.limit?'status-limit':''}" onclick="${isEdit ? `triggerSheet('${cid}', ${idx}, 'limit')` : ''}"><span class="pill-label">Limit</span>${res.limit?(res.limit==='Hard Limit'?'✕ HARD':'△ SOFT'):'○ LIMIT'}</div>
  </div><div class="kink-grid-row2">
        <div class="kink-pill" onclick="${isEdit ? `triggerSheet('${cid}', ${idx}, 'role')` : ''}"><span class="pill-label">Role</span>${res.role ? res.role.substring(0,4).toUpperCase() : 'ROLE'}</div>
        <div class="kink-pill" onclick="${isEdit ? `triggerSheet('${cid}', ${idx}, 'motive')` : ''}"><span class="pill-label">Why</span>${res.motive ? res.motive.substring(0,5).toUpperCase() : 'WHY'}</div>
  </div></div>`;
}

function openSheet(cid, idx, field, title, opts) {
  sheetCtx = { cid, idx, field };
  document.getElementById('sheetTitle').textContent = title;
  document.getElementById('sheetSubtitle').textContent = APP_STATE[activeP].data.find(c=>c.id==cid).items[idx].n;
  const cont = document.getElementById('sheetOptions'); cont.innerHTML = '';
  opts.forEach(o => {
    const d = document.createElement('div'); d.className = 'sheet-option';
    d.onclick = () => { APP_STATE[activeP].data.find(c=>c.id==cid).items[idx][field] = o.val; save(); render(); closeSheet(); };
    d.innerHTML = `<span style="font-size:14px; color:${o.col || 'var(--gold)'}">${o.icon}</span><span style="font-weight:600; font-size:11px; color:white;">${o.lab}</span>`;
    cont.appendChild(d);
  });
  document.getElementById('sheetOverlay').style.display='block'; document.getElementById('bottomSheet').classList.add('open');
}

function triggerSheet(cid, i, f) {
  if(f==='limit') openSheet(cid, i, 'limit', 'Boundaries', [{lab:'No Limit', val:'', icon:'○'}, {lab:'Soft Limit', val:'Soft Limit', icon:'△', col:'var(--gold)'}, {lab:'Hard Limit', val:'Hard Limit', icon:'✕', col:'var(--red)'}]);
  if(f==='tried') openSheet(cid, i, 'tried', 'Experience', [{lab:'Yes', val:'yes', icon:'✓', col:'var(--green)'}, {lab:'No but I want to', val:'no-want', icon:'+', col:'var(--gold)'}, {lab:'No and I don\'t want to', val:'no-dont', icon:'✕', col:'#666'}]);
  if(f==='rating') openSheet(cid, i, 'rating', 'Rating', [{lab:'Loved it', val:'Loved it', icon:'★'}, {lab:'Liked it', val:'Liked it', icon:'♥'}, {lab:'Take it or leave it', val:'Take it or leave it', icon:'~'}, {lab:'Fetish', val:'Fetish', icon:'✦', col:'#bf953f'}]);
  if(f==='role') openSheet(cid, i, 'role', 'Role', [{lab:'Giving', val:'Giving', icon:'↓'}, {lab:'Receiving', val:'Receiving', icon:'↑'}, {lab:'Both', val:'Both', icon:'↕'}, {lab:'Wearing', val:'Wearing', icon:'👗'}, {lab:'Others Wearing', val:'Others Wearing', icon:'👁️'}]);
  if(f==='motive') openSheet(cid, i, 'motive', 'Motivation', [{lab:'Arousal', val:'Arousal', icon:'🔥'}, {lab:'Discipline', val:'Discipline', icon:'⚖️'}, {lab:'Fun', val:'Fun', icon:'🎈'}, {lab:'Stress Relief', val:'Stress Relief', icon:'🧘'}]);
}

function closeSheet() { document.getElementById('sheetOverlay').style.display='none'; document.getElementById('bottomSheet').classList.remove('open'); }
function updateNote(cid, idx, val) { APP_STATE[activeP].data.find(c=>c.id==cid).items[idx].note = val; save(); }
function resetApp() { if(confirm("Clear current progress? Snapshot will stay.")) { localStorage.removeItem('bdsm_checklist_vULTIMATE_SYNC'); location.reload(); } }

function updateStats() {
  let t=0, l=0, w=0, lim=0, f=0;
  APP_STATE[activeP].data.forEach(c => c.items.forEach(i => { if(i.tried==='yes') t++; if(i.rating==='Loved it') l++; if(i.rating==='Fetish') f++; if(i.tried==='no-want') w++; if(i.limit) lim++; }));
  document.getElementById('statTried').textContent = t+' Tried'; document.getElementById('statLoved').textContent = l+' Loved';
  document.getElementById('statFetish').textContent = f+' Fetish'; document.getElementById('statWant').textContent = w+' Want'; document.getElementById('statLimit').textContent = lim+' Limits';
}
