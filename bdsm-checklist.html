.slider-bg { position:absolute; top:4px; left:4px; width:calc(50% - 4px); height:calc(100% - 8px); background:var(--luxury-gradient); border-radius:25px; transition:0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index:1; }

.persistence-bar { display:flex; justify-content:center; align-items:center; gap:12px; padding:10px; background:rgba(8,18,38,0.7); border-bottom:1px solid var(--border); font-size:10px; color:var(--gold-dim); }

.score-ring { display: inline-block; position: relative; width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; transition: 1s ease-out; }
.score-ring::after { content: attr(data-score); position: absolute; top: 10px; left: 10px; width: 80px; height: 80px; background: var(--midnight); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display'; font-size: 24px; color: var(--gold); }
.score-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #888; }

.search-container { display: flex; gap: 10px; margin-bottom: 15px; }
.search-input { background:rgba(8,18,38,0.9); border: 1.5px solid var(--border); border-radius:30px; color:white; padding:12px 20px; font-size:14px; flex:1; outline:none; }
.adv-filter-btn { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); border-radius: 30px; padding: 0 15px; font-size: 9px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
.adv-filter-btn.active { background: var(--gold); color: var(--midnight); }

.category-section { background:var(--glass); border:1px solid var(--border); border-radius:15px; margin-bottom:30px; overflow:hidden; }

.activity-item { padding:20px; border-bottom:1px solid rgba(212,175,55,0.08); }

.desc-text { font-size: 11px; color: #888; font-style: italic; line-height: 1.4; display: block; }

.unified-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.unified-grid-row2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 8px; }

.pill-unified {

function buildItem(n, d, a) { return { n, d, tried: a?.t||'', rating: a?.r||'', role: a?.ro||'', limit: a?.l||'', motive: a?.m||'', note: a?.n||'' }; }

function render() {
  const main = document.getElementById('mainContent');
  const cats = activeTab === 'all' ? APP_STATE[activeP].data : APP_STATE[activeP].data.filter(c => c.id == activeTab);
  let html = '';
  
  if (isCompare) { document.getElementById('scoreCard').style.display = 'block'; calculateSynergy(); } 
  else { document.getElementById('scoreCard').style.display = 'none'; }

  cats.forEach(cat => {
    const vis = cat.items.filter(i => {
        const mT = i.n.toLowerCase().includes(searchQ) || i.d.toLowerCase().includes(searchQ);
        const mF = Object.keys(filters).every(k => filters[k].length === 0 || filters[k].includes(i[k]));
        return mT && mF;
    });
    if (vis.length === 0) return;
    html += `<div class="category-section"><div class="category-header"><span class="category-title">${cat.label}</span></div><div class="category-body">`;
    vis.forEach((item) => {
      const idx = cat.items.indexOf(item);
      const p1 = APP_STATE.p1.data.find(c=>c.id===cat.id).items[idx];
      const p2 = APP_STATE.p2.data.find(c=>c.id===cat.id).items[idx];
      const isM = (p1.tried==='yes' || p1.tried==='no-want') && (p2.tried==='yes' || p2.tried==='no-want');

      html += `<div class="activity-item ${isCompare && isM ? 'match' : ''}">

        ${isCompare ? renderUnifiedPillar(p1, p2) : renderSinglePillar(item, cat.id, idx)}

    });

  });

        ${uPill('Motivation', 'motive', p1.motive, p2.motive)}

}

function uPill(label, key, v1, v2) {
    const active = v1 || v2 ? 'active-pill' : '';

    const i2 = ICONS[key] ? (ICONS[key][v2] || '-') : (v2 ? v2.charAt(0) : '-');
    return `<div class="pill-unified ${active}">
        <span class="pill-label">${label}</span>
        <div class="pill-values">
            <div class="val-box"><span class="val-id">A</span><span class="val-icon">${i1}</span></div>

function calculateSynergy() {
    let totalAct = 0, mutualAct = 0;
    DATABASE_TEMPLATE.forEach(templateCat => {
        const p1Cat = APP_STATE.p1.data.find(c => c.id === templateCat.id);
        const p2Cat = APP_STATE.p2.data.find(c => c.id === templateCat.id);
        templateCat.items.forEach((item, idx) => {
            const i1 = p1Cat.items[idx], i2 = p2Cat.items[idx];
            const hasP1 = i1.tried === 'yes' || i1.tried === 'no-want';
            const hasP2 = i2.tried === 'yes' || i2.tried === 'no-want';
            if (hasP1 || hasP2) totalAct++;
            if (hasP1 && hasP2) mutualAct++;
        });
    });
    const percent = totalAct > 0 ? Math.round((mutualAct / totalAct) * 100) : 0;
    const ring = document.getElementById('scoreRing');
    ring.setAttribute('data-score', percent + '%');
    ring.style.background = `conic-gradient(var(--green) ${percent}%, #111 ${percent}%)`;
}

function renderFilterDashboard() {

    Object.keys(CONFIG).forEach(key => {
        const cat = CONFIG[key];
        let h = `<div class="filter-category"><div class="filter-cat-title">${cat.t}</div><div class="filter-options">`;

            const isSel = filters[key].includes(opt);

        });
        h += `</div></div>`; dash.innerHTML += h;
    });
}
