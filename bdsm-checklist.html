        mySnap.docs.forEach(d => myData[d.id] = d.data().v);

        if (relId && relId !== myUid) {
          const partnerSnap = await getDocs(dataCol('checklist', relId));
          partnerData = {};
          partnerSnap.docs.forEach(d => partnerData[d.id] = d.data().v);
        }

        // Load custom items
        if (relId && relId !== "solo_" + myUid) {
          const customSnap = await getDocs(dataCol('checklistCustom', relId));
          customItems = customSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        }

        setupIdentity();
        buildAll();
        document.getElementById('loadingOverlay').classList.add('hidden');

        const savedView = localStorage.getItem('checklist_view_mode') || 'both';
        setViewMode(savedView);

        // Real-time sync
        onSnapshot(dataCol('checklist', myUid), snap => {
          myData = {};
          snap.docs.forEach(d => myData[d.id] = d.data().v);
          refreshAll();
        });

        if (relId && relId !== myUid) {
          onSnapshot(dataCol('checklist', relId), snap => {
            partnerData = {};
            snap.docs.forEach(d => partnerData[d.id] = d.data().v);
            refreshAll();
          });
        }

      } catch (e) {
        console.error("Init failed:", e);
        document.getElementById('loadingOverlay').classList.add('hidden');
      }
    }

    function setupIdentity() {
      const pill = document.getElementById('userPill');
      if (pill) pill.classList.add(myRole);
      const pillName = document.getElementById('userPillName');
      if (pillName) pillName.textContent = myName;
    }

    function refreshAll() {
      buildStats();
      updateAllCardAccents();
    }

    function buildAll() {
      buildCategoryTabs();
      Object.keys(template.base).forEach(cat => buildCatPanel(cat, template.base[cat]));
      renderCustomItems();
      buildStats();
      setSaveStatus('', '—');
    }

    function buildCategoryTabs() {
      const container = document.getElementById('categoryTabs');
      container.innerHTML = '';
      
      const allTab = document.createElement('div');
      allTab.className = 'tab-btn active';
      allTab.textContent = 'All';
      allTab.onclick = () => showTab('all', allTab);
      container.appendChild(allTab);

      Object.keys(template.base).forEach(cat => {
        const btn = document.createElement('div');
        btn.className = 'tab-btn';
        btn.textContent = cat.split(' ')[0];
        btn.onclick = () => showTab(cat, btn);
        container.appendChild(btn);
      });

      if (customItems.length > 0) {
        const customBtn = document.createElement('div');
        customBtn.className = 'tab-btn';
        customBtn.textContent = 'Custom';
        customBtn.onclick = () => showTab('custom', customBtn);
        container.appendChild(customBtn);
      }
    }

    function showTab(cat, btn) {
      document.querySelectorAll('#categoryTabs .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
      
      if (cat === 'all') {
        document.querySelectorAll('.section-panel').forEach(p => p.classList.add('active'));
      } else if (cat === 'custom') {
        const customPanel = document.getElementById('panel-custom');
        if (customPanel) customPanel.classList.add('active');
      } else {
        const panel = document.getElementById('panel-' + cat);
        if (panel) panel.classList.add('active');
      }
    }

    function buildCard(cat, item, isCustom = false) {
      const activity = item.a || item.activity;
      const key = ik(cat, activity);
      const sid = key.replace(/[^a-z0-9]/gi, '_');
      const pPfx = myRole === 'dom' ? 'sub' : 'dom';

      const myT = myData[key + '.t'] ?? bv(item, myRole, 'T') ?? '';
      const myR = myData[key + '.r'] ?? bv(item, myRole, 'R') ?? '';
      const myA = myData[key + '.a'] ?? bv(item, myRole, 'A') ?? '';
      const mySw = myData[key + '.sw'] ?? bv(item, myRole, 'S') ?? '';
      const myNs = myData[key + '.ns'] ?? '';

      const pT = partnerData[key + '.t'] ?? bv(item, pPfx, 'T') ?? '';
      const pR = partnerData[key + '.r'] ?? bv(item, pPfx, 'R') ?? '';
      const pA = partnerData[key + '.a'] ?? bv(item, pPfx, 'A') ?? '';
      const pSw = partnerData[key + '.sw'] ?? bv(item, pPfx, 'S') ?? '';
      const pNs = partnerData[key + '.ns'] ?? '';

      const s1 = getStatusIcon(myT, myR, myA);
      const s2 = getStatusIcon(pT, pR, pA);
      const statusPair = `<div class="status-pair"><div class="sp-side me ${s1.c}">${s1.i}</div><div class="sp-divider"></div><div class="sp-side them ${s2.c}">${s2.i}</div></div>`;

      const accent = getAccent(myA, pA, myR, pR, isCustom, myData[key + '.flagged']);
      const cBadge = isCustom ? `<span class="badge custom">Custom</span>` : '';
      const sBadge = myData[key + '.flagged'] ? `<span class="badge scene">⚑ Scene</span>` : '';
      const delBtn = isCustom ? `<button class="btn-icon" style="margin-left:auto;" onclick="event.stopPropagation();delCustom('${item.id}')">✕</button>` : '';

      const lastUpdate = myData[key + '.ts'] || partnerData[key + '.ts'] || 0;
      const isRecent = (Date.now() - lastUpdate) < (24 * 60 * 60 * 1000);
      const updateIndicator = isRecent ? '<span style="color:#D4AF37; font-size:10px; margin-right:4px;">●</span>' : '';

      return `
<div class="activity-card ${accent}" id="c_${sid}" data-cat="${cat}" data-act="${activity}" onclick="toggleCard(this)">
  <div class="card-header">
    <div class="activity-name">${updateIndicator}${activity}</div>
    <div class="badge-row">${statusPair}${cBadge}${sBadge}</div>
    ${delBtn}
    <button class="flag-btn ${myData[key + '.flagged'] ? 'flagged' : ''}" onclick="event.stopPropagation();toggleFlag('${key}')">⚑</button>
    <span class="expand-icon">▾</span>
  </div>
  <div class="card-body">
    <div class="response-grid">
      <div class="response-col">
        <div class="col-title">${myName} (you)</div>
        <div class="field-row">
          <div class="field-label">My role</div>
          ${switchRow(key + '.sw', mySw)}
        </div>
        <div class="field-row">
          <div class="field-label">Tried it?</div>
          ${segControl(key + '.t', myT)}
        </div>
        <div class="field-row">
          <div class="field-label">Rating</div>
          ${ratingIcons(key + '.r', myR)}
        </div>
        <div class="field-row">
          <div class="field-label">Do again?</div>
          ${smartBadgeHtml(key + '.a', myA)}
        </div>
        <div class="field-row">
          <div class="field-label">💬 Note to partner</div>
          <textarea class="form-textarea" rows="2" data-sk="${key}.ns" oninput="schedSave()" style="font-size:12px; padding:8px;">${myNs}</textarea>
        </div>
      </div>
      <div class="response-col">
        <div class="col-title">${partnerName}</div>
        <div class="field-row">
          <div class="field-label">Their role</div>
          <div class="partner-val ${!v(pSw) ? 'empty' : ''}">${v(pSw) || '—'}</div>
        </div>
        <div class="field-row">
          <div class="field-label">Tried it?</div>
          <div class="partner-val ${!v(pT) ? 'empty' : ''}">${v(pT) || '—'}</div>
        </div>
        <div class="field-row">
          <div class="field-label">Rating</div>
          <div class="partner-val ${!v(pR) ? 'empty' : ''}">${v(pR) || '—'}</div>
        </div>
        <div class="field-row">
          <div class="field-label">Do again?</div>
          <div class="partner-val ${!v(pA) ? 'empty' : ''}">${v(pA) || '—'}</div>
        </div>
        ${v(pNs) ? `<div class="field-row"><div class="field-label">💬 Their note</div><div class="partner-note">${pNs}</div></div>` : ''}
      </div>
    </div>
  </div>
</div>`;
    }

    function buildCatPanel(cat, items) {
      const div = document.createElement('div');
      div.className = 'section-panel glass-card';
      div.id = 'panel-' + cat;
      div.innerHTML = items.map(i => buildCard(cat, i)).join('');
      document.getElementById('catPanels').appendChild(div);
    }

    function renderCustomItems() {
      const existing = document.getElementById('panel-custom');
      if (existing) existing.remove();

      if (customItems.length === 0) return;

      const div = document.createElement('div');
      div.className = 'section-panel glass-card';
      div.id = 'panel-custom';
      div.innerHTML = customItems.map(item => buildCard('Custom', item, true)).join('');
      document.getElementById('catPanels').appendChild(div);
    }

    // === HELPER FUNCTIONS (kept from original) ===
    function ik(cat, act) { return cat.toLowerCase().replace(/\s+/g,'_') + '|' + act.toLowerCase().replace(/\s+/g,'_'); }
    function v(val) { return val && val !== '' ? val : ''; }
    function bv(item, role, field) {
      if (!item[role]) return '';
      const map = { T: 't', R: 'r', A: 'a', S: 'sw' };
      return item[role][map[field]] || '';
    }

    function getStatusIcon(t, r, a) {
      if (a.includes('Hard Limit')) return { i: '✕', c: 'danger' };
      if (a.includes('Fetish')) return { i: '⚡', c: 'gold' };
      if (r.includes('Loved')) return { i: '❤️', c: 'success' };
      if (r.includes('Liked')) return { i: '👍', c: 'blue' };
      if (t === 'Yes') return { i: '✓', c: '' };
      return { i: '—', c: '' };
    }

    function getAccent(myA, pA, myR, pR, isCustom, flagged) {
      if (isCustom) return 'custom-item';
      if (flagged) return 'scene-flagged';
      if (myA.includes('Hard Limit') || pA.includes('Hard Limit')) return 'hard-limit';
      if (myA.includes('Fetish') && pA.includes('Fetish')) return 'fetish-flag';
      if (myR.includes('Loved') && pR.includes('Loved')) return 'loved-both';
      return '';
    }

    function updateAllCardAccents() {
      const pPfx = myRole === 'dom' ? 'sub' : 'dom';
      document.querySelectorAll('.activity-card[data-cat]').forEach(card => {
        const cat = card.dataset.cat, act = card.dataset.act, key = ik(cat, act);
        const myA = myData[key + '.a'] ?? '', pA = partnerData[key + '.a'] ?? '';
        const myR = myData[key + '.r'] ?? '', pR = partnerData[key + '.r'] ?? '';
        card.classList.remove('hard-limit', 'fetish-flag', 'loved-both', 'scene-flagged', 'custom-item');
        const accent = getAccent(myA, pA, myR, pR, card.classList.contains('custom-item'), myData[key + '.flagged']);
        if (accent) card.classList.add(accent);
      });
    }

    const SWITCH_OPTS = ['Giving', 'Receiving', 'Both', 'Wearing', 'Others Wearing', 'Not Applicable'];
    function switchRow(sk, val) {
      return `<div class="switch-row">${SWITCH_OPTS.map(o => 
        `<div class="switch-opt${val === o ? ' active-sw' : ''}" onclick="setSwitchOpt(this,'${sk}','${o}')">${o}</div>`
      ).join('')}</div>`;
    }

    function segControl(sk, val) {
      const isYes = val === 'Yes', isWant = val === 'No but I want to', isNo = val === SEG_NO;
      return `<div class="seg-control">
        <button class="seg-btn${isYes ? ' active-yes' : ''}" onclick="setSeg(this,'${sk}','Yes')">Yes</button>
        <button class="seg-btn${isWant ? ' active-want' : ''}" onclick="setSeg(this,'${sk}','No but I want to')">Want to</button>
        <button class="seg-btn${isNo ? ' active-no' : ''}" onclick="setSeg(this,'${sk}',SEG_NO)">No</button>
      </div>`;
    }

    const RATING_OPTS = [
      { val: 'Loved it', icon: '❤️', lbl: 'Loved', cls: 'active-loved' },
      { val: 'Liked it', icon: '👍', lbl: 'Liked', cls: 'active-liked' },
      { val: 'Take it or leave it', icon: '😐', lbl: 'Neutral', cls: 'active-meh' },
      { val: 'Not Applicable', icon: '—', lbl: 'N/A', cls: 'active-na' },
    ];
    function ratingIcons(sk, val) {
      return `<div class="rating-row">${RATING_OPTS.map(o => 
        `<div class="rating-opt${val === o.val ? ' ' + o.cls : ''}" onclick="setRating(this,'${sk}','${o.val}')"><span class="r-icon">${o.icon}</span><span class="r-lbl">${o.lbl}</span></div>`
      ).join('')}</div>`;
    }

    const AGAIN_OPTS = [
      { val: 'Fetish/Need', cls: 'sb-fetish', label: '⚡ Fetish/Need' },
      { val: 'Yes', cls: 'sb-yes', label: '✓ Yes' },
      { val: 'Maybe', cls: 'sb-maybe', label: '~ Maybe' },
      { val: 'Unlikely. Soft Limit', cls: 'sb-soft', label: '⚠ Soft Limit' },
      { val: 'Never. Hard Limit', cls: 'sb-hard', label: '✕ Hard Limit' },
      { val: 'Not Applicable', cls: 'sb-na', label: '— N/A' },
    ];

    function smartBadgeHtml(sk, val) {
      const opt = AGAIN_OPTS.find(o => o.val === val);
      return `<div class="smart-badge" onclick="openAgainSheet('${sk}')" data-sk-again="${sk}"><span class="sb-label">${opt ? opt.label : 'Tap to set…'}</span><span class="sb-arrow">▾</span></div>`;
    }

    let againSheetKey = null;
    window.openAgainSheet = function(sk) {
      againSheetKey = sk;
      const current = myData[sk] ?? '';
      const SHEET_OPTS = [
        { val: 'Fetish/Need', cls: 'ao-fetish', label: '⚡ Fetish/Need' },
        { val: 'Yes', cls: 'ao-yes', label: '✓ Yes' },
        { val: 'Maybe', cls: 'ao-maybe', label: '~ Maybe' },
        { val: 'Unlikely. Soft Limit', cls: 'ao-soft', label: '⚠ Soft Limit' },
        { val: 'Never. Hard Limit', cls: 'ao-hard', label: '✕ Hard Limit' },
        { val: 'Not Applicable', cls: 'ao-na', label: '— N/A' },
        { val: '', cls: 'ao-clear', label: 'Clear' },
      ];
      document.getElementById('againSheetOptions').innerHTML = SHEET_OPTS.map(o => 
        `<div class="smart-badge" style="margin:4px 0;" onclick="pickAgain('${o.val}')"><span class="sb-label">${o.label}</span></div>`
      ).join('');
      document.getElementById('againSheetOverlay').classList.add('open');
    };

    window.pickAgain = function(val) {
      myData[againSheetKey] = val; schedSave();
      const badge = document.querySelector(`[data-sk-again="${againSheetKey}"]`);
      const opt = AGAIN_OPTS.find(o => o.val === val);
      if (badge) {
        badge.querySelector('.sb-label').textContent = opt ? opt.label : 'Tap to set…';
      }
      onFCKey(againSheetKey);
      document.getElementById('againSheetOverlay').classList.remove('open');
    };

    window.closeAgainSheet = function(e) {
      if (!e || e.target.id === 'againSheetOverlay') {
        document.getElementById('againSheetOverlay').classList.remove('open');
      }
    };

    window.setSwitchOpt = function(el, sk, val) {
      const isActive = el.classList.contains('active-sw');
      myData[sk] = isActive ? '' : val; schedSave();
      el.closest('.switch-row').querySelectorAll('.switch-opt').forEach(o => o.classList.toggle('active-sw', o === el && !isActive));
    };

    window.setSeg = function(btn, sk, val) {
      myData[sk] = val; schedSave();
      btn.closest('.seg-control').querySelectorAll('.seg-btn').forEach(b => b.className = 'seg-btn');
      btn.className = 'seg-btn ' + (val === 'Yes' ? 'active-yes' : val === SEG_NO ? 'active-no' : 'active-want');
      onFCKey(sk);
    };

    window.setRating = function(el, sk, val) {
      myData[sk] = val; schedSave();
      el.closest('.rating-row').querySelectorAll('.rating-opt').forEach(o => o.classList.remove('active-loved', 'active-liked', 'active-meh', 'active-na'));
      el.classList.add(RATING_OPTS.find(o => o.val === val).cls);
      onFCKey(sk);
    };

    function onFCKey(sk) {
      const k = sk.replace(/\.[a-z]{1,3}$/, '');
      const sid = k.replace(/[^a-z0-9]/gi, '_');
      const card = document.getElementById('c_' + sid);
      if (card) {
        const cat = card.dataset.cat, act = card.dataset.act, key = ik(cat, act);
        const myA = myData[key + '.a'] ?? '', pA = partnerData[key + '.a'] ?? '';
        const myR = myData[key + '.r'] ?? '', pR = partnerData[key + '.r'] ?? '';
        card.classList.remove('hard-limit', 'fetish-flag', 'loved-both', 'scene-flagged');
        const accent = getAccent(myA, pA, myR, pR, card.classList.contains('custom-item'), myData[key + '.flagged']);
        if (accent) card.classList.add(accent);
      }
      buildStats();
      applyFilters();
    }

    window.toggleFlag = function(key) {
      myData[key + '.flagged'] = !myData[key + '.flagged']; schedSave();
      const sid = key.replace(/[^a-z0-9]/gi, '_');
      const card = document.getElementById('c_' + sid);
      if (card) {
        card.querySelector('.flag-btn').classList.toggle('flagged', myData[key + '.flagged']);
        onFCKey(key + '.f');
      }
    };

    window.toggleCard = function(h) {
      h.closest('.activity-card').classList.toggle('open');
    };

    window.setViewMode = function(mode) {
      document.body.classList.remove('view-me', 'view-partner', 'view-both');
      document.body.classList.add('view-' + mode);
      document.querySelectorAll('.view-opt').forEach(opt => opt.classList.toggle('active', opt.dataset.view === mode));
      localStorage.setItem('checklist_view_mode', mode);
    };

    // === STATS ===
    function buildStats() {
      let total = 0, loved = 0, hard = 0, custom = customItems.length;

      Object.keys(template.base).forEach(cat => {
        template.base[cat].forEach(item => {
          total++;
          const key = ik(cat, item.a);
          const myA = myData[key + '.a'] || '';
          const myR = myData[key + '.r'] || '';
          if (myA.includes('Fetish') || myR.includes('Loved')) loved++;
          if (myA.includes('Hard Limit')) hard++;
        });
      });

      document.getElementById('stat-total').textContent = total + custom;
      document.getElementById('stat-loved').textContent = loved;
      document.getElementById('stat-hard').textContent = hard;
      document.getElementById('stat-custom').textContent = custom;
    }

    // === FILTERS ===
    window.onSearch = function(val) {
      activeSearch = val.toLowerCase();
      applyFilters();
    };

    window.clearSearch = function() {
      document.getElementById('searchInput').value = '';
      activeSearch = '';
      applyFilters();
    };

    window.toggleChip = function(el, cls) {
      const f = el.dataset.filter;
      if (activeFilters.has(f)) {
        activeFilters.delete(f);
        el.classList.remove('active', cls);
      } else {
        activeFilters.add(f);
        el.classList.add('active', cls);
      }
      applyFilters();
    };

    function applyFilters() {
      const searchTerm = activeSearch;
      const hasFilters = activeFilters.size > 0 && !activeFilters.has('all');

      document.querySelectorAll('.activity-card[data-cat]').forEach(card => {
        const act = card.dataset.act.toLowerCase();
        const cat = card.dataset.cat;
        const key = ik(cat, card.dataset.act);
        const myA = myData[key + '.a'] || '';
        const myR = myData[key + '.r'] || '';

        let visible = true;

        if (searchTerm && !act.includes(searchTerm)) visible = false;

        if (hasFilters) {
          let match = false;
          if (activeFilters.has('loved') && (myA.includes('Fetish') || myR.includes('Loved'))) match = true;
          if (activeFilters.has('hard') && myA.includes('Hard Limit')) match = true;
          if (activeFilters.has('scene') && myData[key + '.flagged']) match = true;
          if (!match && !activeFilters.has('all')) visible = false;
        }

        card.style.display = visible ? 'block' : 'none';
      });
    }

    // === CUSTOM ACTIVITIES ===
    window.addCustomActivity = function() {
      const name = prompt("Enter custom activity name:");
      if (!name || !name.trim()) return;

      const cat = prompt("Category (e.g. Sensation Play, Impact Play, etc.):", "Custom");
      if (!cat) return;

      const id = 'custom_' + Date.now();
      const newItem = {
        id,
        activity: name.trim(),
        category: cat.trim(),
        owner: myRole,
        added: Date.now()
      };

      customItems.push(newItem);
      renderCustomItems();
      buildStats();

      // Save to Firestore
      if (relId) {
        setDoc(doc(dataCol('checklistCustom', relId), id), newItem);
      }

      showToast("Custom activity added", "success");
    };

    window.delCustom = async function(id) {
      if (!confirm("Delete this custom activity?")) return;
      customItems = customItems.filter(i => i.id !== id);
      renderCustomItems();
      buildStats();

      if (relId) {
        await deleteDoc(doc(dataCol('checklistCustom', relId), id));
      }
    };

    // === SAVE ===
    function schedSave() {
      if (saveTimeout) clearTimeout(saveTimeout);
      setSaveStatus('Saving…', 'saving');
      
      saveTimeout = setTimeout(async () => {
        try {
          const updates = [];
          Object.keys(myData).forEach(sk => {
            if (sk.endsWith('.ts')) return;
            updates.push(setDoc(doc(dataCol('checklist', myUid), sk), { v: myData[sk], ts: Date.now() }));
          });
          await Promise.all(updates);
          setSaveStatus('Saved', 'saved');
          setTimeout(() => setSaveStatus('', '—'), 2000);
        } catch (e) {
          setSaveStatus('Error', 'error');
        }
      }, 800);
    }

    function setSaveStatus(text, cls) {
      const el = document.getElementById('saveStatus');
      if (!el) return;
      el.textContent = text;
      el.className = 'save-status ' + cls;
    }

    function showToast(msg, type = 'success') {
      const toast = document.createElement('div');
      toast.style.cssText = `position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:${type === 'success' ? '#27ae60' : '#c0392b'}; color:white; padding:12px 24px; border-radius:30px; font-size:13px; font-weight:700; z-index:9999; box-shadow:0 8px 25px rgba(0,0,0,0.3);`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2200);
    }

    // === INIT ===
    init();
  </script>

  <script src="nav.js"></script>
</body>
</html>
