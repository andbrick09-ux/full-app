          <div class="profile-cols">
            ${isCompare ? renderCell(APP_STATE.p1.data.find(c=>c.id==cat.id).items[idx], 'Andy', 'p1', cat.id, idx) : ''}
            ${isCompare ? renderCell(APP_STATE.p2.data.find(c=>c.id==cat.id).items[idx], 'Becca', 'p2', cat.id, idx) : ''}
            ${!isCompare ? renderCell(item, activeP==='p1'?'Andy':'Becca', activeP, cat.id, idx) : ''}
          </div>
        </div>
        ${!isCompare ? `<input type="text" class="note-input" placeholder="Note..." value="${item.note || ''}" onchange="updateNote('${cat.id}', ${idx}, this.value)">` : ''}
      </div>`;
    });
    html += `</div></div>`;
  });
  main.innerHTML = html || '<div style="text-align:center; padding:40px; color:#444;">No activities match filters.</div>';
  updateStats();
}

function renderCell(res, name, pKey, cid, idx) {
  const isEdit = activeP === pKey && !isCompare && !comparisonData;
  return `
    <div class="profile-cell" style="opacity:${isCompare || activeP===pKey ? '1' : '0.2'}">
      <div class="label-sub">${name}</div>
      <div class="kink-row">
        <div class="kink-pill ${res.limit?'status-limit':''}" onclick="${isEdit ? `triggerSheet('${cid}', ${idx}, 'limit')` : ''}">${res.limit?(res.limit==='hard'?'✕ Hard':'△ Soft'):'○ Limit'}</div>
        <div class="kink-pill ${res.tried==='yes'?'status-yes':(res.tried==='no-want'?'status-want':'')}" onclick="${isEdit ? `triggerSheet('${cid}', ${idx}, 'tried')` : ''}">${res.tried==='yes'?'✓ Tried':(res.tried==='no-want'?'+ Want':'Status')}</div>
        <div class="kink-pill" onclick="${isEdit ? `triggerSheet('${cid}', ${idx}, 'rating')` : ''}">${res.rating.toUpperCase() || 'RATING'}</div>
        <div class="kink-pill" onclick="${isEdit ? `triggerSheet('${cid}', ${idx}, 'role')` : ''}">${res.role.toUpperCase() || 'ROLE'}</div>
        <div class="kink-pill" onclick="${isEdit ? `triggerSheet('${cid}', ${idx}, 'motive')` : ''}">${res.motive.toUpperCase() || 'MOTIVE'}</div>
      </div>
    </div>`;
}

// ── SELECTION LOGIC ────────────────────────────────────────────
function openSheet(cid, idx, field, title, opts) {
  sheetCtx = { cid, idx, field };
  document.getElementById('sheetTitle').textContent = title;
  document.getElementById('sheetSubtitle').textContent = APP_STATE[activeP].data.find(c=>c.id==cid).items[idx].n;
  const cont = document.getElementById('sheetOptions'); cont.innerHTML = '';
  opts.forEach(o => {
    const d = document.createElement('div'); d.className = 'sheet-option';
    d.onclick = () => { APP_STATE[activeP].data.find(c=>c.id==cid).items[idx][field] = o.val; save(); render(); closeSheet(); };
    d.innerHTML = `<span style="font-size:18px; color:${o.col || 'var(--gold)'}">${o.icon}</span><span style="font-weight:600; font-size:13px; color:white;">${o.lab}</span>`;
    cont.appendChild(d);
  });
  document.getElementById('sheetOverlay').style.display='block'; document.getElementById('bottomSheet').classList.add('open');
}

function triggerSheet(cid, i, f) {
  if(f==='limit') openSheet(cid, i, 'limit', 'Boundaries', [{lab:'No Limit', val:'', icon:'○'}, {lab:'Soft Limit', val:'soft', icon:'△', col:'var(--gold)'}, {lab:'Hard Limit', val:'hard', icon:'✕', col:'var(--red)'}]);
  if(f==='tried') openSheet(cid, i, 'tried', 'Experience', [{lab:'Tried It', val:'yes', icon:'✓', col:'var(--green)'}, {lab:'Want to Try', val:'no-want', icon:'+', col:'var(--gold)'}, {lab:'Not Interested', val:'no-dont', icon:'✕', col:'#666'}]);
  if(f==='rating') openSheet(cid, i, 'rating', 'Enthusiasm', [{lab:'Loved It', val:'loved', icon:'★'}, {lab:'Liked It', val:'liked', icon:'♥'}, {lab:'Meh', val:'meh', icon:'~'}, {lab:'Fetish', val:'fetish', icon:'✦', col:'#bf953f'}]);
  if(f==='role') openSheet(cid, i, 'role', 'Role', [{lab:'Giving', val:'Giving', icon:'↓'}, {lab:'Receiving', val:'Receiving', icon:'↑'}, {lab:'Both', val:'Both', icon:'↕'}, {lab:'Wearing', val:'Wearing', icon:'👗'}]);
  if(f==='motive') openSheet(cid, i, 'motive', 'Motivation', [{lab:'Arousal', val:'Arousal', icon:'🔥'}, {lab:'Discipline', val:'Discipline', icon:'⚖️'}, {lab:'Fun', val:'Fun', icon:'🎈'}, {lab:'Stress Relief', val:'Stress Relief', icon:'🧘'}]);
}

function closeSheet() { document.getElementById('sheetOverlay').style.display='none'; document.getElementById('bottomSheet').classList.remove('open'); }
function updateNote(cid, idx, val) { APP_STATE[activeP].data.find(c=>c.id==cid).items[idx].note = val; save(); }
function resetApp() { if(confirm("Clear current progress? History will remain.")) { localStorage.removeItem('partner_portal_v12_ultimate'); location.reload(); } }

function updateStats() {
  let t=0, l=0, w=0, lim=0;
  APP_STATE[activeP].data.forEach(c => c.items.forEach(i => { if(i.tried==='yes') t++; if(i.rating==='loved') l++; if(i.tried==='no-want') w++; if(i.limit) lim++; }));
  document.getElementById('statTried').textContent = t+' Tried'; document.getElementById('statLoved').textContent = l+' Loved';
  document.getElementById('statWant').textContent = w+' Want'; document.getElementById('statLimit').textContent = lim+' Limits';
}
</script>
</body>
</html>
