<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Vault — Sir's Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<style>
  :root {
    /* Rose Gold Overrides for Professional Luxury */
    --rose-gold: #b76e79;
    --rose-gold-light: #e0bfb8;
    --rose-gold-dim: rgba(183, 110, 121, 0.2);
    --rose-gold-border: rgba(183, 110, 121, 0.3);
    --rose-gradient: linear-gradient(135deg, #b76e79, #e0bfb8);
  }

  /* ── Header Gear ── */
  .gear-btn {
    position: absolute;
    right: 14px;
    top: calc(50% + (var(--safe-t) / 2));
    transform: translateY(-50%);
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--rose-gold);
    font-size: 20px;
    opacity: 0.6;
    padding: 10px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
  }
  .gear-btn:active { transform: translateY(-50%) scale(0.9) rotate(45deg); opacity: 1; }

  /* ── Tabs ── */
  .vault-tabs {
    display: flex;
    background: var(--glass2);
    padding: 4px;
    border-radius: 14px;
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .v-tab-btn {
    flex: 1; padding: 10px; border: none; background: transparent;
    color: var(--cream-mute); font-family: 'Montserrat', sans-serif;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; cursor: pointer; border-radius: 10px; transition: 0.3s;
  }
  .v-tab-btn.active { background: var(--rose-gradient); color: var(--midnight); }

  /* ── Inputs ── */
  .search-container { position: relative; margin-bottom: 16px; }
  .vault-input {
    width: 100%; background: var(--glass2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 14px 14px 40px; color: var(--cream);
    font-family: 'Montserrat', sans-serif; font-size: 13px; outline: none;
  }
  .vault-input:focus { border-color: var(--rose-gold); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--rose-gold); opacity: 0.5; }

  /* ── Collection List ── */
  .toy-card {
    background: var(--glass); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    transition: transform 0.2s;
  }
  .toy-card:active { transform: scale(0.98); background: var(--glass2); }
  .toy-owner-bar { width: 4px; height: 32px; border-radius: 2px; }
  .toy-owner-bar.dom { background: var(--rose-gold); }
  .toy-owner-bar.sub { background: var(--cream-mute); }
  
  .toy-info { flex: 1; }
  .toy-name { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--cream); display: block; }
  .toy-cat { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--rose-gold); opacity: 0.7; }

  .rating-summary { text-align: right; }
  .rating-row { font-size: 10px; display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 2px; }
  .star-sm { color: var(--rose-gold); font-size: 8px; }
  .star-sm.dim { opacity: 0.2; }

  /* ── Filter Pills ── */
  .filter-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .pill {
    background: var(--glass2); border: 1px solid var(--border); color: var(--cream-dim);
    padding: 8px 16px; border-radius: 20px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s;
  }
  .pill.active { background: var(--rose-gradient); color: var(--midnight); border-color: transparent; }

  /* ── Rating Inputs ── */
  .star-input-group { display: flex; gap: 8px; margin-top: 6px; }
  .star-input { font-size: 26px; color: var(--border); cursor: pointer; transition: 0.2s; }
  .star-input.active { color: var(--rose-gold); text-shadow: 0 0 10px var(--rose-gold-dim); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: pageIn 0.35s ease; }

  /* Wishlist specific */
  .wish-action-group { display: flex; gap: 8px; margin-top: 15px; }
  .wish-btn {
    background: var(--glass2); border: 1px solid var(--border); color: var(--rose-gold);
    padding: 8px 14px; border-radius: 10px; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
  }
</style>
</head>
<body data-nav="vault">

<header class="topbar-centered">
  <div class="topbar-title">The Vault</div>
  <div class="topbar-sub">Archive & Desires</div>
  <button class="gear-btn" onclick="openCategoryModal()">⚙</button>
</header>

<main class="main">
  <div class="vault-tabs">
    <button class="v-tab-btn active" onclick="switchTab('vault', this)">Collection</button>
    <button class="v-tab-btn" onclick="switchTab('wishlist', this)">Wishlist</button>
  </div>

  <div id="tab-vault" class="tab-panel active">
    <div class="search-container">
      <span class="search-icon">⌕</span>
      <input type="text" id="vault-search" class="vault-input" placeholder="Search the collection..." oninput="renderVault()">
    </div>

    <div class="flex gap-2 mb-8">
      <button class="gold-btn flex-1" style="background: var(--rose-gradient)" onclick="openToyModal()">+ Add Entry</button>
      <button class="outline-btn" style="width: 54px; display: flex; align-items: center; justify-content: center;" onclick="toggleFilters()">⌥</button>
    </div>

    <div id="vault-list"></div>
  </div>

  <div id="tab-wishlist" class="tab-panel">
    <div class="search-container">
      <span class="search-icon">⌕</span>
      <input type="text" id="wish-search" class="vault-input" placeholder="Search desires..." oninput="renderWishlist()">
    </div>
    <button class="gold-btn mb-8" style="background: var(--rose-gradient)" onclick="openWishModal()">+ Add New Desire</button>
    <div id="wish-list" class="menu-grid"></div>
  </div>
</main>

<div id="toy-modal" class="modal-back">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="tmt">Archive Entry</div>
    <div class="space-y-4">
      <div>
        <label class="section-label" style="margin:0; border:none;">Item Name</label>
        <input type="text" id="t-name" class="vault-input" style="padding-left:14px">
      </div>
      <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
          <label class="section-label" style="margin:0; border:none;">Category</label>
          <select id="t-cat" class="vault-input" style="padding-left:14px; appearance:none;"></select>
        </div>
        <div>
          <label class="section-label" style="margin:0; border:none;">Owner</label>
          <select id="t-owner" class="vault-input" style="padding-left:14px;">
            <option value="Dom">Dom</option>
            <option value="Sub">Sub</option>
          </select>
        </div>
      </div>
      <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
          <label class="section-label" style="margin:0; border:none;">Dom Rating</label>
          <div class="star-input-group" id="dom-stars"></div>
          <input type="hidden" id="t-drat" value="0">
        </div>
        <div>
          <label class="section-label" style="margin:0; border:none;">Sub Rating</label>
          <div class="star-input-group" id="sub-stars"></div>
          <input type="hidden" id="t-srat" value="0">
        </div>
      </div>
      <div class="modal-row mt-6">
        <button class="modal-btn modal-btn-cancel" onclick="closeModal('toy-modal')">Cancel</button>
        <button class="gold-btn flex-1" style="background: var(--rose-gradient); padding:14px;" onclick="saveToy()">Save Entry</button>
      </div>
      <button id="toy-delete-btn" class="danger-btn mt-2" style="display:none;">Delete Item</button>
    </div>
  </div>
</div>

<div id="filter-modal" class="modal-back">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="flex justify-between items-center mb-4">
      <div class="modal-title">Filter archives</div>
      <button class="text-[10px] uppercase tracking-widest text-[#888] bg-transparent border-none cursor-pointer" onclick="resetFilters()">Reset</button>
    </div>
    <div class="space-y-6">
      <div>
        <label class="section-label">Show Items For</label>
        <div class="filter-pills" id="f-owner">
          <button class="pill active" data-val="all">All</button>
          <button class="pill" data-val="Dom">Dom</button>
          <button class="pill" data-val="Sub">Sub</button>
        </div>
      </div>
      <div>
        <label class="section-label">Min Rating</label>
        <div class="filter-pills" id="f-rating">
          <button class="pill active" data-val="0">Any</button>
          <button class="pill" data-val="3">3+ ★</button>
          <button class="pill" data-val="4">4+ ★</button>
          <button class="pill" data-val="5">5 ★</button>
        </div>
      </div>
      <button class="gold-btn mt-6" style="background: var(--rose-gradient)" onclick="closeModal('filter-modal')">Apply Filters</button>
    </div>
  </div>
</div>

<div id="category-modal" class="modal-back">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Archive Categories</div>
    <div class="space-y-4">
      <div class="flex gap-2">
        <input type="text" id="cat-new-name" class="vault-input" style="padding-left:14px" placeholder="New category...">
        <button class="gold-btn" style="width:80px; padding:0; background: var(--rose-gradient)" onclick="addCategory()">Add</button>
      </div>
      <div id="category-list" class="space-y-2"></div>
      <button class="modal-btn modal-btn-cancel w-full mt-4" onclick="closeModal('category-modal')">Close</button>
    </div>
  </div>
</div>

<div id="toast-msg" class="toast">Entry Updated</div>

<script type="module">
  // FIREBASE IMPORTS (Placeholder - keep your existing config)
  import { doc, setDoc, deleteDoc, getDocs, collection } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { db } from './firebase-config.js';

  let toys = [];
  let wishes = [];
  let categories = ['Vibration','Insertion','Anal Play','Impact','Other'];
  let filterState = { owner: 'all', minRating: 0 };

  // ─── UI CONTROLS ───
  window.switchTab = (tab, btn) => {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.v-tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    btn.classList.add('active');
  };

  window.closeModal = (id) => document.getElementById(id).classList.remove('open');
  window.toggleFilters = () => document.getElementById('filter-modal').classList.add('open');
  window.openCategoryModal = () => {
    document.getElementById('category-modal').classList.add('open');
    renderCategoryList();
  };

  // ─── STAR LOGIC ───
  function initStarRating(containerId, hiddenId) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const val = parseInt(document.getElementById(hiddenId).value) || 0;
    for (let i = 1; i <= 5; i++) {
      const s = document.createElement('span');
      s.innerHTML = '★';
      s.className = `star-input ${i <= val ? 'active' : ''}`;
      s.onclick = () => {
        document.getElementById(hiddenId).value = i;
        initStarRating(containerId, hiddenId);
      };
      container.appendChild(s);
    }
  }

  // ─── FILTERS ───
  document.querySelectorAll('.filter-pills .pill').forEach(btn => {
    btn.onclick = () => {
      const parent = btn.parentElement;
      parent.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      
      if (parent.id === 'f-owner') filterState.owner = btn.dataset.val;
      if (parent.id === 'f-rating') filterState.minRating = parseInt(btn.dataset.val);
      renderVault();
    };
  });

  window.resetFilters = () => {
    filterState = { owner: 'all', minRating: 0 };
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.filter-pills').forEach(c => c.children[0].classList.add('active'));
    renderVault();
  };

  // ─── RENDERERS ───
  window.renderVault = () => {
    const list = document.getElementById('vault-list');
    const q = document.getElementById('vault-search').value.toLowerCase();
    
    let filtered = toys.filter(t => {
      const matchesOwner = filterState.owner === 'all' || t.owner === filterState.owner;
      const matchesRating = ((t.domRating + t.subRating) / 2) >= filterState.minRating;
      const matchesSearch = !q || t.name.toLowerCase().includes(q);
      return matchesOwner && matchesRating && matchesSearch;
    });

    // Grouping by Category
    const grouped = {};
    categories.forEach(c => grouped[c] = []);
    filtered.forEach(t => {
      if (!grouped[t.category]) grouped['Other'].push(t);
      else grouped[t.category].push(t);
    });

    list.innerHTML = categories.map(cat => {
      if (!grouped[cat].length) return '';
      return `
        <div class="acc-item open">
          <div class="acc-header">
            <span class="acc-title">${cat}</span>
            <div class="flex items-center gap-2">
              <span style="font-size:10px; color:var(--cream-mute); font-weight:700;">${grouped[cat].length}</span>
              <span class="acc-chevron">▾</span>
            </div>
          </div>
          <div class="acc-body">
            ${grouped[cat].map(t => `
              <div class="toy-card" onclick="openToyModal('${t.id}')">
                <div class="toy-owner-bar ${t.owner.toLowerCase()}"></div>
                <div class="toy-info">
                  <span class="toy-name">${t.name}</span>
                  <span class="toy-cat">${t.category}</span>
                </div>
                <div class="rating-summary">
                  <div class="rating-row">${miniStars(t.domRating)}</div>
                  <div class="rating-row">${miniStars(t.subRating)}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }).join('');
  };

  function miniStars(val) {
    let h = '';
    for (let i = 1; i <= 5; i++) h += `<span class="star-sm ${i <= val ? '' : 'dim'}">★</span>`;
    return h;
  }

  // Placeholder for missing functions (saveToy, renderWishlist, etc.) - merge with your JS logic
</script>
</body>
</html>
