<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault — Toy Collection & Wishlist</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Great+Vibes&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight: #0a0e1a;
    --deep-blue: #0d1528;
    --card: rgba(18,26,45,0.9);
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.18);
    --gold-border: rgba(201,168,76,0.35);
    --dom-color: #c0392b;
    --dom-soft: rgba(192,57,43,0.18);
    --sub-color: #6c5ce7;
    --sub-soft: rgba(108,92,231,0.18);
    --shared-color: #00b894;
    --shared-soft: rgba(0,184,148,0.18);
    --text: #e8dcc8;
    --text-dim: rgba(232,220,200,0.5);
    --glass: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.07);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--midnight);
    color: var(--text);
    font-family: 'Josefin Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201,168,76,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(108,92,231,0.05) 0%, transparent 50%);
  }

  /* ── Header ── */
  .site-header { text-align:center; padding:36px 24px 20px; }
  .site-header::after {
    content:''; display:block; width:200px; height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    margin:14px auto 0;
  }
  .script-title {
    font-family:'Great Vibes',cursive;
    font-size:clamp(2rem,6vw,3rem);
    color:var(--gold-light);
    text-shadow:0 0 40px rgba(201,168,76,0.4);
  }
  .subtitle {
    font-size:0.62rem; letter-spacing:0.35em; text-transform:uppercase;
    color:var(--text-dim); margin-top:4px;
  }

  /* ── Tabs ── */
  .tabs {
    display:flex; justify-content:center; margin:18px auto 0;
    max-width:400px; border:1px solid var(--gold-border);
    border-radius:4px; overflow:hidden;
  }
  .tab-btn {
    flex:1; background:transparent; border:none;
    color:var(--text-dim); font-family:'Josefin Sans',sans-serif;
    font-size:0.65rem; letter-spacing:0.25em; text-transform:uppercase;
    padding:10px 8px; cursor:pointer; transition:all 0.3s;
  }
  .tab-btn + .tab-btn { border-left:1px solid var(--gold-border); }
  .tab-btn.active { background:var(--gold-dim); color:var(--gold-light); }
  .tab-btn:hover:not(.active) { background:var(--glass); color:var(--text); }

  /* ── Layout ── */
  .container { max-width:700px; margin:0 auto; padding:20px 14px 80px; }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* ── Controls ── */
  .controls-bar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
  .search-wrap { flex:1; min-width:160px; position:relative; }
  .search-wrap input {
    width:100%; background:var(--card); border:1px solid var(--gold-border);
    border-radius:3px; color:var(--text); font-family:'Josefin Sans',sans-serif;
    font-size:0.72rem; letter-spacing:0.08em; padding:9px 12px 9px 32px;
    outline:none; transition:border-color 0.3s;
  }
  .search-wrap input:focus { border-color:var(--gold); }
  .search-wrap::before {
    content:'⌕'; position:absolute; left:10px; top:50%;
    transform:translateY(-50%); color:var(--gold); font-size:1rem; pointer-events:none;
  }
  .filter-group { display:flex; gap:6px; flex-wrap:wrap; }
  .filter-pill {
    background:transparent; border:1px solid var(--gold-border); border-radius:2px;
    color:var(--text-dim); font-family:'Josefin Sans',sans-serif;
    font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase;
    padding:6px 11px; cursor:pointer; transition:all 0.22s;
  }
  .filter-pill.active, .filter-pill:hover { border-color:var(--gold); color:var(--gold-light); background:var(--gold-dim); }
  .filter-pill.dom.active    { border-color:var(--dom-color);    color:#e57373; background:var(--dom-soft); }
  .filter-pill.sub.active    { border-color:var(--sub-color);    color:#b39ddb; background:var(--sub-soft); }
  .filter-pill.shared.active { border-color:var(--shared-color); color:#80cbc4; background:var(--shared-soft); }

  .btn-add {
    background:linear-gradient(135deg,#b8860b,var(--gold)); border:none; border-radius:3px;
    color:var(--midnight); font-family:'Josefin Sans',sans-serif;
    font-size:0.65rem; letter-spacing:0.18em; text-transform:uppercase;
    padding:9px 16px; cursor:pointer; transition:opacity 0.2s,transform 0.2s; white-space:nowrap;
  }
  .btn-add:hover { opacity:0.88; transform:translateY(-1px); }

  /* ── Stats ── */
  .stats-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .stat-pill {
    background:var(--card); border:1px solid var(--glass-border);
    border-radius:40px; padding:4px 12px;
    font-size:0.6rem; letter-spacing:0.12em; color:var(--text-dim);
  }
  .stat-pill span { color:var(--gold-light); font-weight:600; margin-right:3px; }

  /* ══════════════════════════════════════
     CATEGORY GROUP — the core layout unit
  ══════════════════════════════════════ */
  .cat-group { margin-bottom:6px; border-radius:8px; overflow:hidden; }

  /* Sticky category header */
  .cat-header {
    display:flex; align-items:center; gap:10px;
    padding:7px 12px;
    background: linear-gradient(90deg, rgba(201,168,76,0.12), rgba(201,168,76,0.04));
    border:1px solid rgba(201,168,76,0.18);
    border-radius:6px 6px 0 0;
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    transition:background 0.2s;
  }
  .cat-group.collapsed .cat-header { border-radius:6px; }
  .cat-header:active { background:rgba(201,168,76,0.18); }

  .cat-header-name {
    font-size:0.62rem; letter-spacing:0.28em; text-transform:uppercase;
    color:var(--gold); font-weight:400; flex:1;
  }
  .cat-header-count {
    font-size:0.58rem; color:var(--text-dim); letter-spacing:0.1em;
    background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.2);
    border-radius:20px; padding:1px 8px;
  }
  .cat-chevron {
    font-size:0.7rem; color:var(--gold); opacity:0.6;
    transition:transform 0.25s;
  }
  .cat-group.collapsed .cat-chevron { transform:rotate(-90deg); }

  /* Rows container */
  .cat-rows {
    border:1px solid rgba(201,168,76,0.1);
    border-top:none;
    border-radius:0 0 6px 6px;
    overflow:hidden;
    transition:max-height 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .cat-group.collapsed .cat-rows { max-height:0 !important; }

  /* ── Single toy row ── */
  .toy-row {
    display:flex; align-items:center; gap:0;
    background:var(--card);
    border-bottom:1px solid var(--glass-border);
    position:relative; overflow:hidden;
    min-height:42px;
    transition:background 0.18s;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .toy-row:last-child { border-bottom:none; }
  .toy-row:active { background:rgba(201,168,76,0.06); }
  .toy-row.expanded { background:rgba(18,26,50,0.98); }

  /* Ownership left border stripe */
  .toy-row-stripe {
    width:3px; align-self:stretch; flex-shrink:0;
    transition:width 0.2s;
  }
  .stripe-dom    { background:var(--dom-color); }
  .stripe-sub    { background:var(--sub-color); }
  .stripe-shared { background:var(--shared-color); }

  /* Row main content */
  .toy-row-main {
    flex:1; min-width:0;
    display:flex; align-items:center; gap:8px;
    padding:8px 10px;
  }

  .toy-row-name {
    flex:1; min-width:0;
    font-family:'Playfair Display',serif;
    font-size:0.85rem; font-weight:600;
    color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* Inline ratings — two mini bars side by side */
  .toy-row-ratings {
    display:flex; flex-direction:column; gap:3px; flex-shrink:0;
  }
  .mini-rating { display:flex; align-items:center; gap:4px; }
  .mini-label {
    font-size:0.48rem; letter-spacing:0.12em; text-transform:uppercase;
    width:20px; flex-shrink:0;
  }
  .mini-label.d { color:#e57373; }
  .mini-label.s { color:#b39ddb; }
  .mini-stars { display:flex; gap:1px; }
  .mini-star { font-size:0.6rem; color:#1e2640; }
  .mini-star.fd { color:#e57373; }
  .mini-star.fs { color:#b39ddb; }

  /* Expand chevron */
  .toy-row-chevron {
    font-size:0.65rem; color:var(--text-dim); padding:0 10px 0 4px;
    flex-shrink:0; transition:transform 0.22s;
    opacity:0.4;
  }
  .toy-row.expanded .toy-row-chevron { transform:rotate(180deg); opacity:0.8; }

  /* ── Expanded detail panel ── */
  .toy-detail {
    max-height:0; overflow:hidden;
    transition:max-height 0.28s cubic-bezier(0.4,0,0.2,1);
    background:rgba(10,14,26,0.95);
    border-bottom:1px solid var(--glass-border);
  }
  .toy-row.expanded + .toy-detail { max-height:200px; }
  .toy-row:last-child.expanded + .toy-detail { border-bottom:none; }

  .toy-detail-inner {
    padding:10px 12px 10px 15px;
    display:flex; flex-direction:column; gap:8px;
  }

  /* Full star ratings in detail */
  .detail-ratings { display:flex; gap:14px; }
  .detail-rating-row { display:flex; align-items:center; gap:6px; }
  .detail-label {
    font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase; width:26px;
  }
  .detail-label.d { color:#e57373; }
  .detail-label.s { color:#b39ddb; }
  .detail-stars { display:flex; gap:2px; }
  .detail-star { font-size:0.78rem; color:#1e2640; }
  .detail-star.fd { color:#e57373; }
  .detail-star.fs { color:#b39ddb; }
  .detail-val { font-size:0.58rem; color:var(--text-dim); }

  .toy-detail-notes {
    font-family:'Playfair Display',serif; font-style:italic;
    font-size:0.78rem; color:var(--text-dim); line-height:1.45;
  }

  /* Detail action buttons */
  .detail-actions { display:flex; gap:6px; }
  .detail-btn {
    background:var(--glass); border:1px solid var(--glass-border); border-radius:3px;
    color:var(--text-dim); font-size:0.58rem; letter-spacing:0.15em; text-transform:uppercase;
    padding:5px 12px; cursor:pointer; font-family:'Josefin Sans',sans-serif;
    transition:all 0.2s;
  }
  .detail-btn:hover { border-color:var(--gold-border); color:var(--gold); }
  .detail-btn.del:hover { border-color:#e57373; color:#e57373; }

  /* ── Empty ── */
  .empty-state { text-align:center; padding:50px 20px; color:var(--text-dim); }
  .empty-icon  { font-size:2rem; margin-bottom:12px; opacity:0.35; }
  .empty-title { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--gold-dim); margin-bottom:6px; }
  .empty-sub   { font-size:0.7rem; letter-spacing:0.1em; }

  /* ── Modal ── */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.8); backdrop-filter:blur(6px);
    z-index:100; align-items:center; justify-content:center; padding:16px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--deep-blue); border:1px solid var(--gold-border); border-radius:8px;
    padding:28px 24px; width:100%; max-width:460px;
    box-shadow:0 8px 40px rgba(0,0,0,0.7),0 0 60px rgba(201,168,76,0.08);
    animation:modalIn 0.28s ease both; max-height:92vh; overflow-y:auto;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(.95) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .modal-title    { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--gold-light); margin-bottom:4px; }
  .modal-subtitle { font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); margin-bottom:22px; }
  .form-group { margin-bottom:14px; }
  .form-label { display:block; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); margin-bottom:5px; }
  .form-input,.form-select,.form-textarea {
    width:100%; background:var(--card); border:1px solid var(--glass-border); border-radius:3px;
    color:var(--text); font-family:'Josefin Sans',sans-serif; font-size:0.76rem; letter-spacing:0.05em;
    padding:9px 12px; outline:none; transition:border-color 0.3s;
  }
  .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--gold); }
  .form-select option { background:var(--deep-blue); }
  .form-textarea { resize:vertical; min-height:60px; line-height:1.5; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn-primary {
    flex:1; background:linear-gradient(135deg,#b8860b,var(--gold)); border:none; border-radius:3px;
    color:var(--midnight); font-family:'Josefin Sans',sans-serif;
    font-size:0.65rem; letter-spacing:0.18em; text-transform:uppercase; padding:11px; cursor:pointer; transition:opacity 0.2s;
  }
  .btn-primary:hover { opacity:0.88; }
  .btn-cancel {
    background:transparent; border:1px solid var(--glass-border); border-radius:3px;
    color:var(--text-dim); font-family:'Josefin Sans',sans-serif;
    font-size:0.65rem; letter-spacing:0.18em; text-transform:uppercase; padding:11px 18px; cursor:pointer; transition:all 0.2s;
  }
  .btn-cancel:hover { border-color:var(--gold-border); color:var(--text); }

  /* ── Wishlist ── */
  .wish-list { display:flex; flex-direction:column; gap:8px; }
  .wish-card {
    background:var(--card); border:1px solid var(--glass-border); border-radius:6px;
    padding:12px 14px; display:flex; align-items:center; gap:12px;
    position:relative; animation:rowIn 0.3s ease both;
    transition:border-color 0.2s;
  }
  .wish-card:hover { border-color:var(--gold-border); }
  @keyframes rowIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }

  .wish-pri-dot {
    width:8px; height:8px; border-radius:50%; flex-shrink:0;
  }
  .dot-high   { background:#e57373; }
  .dot-med    { background:var(--gold); }
  .dot-low    { background:#555; }

  .wish-body { flex:1; min-width:0; }
  .wish-name { font-family:'Playfair Display',serif; font-size:0.88rem; color:var(--text); }
  .wish-meta { font-size:0.58rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); margin-top:2px; }
  .wish-notes-text { font-size:0.72rem; color:var(--text-dim); margin-top:3px; line-height:1.4; font-style:italic; }

  .wish-right { display:flex; flex-direction:column; gap:4px; align-items:flex-end; flex-shrink:0; }
  .wish-pri-badge {
    font-size:0.52rem; letter-spacing:0.15em; text-transform:uppercase;
    padding:2px 7px; border-radius:2px;
  }
  .badge-high { background:rgba(192,57,43,0.2); color:#e57373; border:1px solid rgba(192,57,43,0.4); }
  .badge-med  { background:rgba(201,168,76,0.15); color:var(--gold); border:1px solid var(--gold-border); }
  .badge-low  { background:var(--glass); color:var(--text-dim); border:1px solid var(--glass-border); }

  .wish-actions { display:flex; gap:5px; margin-top:6px; }
  .btn-wa {
    background:var(--glass); border:1px solid var(--glass-border); border-radius:3px;
    color:var(--text-dim); font-size:0.55rem; letter-spacing:0.12em; text-transform:uppercase;
    padding:4px 9px; cursor:pointer; font-family:'Josefin Sans',sans-serif; transition:all 0.2s;
  }
  .btn-wa:hover      { border-color:var(--gold-border); color:var(--gold); }
  .btn-wa.acquire:hover { border-color:var(--shared-color); color:#80cbc4; }
  .btn-wa.wdel:hover    { border-color:var(--dom-color); color:#e57373; }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--midnight); }
  ::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:4px; }

  @media(max-width:480px) {
    .form-row { grid-template-columns:1fr; }
    .modal { padding:20px 14px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="script-title">The Vault</div>
  <div class="subtitle">Toy Collection &amp; Wishlist</div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('vault',this)">Collection</button>
    <button class="tab-btn" onclick="switchTab('wishlist',this)">Wishlist</button>
  </div>
</header>

<main class="container">

  <!-- VAULT -->
  <div id="tab-vault" class="tab-panel active">
    <div class="controls-bar">
      <div class="search-wrap">
        <input type="text" id="vault-search" placeholder="Search…" oninput="renderVault()">
      </div>
      <div class="filter-group">
        <button class="filter-pill active" onclick="setOwnerF(this,'all')">All</button>
        <button class="filter-pill dom"    onclick="setOwnerF(this,'Dom')">Dom</button>
        <button class="filter-pill sub"    onclick="setOwnerF(this,'Sub')">Sub</button>
        <button class="filter-pill shared" onclick="setOwnerF(this,'Shared')">Shared</button>
      </div>
      <button class="btn-add" onclick="openToyModal()">+ Add</button>
    </div>
    <div id="stats-bar" class="stats-bar"></div>
    <div id="vault-list"></div>
  </div>

  <!-- WISHLIST -->
  <div id="tab-wishlist" class="tab-panel">
    <div class="controls-bar">
      <div class="search-wrap">
        <input type="text" id="wish-search" placeholder="Search…" oninput="renderWishlist()">
      </div>
      <div class="filter-group">
        <button class="filter-pill active" onclick="setWishF(this,'all')">All</button>
        <button class="filter-pill" onclick="setWishF(this,'High')">High</button>
        <button class="filter-pill" onclick="setWishF(this,'Medium')">Medium</button>
        <button class="filter-pill" onclick="setWishF(this,'Low')">Low</button>
      </div>
      <button class="btn-add" onclick="openWishModal()">+ Add</button>
    </div>
    <div id="wish-list" class="wish-list"></div>
  </div>

</main>

<!-- TOY MODAL -->
<div id="toy-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="tmt">Add to Collection</div>
    <div class="modal-subtitle" id="tms">Document a new toy for the vault</div>
    <div class="form-group">
      <label class="form-label">Toy Name</label>
      <input type="text" class="form-input" id="t-name">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="t-cat">
          <option>Vibration</option><option>Insertion</option><option>Anal Play</option>
          <option>Pumps</option><option>Internal</option><option>Nipple Play</option>
          <option>Clamps &amp; Spreaders</option><option>Impact</option><option>Restraint</option>
          <option>Sensation</option><option>Gag &amp; Blindfold</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Belongs To</label>
        <select class="form-select" id="t-owner">
          <option>Shared</option><option>Dom</option><option>Sub</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="t-notes" placeholder="Material, brand, how it's used…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Dom Rating (0–5)</label>
        <input type="number" class="form-input" id="t-drat" min="0" max="5" step="0.5" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Sub Rating (0–5)</label>
        <input type="number" class="form-input" id="t-srat" min="0" max="5" step="0.5" placeholder="0">
      </div>
    </div>
    <input type="hidden" id="t-id">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeToyModal()">Cancel</button>
      <button class="btn-primary" onclick="saveToy()">Save to Vault</button>
    </div>
  </div>
</div>

<!-- WISH MODAL -->
<div id="wish-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">Add to Wishlist</div>
    <div class="modal-subtitle">Curate desires for the collection</div>
    <div class="form-group">
      <label class="form-label">Item Name</label>
      <input type="text" class="form-input" id="w-name">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="w-cat">
          <option>Vibration</option><option>Insertion</option><option>Anal Play</option>
          <option>Pumps</option><option>Internal</option><option>Nipple Play</option>
          <option>Clamps &amp; Spreaders</option><option>Impact</option><option>Restraint</option>
          <option>Sensation</option><option>Gag &amp; Blindfold</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="w-pri">
          <option>High</option><option selected>Medium</option><option>Low</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="w-notes" placeholder="Why you want it…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Link (optional)</label>
      <input type="url" class="form-input" id="w-link" placeholder="https://…">
    </div>
    <input type="hidden" id="w-id">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeWishModal()">Cancel</button>
      <button class="btn-primary" onclick="saveWish()">Add to Wishlist</button>
    </div>
  </div>
</div>

<script>
// ─── SEED ────────────────────────────────────────────────────────────────────
const SEED = [
  {name:'Wand',             cat:'Vibration',          owner:'Shared'},
  {name:'Ferri',            cat:'Vibration',          owner:'Sub'},
  {name:'Lush 4',           cat:'Vibration',          owner:'Sub'},
  {name:'Bullet Vib',       cat:'Vibration',          owner:'Sub'},
  {name:'Flexer',           cat:'Vibration',          owner:'Sub'},
  {name:'Pinpoint Vib',     cat:'Vibration',          owner:'Sub'},
  {name:'Dildo',            cat:'Insertion',          owner:'Shared'},
  {name:'Glass Dildo',      cat:'Insertion',          owner:'Shared'},
  {name:'Double End',       cat:'Insertion',          owner:'Shared'},
  {name:'Njoy Wand',        cat:'Insertion',          owner:'Shared'},
  {name:'Anal Plug',        cat:'Anal Play',          owner:'Sub'},
  {name:'Hollow Plug',      cat:'Anal Play',          owner:'Dom'},
  {name:'Inflatable',       cat:'Anal Play',          owner:'Dom'},
  {name:'Anal Hook',        cat:'Anal Play',          owner:'Dom'},
  {name:'Ping Pong Balls',  cat:'Anal Play',          owner:'Dom'},
  {name:'Pussy Pump',       cat:'Pumps',              owner:'Dom'},
  {name:'Penis Pump',       cat:'Pumps',              owner:'Shared'},
  {name:'Clit Pump',        cat:'Pumps',              owner:'Dom'},
  {name:'Ben Wa Balls',     cat:'Internal',           owner:'Dom'},
  {name:'Nipple Clamps',    cat:'Nipple Play',        owner:'Dom'},
  {name:'Liba Spreader',    cat:'Clamps & Spreaders', owner:'Dom'},
  {name:'Pussy Clamp',      cat:'Clamps & Spreaders', owner:'Dom'},
  {name:'Fuck Saw',         cat:'Sensation',          owner:'Dom'},
  {name:'Waterberg Wheel',  cat:'Sensation',          owner:'Dom'},
  {name:'Wax Candles',      cat:'Sensation',          owner:'Dom'},
  {name:"Sir's Hand",       cat:'Impact',             owner:'Dom'},
  {name:'Crop',             cat:'Impact',             owner:'Dom'},
  {name:'Flogger',          cat:'Impact',             owner:'Dom'},
  {name:'Cane',             cat:'Impact',             owner:'Dom'},
  {name:'Paddle',           cat:'Impact',             owner:'Dom'},
  {name:'Slapper',          cat:'Impact',             owner:'Dom'},
  {name:'Cat O 9',          cat:'Impact',             owner:'Dom'},
  {name:'Whip',             cat:'Impact',             owner:'Dom'},
  {name:"Dragon's Tongue",  cat:'Impact',             owner:'Dom'},
  {name:'Belt',             cat:'Impact',             owner:'Dom'},
  {name:'Spreader Bar',     cat:'Restraint',          owner:'Dom'},
  {name:'Armbinder',        cat:'Restraint',          owner:'Dom'},
  {name:'Rope',             cat:'Restraint',          owner:'Dom'},
  {name:'Wrist Cuffs',      cat:'Restraint',          owner:'Dom'},
  {name:'Ankle Cuffs',      cat:'Restraint',          owner:'Dom'},
  {name:'Bondage Tape',     cat:'Restraint',          owner:'Dom'},
  {name:'Ball Gag',         cat:'Gag & Blindfold',    owner:'Dom'},
  {name:'Ring Gag',         cat:'Gag & Blindfold',    owner:'Dom'},
  {name:'Fully Restrained', cat:'Gag & Blindfold',    owner:'Dom'},
  {name:'Blindfold',        cat:'Gag & Blindfold',    owner:'Dom'},
];

const CATS = [
  'Vibration','Insertion','Anal Play','Pumps','Internal',
  'Nipple Play','Clamps & Spreaders','Impact','Restraint',
  'Sensation','Gag & Blindfold','Other'
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let toys   = [];
let wishes = [];
let ownerF = 'all';
let wishF  = 'all';
let expandedId = null;   // which toy row is expanded
let collapsedCats = {};  // which category groups are collapsed

function loadData() {
  const st = localStorage.getItem('vault_toys_v4');
  if (st) { toys = JSON.parse(st); }
  else {
    toys = SEED.map((s,i) => ({
      id:'seed_'+i, name:s.name, category:s.cat, owner:s.owner,
      notes:'', domRating:0, subRating:0, added:Date.now()-(SEED.length-i)*500
    }));
    saveToys();
  }
  const sw = localStorage.getItem('vault_wishes_v4');
  wishes = sw ? JSON.parse(sw) : [];
}
function saveToys()   { localStorage.setItem('vault_toys_v4',   JSON.stringify(toys));   }
function saveWishes() { localStorage.setItem('vault_wishes_v4', JSON.stringify(wishes)); }

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function setOwnerF(el, v) {
  ownerF = v;
  document.querySelectorAll('#tab-vault .filter-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  expandedId = null;
  renderVault();
}
function setWishF(el, v) {
  wishF = v;
  document.querySelectorAll('#tab-wishlist .filter-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderWishlist();
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function openToyModal(id) {
  document.getElementById('t-id').value = id || '';
  if (id) {
    const t = toys.find(x => x.id === id);
    document.getElementById('tmt').textContent = 'Edit Toy';
    document.getElementById('tms').textContent = 'Update the details for this toy';
    document.getElementById('t-name').value  = t.name;
    document.getElementById('t-cat').value   = t.category;
    document.getElementById('t-owner').value = t.owner;
    document.getElementById('t-notes').value = t.notes;
    document.getElementById('t-drat').value  = t.domRating || '';
    document.getElementById('t-srat').value  = t.subRating || '';
  } else {
    document.getElementById('tmt').textContent = 'Add to Collection';
    document.getElementById('tms').textContent = 'Document a new toy for the vault';
    ['t-name','t-notes','t-drat','t-srat'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('t-cat').value   = 'Vibration';
    document.getElementById('t-owner').value = 'Shared';
  }
  document.getElementById('toy-modal').classList.add('open');
}
function closeToyModal() { document.getElementById('toy-modal').classList.remove('open'); }

function openWishModal(id) {
  document.getElementById('w-id').value = id || '';
  if (id) {
    const w = wishes.find(x => x.id === id);
    document.getElementById('w-name').value  = w.name;
    document.getElementById('w-cat').value   = w.category;
    document.getElementById('w-pri').value   = w.priority;
    document.getElementById('w-notes').value = w.notes;
    document.getElementById('w-link').value  = w.link || '';
  } else {
    ['w-name','w-notes','w-link'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('w-pri').value = 'Medium';
  }
  document.getElementById('wish-modal').classList.add('open');
}
function closeWishModal() { document.getElementById('wish-modal').classList.remove('open'); }

// ─── SAVE ─────────────────────────────────────────────────────────────────────
function saveToy() {
  const name = document.getElementById('t-name').value.trim();
  if (!name) return;
  const id = document.getElementById('t-id').value;
  const toy = {
    id: id || 'toy_'+Date.now(), name,
    category:  document.getElementById('t-cat').value,
    owner:     document.getElementById('t-owner').value,
    notes:     document.getElementById('t-notes').value.trim(),
    domRating: parseFloat(document.getElementById('t-drat').value) || 0,
    subRating: parseFloat(document.getElementById('t-srat').value) || 0,
    added: id ? (toys.find(t=>t.id===id)?.added||Date.now()) : Date.now()
  };
  toys = id ? toys.map(t=>t.id===id?toy:t) : [toy,...toys];
  saveToys(); closeToyModal(); renderVault();
}

function saveWish() {
  const name = document.getElementById('w-name').value.trim();
  if (!name) return;
  const id = document.getElementById('w-id').value;
  const wish = {
    id: id || 'wish_'+Date.now(), name,
    category: document.getElementById('w-cat').value,
    priority: document.getElementById('w-pri').value,
    notes:    document.getElementById('w-notes').value.trim(),
    link:     document.getElementById('w-link').value.trim(),
    added: id ? (wishes.find(w=>w.id===id)?.added||Date.now()) : Date.now()
  };
  wishes = id ? wishes.map(w=>w.id===id?wish:w) : [wish,...wishes];
  saveWishes(); closeWishModal(); renderWishlist();
}

// ─── DELETE ───────────────────────────────────────────────────────────────────
function deleteToy(id) {
  if (!confirm('Remove this toy from the vault?')) return;
  toys = toys.filter(t=>t.id!==id);
  if (expandedId===id) expandedId=null;
  saveToys(); renderVault();
}
function deleteWish(id) {
  wishes = wishes.filter(w=>w.id!==id);
  saveWishes(); renderWishlist();
}

// ─── ACQUIRE ──────────────────────────────────────────────────────────────────
function acquireWish(id) {
  const w = wishes.find(x=>x.id===id);
  if (!w) return;
  wishes = wishes.filter(x=>x.id!==id);
  saveWishes(); renderWishlist();
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-vault').classList.add('active');
  document.querySelectorAll('.tab-btn')[0].classList.add('active');
  openToyModal();
  document.getElementById('t-name').value  = w.name;
  document.getElementById('t-cat').value   = w.category;
  document.getElementById('t-notes').value = w.notes;
}

// ─── TOGGLE ROW ───────────────────────────────────────────────────────────────
function toggleRow(id) {
  expandedId = expandedId === id ? null : id;
  renderVault();
}
function toggleCat(cat) {
  collapsedCats[cat] = !collapsedCats[cat];
  renderVault();
}

// ─── STARS ───────────────────────────────────────────────────────────────────
function miniStars(rating, type) {
  let h=''; const f=Math.round(rating);
  for(let i=1;i<=5;i++) h+=`<span class="mini-star${i<=f?' f'+type[0]:''}">★</span>`;
  return h;
}
function detailStars(rating, type) {
  let h=''; const f=Math.round(rating);
  for(let i=1;i<=5;i++) h+=`<span class="detail-star${i<=f?' f'+type[0]:''}">★</span>`;
  return h;
}

// ─── RENDER VAULT ─────────────────────────────────────────────────────────────
function renderVault() {
  const q = document.getElementById('vault-search').value.toLowerCase();
  const filtered = toys.filter(t => {
    const mo = ownerF==='all' || t.owner===ownerF;
    const mq = !q || t.name.toLowerCase().includes(q) || t.category.toLowerCase().includes(q) || t.notes.toLowerCase().includes(q);
    return mo && mq;
  });

  // Stats
  const total=toys.length, domC=toys.filter(t=>t.owner==='Dom').length,
    subC=toys.filter(t=>t.owner==='Sub').length, sharedC=toys.filter(t=>t.owner==='Shared').length,
    rated=toys.filter(t=>t.domRating>0||t.subRating>0).length;
  document.getElementById('stats-bar').innerHTML = [
    `<div class="stat-pill"><span>${total}</span>Total</div>`,
    `<div class="stat-pill"><span>${domC}</span>Dom</div>`,
    `<div class="stat-pill"><span>${subC}</span>Sub</div>`,
    `<div class="stat-pill"><span>${sharedC}</span>Shared</div>`,
    `<div class="stat-pill"><span>${total-rated}</span>Unrated</div>`,
  ].join('');

  const list = document.getElementById('vault-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-title">Nothing found</div><div class="empty-sub">Try adjusting your filters</div></div>`;
    return;
  }

  // Group by category, preserving CATS order
  const groups = {};
  CATS.forEach(c => groups[c] = []);
  filtered.forEach(t => {
    const c = groups[t.category] !== undefined ? t.category : 'Other';
    groups[c].push(t);
  });

  let html = '';
  CATS.forEach(cat => {
    const items = groups[cat];
    if (!items || !items.length) return;
    const collapsed = collapsedCats[cat];
    const rowsHeight = items.length * 44; // approx px for max-height

    html += `<div class="cat-group${collapsed?' collapsed':''}" id="cg-${esc(cat)}">
      <div class="cat-header" onclick="toggleCat('${esc(cat)}')">
        <span class="cat-header-name">${esc(cat)}</span>
        <span class="cat-header-count">${items.length}</span>
        <span class="cat-chevron">▾</span>
      </div>
      <div class="cat-rows" style="max-height:${collapsed?0:rowsHeight*3}px">`;

    items.forEach(t => {
      const isExp = expandedId === t.id;
      const stripeClass = t.owner==='Dom'?'stripe-dom':t.owner==='Sub'?'stripe-sub':'stripe-shared';
      html += `
        <div class="toy-row${isExp?' expanded':''}" onclick="toggleRow('${t.id}')">
          <div class="toy-row-stripe ${stripeClass}"></div>
          <div class="toy-row-main">
            <span class="toy-row-name">${esc(t.name)}</span>
            <div class="toy-row-ratings">
              <div class="mini-rating">
                <span class="mini-label d">D</span>
                <div class="mini-stars">${miniStars(t.domRating,'dom')}</div>
              </div>
              <div class="mini-rating">
                <span class="mini-label s">S</span>
                <div class="mini-stars">${miniStars(t.subRating,'sub')}</div>
              </div>
            </div>
          </div>
          <span class="toy-row-chevron">▾</span>
        </div>
        <div class="toy-detail">
          <div class="toy-detail-inner">
            <div class="detail-ratings">
              <div class="detail-rating-row">
                <span class="detail-label d">Dom</span>
                <div class="detail-stars">${detailStars(t.domRating,'dom')}</div>
                <span class="detail-val">${t.domRating>0?t.domRating.toFixed(1):'—'}</span>
              </div>
              <div class="detail-rating-row">
                <span class="detail-label s">Sub</span>
                <div class="detail-stars">${detailStars(t.subRating,'sub')}</div>
                <span class="detail-val">${t.subRating>0?t.subRating.toFixed(1):'—'}</span>
              </div>
            </div>
            ${t.notes?`<div class="toy-detail-notes">${esc(t.notes)}</div>`:''}
            <div class="detail-actions">
              <button class="detail-btn" onclick="event.stopPropagation();openToyModal('${t.id}')">Edit</button>
              <button class="detail-btn del" onclick="event.stopPropagation();deleteToy('${t.id}')">Remove</button>
            </div>
          </div>
        </div>`;
    });

    html += `</div></div>`;
  });

  list.innerHTML = html;
}

// ─── RENDER WISHLIST ──────────────────────────────────────────────────────────
function renderWishlist() {
  const q = document.getElementById('wish-search').value.toLowerCase();
  const filtered = wishes.filter(w => {
    const mp = wishF==='all'||w.priority===wishF;
    const mq = !q||w.name.toLowerCase().includes(q)||w.category.toLowerCase().includes(q);
    return mp&&mq;
  });
  const list = document.getElementById('wish-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-title">Desires Await</div><div class="empty-sub">Add items to your wishlist</div></div>`;
    return;
  }
  const dotCls  = p=>p==='High'?'dot-high':p==='Medium'?'dot-med':'dot-low';
  const badgeCls = p=>p==='High'?'badge-high':p==='Medium'?'badge-med':'badge-low';
  list.innerHTML = filtered.map(w=>`
    <div class="wish-card">
      <div class="wish-pri-dot ${dotCls(w.priority)}"></div>
      <div class="wish-body">
        <div class="wish-name">${esc(w.name)}</div>
        <div class="wish-meta">${esc(w.category)}</div>
        ${w.notes?`<div class="wish-notes-text">${esc(w.notes)}</div>`:''}
        <div class="wish-actions">
          <button class="btn-wa acquire" onclick="acquireWish('${w.id}')">Acquired ✓</button>
          <button class="btn-wa" onclick="openWishModal('${w.id}')">Edit</button>
          <button class="btn-wa wdel" onclick="deleteWish('${w.id}')">Remove</button>
        </div>
      </div>
      <div class="wish-right">
        <span class="wish-pri-badge ${badgeCls(w.priority)}">${w.priority}</span>
        ${w.link?`<a href="${esc(w.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="font-size:0.58rem;color:var(--gold);opacity:0.6;text-decoration:none;" >↗ link</a>`:''}
      </div>
    </div>`).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.querySelectorAll('.modal-overlay').forEach(o=>
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');})
);

loadData(); renderVault(); renderWishlist();
</script>
