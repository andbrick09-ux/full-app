<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vault — Toy Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Great+Vibes&family=Josefin+Sans:wght@200;300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --midnight: #0a0e1a;
      --deep-blue: #0d1528;
      --card: rgba(18, 26, 45, 0.9);
      --rose-gold: #b76e79; /* User Preference: Rose Gold */
      --rose-gold-light: #e4b1b1;
      --gold: #c9a84c; /* Accent Gold */
      --text: #e8dcc8;
      --text-dim: rgba(232, 220, 200, 0.5);
      --glass-border: rgba(255, 255, 255, 0.07);
      --dom-color: #c0392b;
      --sub-color: #6c5ce7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--midnight);
      color: var(--text);
      font-family: 'Josefin Sans', sans-serif;
      min-height: 100vh;
      background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(183, 110, 121, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(13, 21, 40, 0.5) 0%, transparent 50%);
      padding-bottom: 80px;
    }

    /* ── Header ── */
    .site-header { text-align: center; padding: 36px 24px 20px; position: sticky; top: 0; background: var(--midnight); z-index: 100; }
    .script-title { font-family: 'Great Vibes', cursive; font-size: 2.8rem; color: var(--rose-gold-light); text-shadow: 0 0 30px rgba(183, 110, 121, 0.3); }
    .subtitle { font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--text-dim); margin-top: 4px; }

    /* ── Controls ── */
    .container { max-width: 700px; margin: 0 auto; padding: 0 14px; }
    .controls-bar { display: flex; gap: 8px; margin: 20px 0; align-items: center; }
    .search-wrap { flex: 1; position: relative; }
    .search-wrap input {
      width: 100%; background: var(--card); border: 1px solid var(--glass-border); border-radius: 4px;
      color: var(--text); padding: 10px 12px 10px 35px; outline: none; font-family: inherit;
    }
    .search-wrap::before { content: '⌕'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--rose-gold); font-size: 1.2rem; }

    .btn-add {
      background: linear-gradient(135deg, var(--rose-gold), #8e4a55); border: none; border-radius: 4px;
      color: var(--midnight); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 11px 16px; cursor: pointer; transition: 0.2s;
    }

    /* ── Grid & Cards ── */
    .cat-group { margin-bottom: 12px; }
    .cat-header {
      position: sticky; top: 115px; background: var(--midnight); z-index: 90;
      display: flex; justify-content: space-between; padding: 12px 0; color: var(--rose-gold);
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; border-bottom: 1px solid var(--glass-border);
    }
    .toy-row {
      display: flex; align-items: center; background: var(--card); border-bottom: 1px solid var(--glass-border);
      padding: 12px; cursor: pointer; transition: background 0.2s;
    }
    .toy-row:hover { background: rgba(255,255,255,0.02); }
    .toy-row-stripe { width: 3px; height: 30px; border-radius: 2px; margin-right: 12px; }
    .stripe-dom { background: var(--dom-color); }
    .stripe-sub { background: var(--sub-color); }
    .toy-name { font-family: 'Playfair Display', serif; font-size: 1rem; flex: 1; }

    .mini-stars { display: flex; flex-direction: column; gap: 2px; font-size: 0.6rem; }
    .star-line { display: flex; align-items: center; gap: 4px; color: var(--text-dim); }
    .star-line.active { color: var(--rose-gold); }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 14px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--deep-blue); border: 1px solid var(--rose-gold); border-radius: 8px;
      padding: 24px; width: 100%; max-width: 450px; box-shadow: 0 10px 50px rgba(0,0,0,0.5);
    }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--rose-gold-light); margin-bottom: 18px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--rose-gold); margin-bottom: 6px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: var(--card); border: 1px solid var(--glass-border); border-radius: 4px;
      color: var(--text); padding: 10px; outline: none; font-family: inherit;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Interactive Stars */
    .interactive-stars { display: flex; gap: 6px; font-size: 1.6rem; color: rgba(255,255,255,0.05); cursor: pointer; }
    .interactive-stars span.active { color: var(--rose-gold); text-shadow: 0 0 10px rgba(183, 110, 121, 0.5); }

    .modal-actions { display: flex; gap: 10px; margin-top: 24px; align-items: center; }
    .btn-primary { flex: 1; background: var(--rose-gold); border: none; padding: 12px; border-radius: 4px; color: var(--midnight); font-weight: 600; cursor: pointer; }
    .btn-delete { background: transparent; border: 1px solid rgba(192, 57, 43, 0.3); color: #e57373; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }

    .rescue-bar { background: #0044ff; color: white; text-align: center; padding: 12px; font-weight: 600; cursor: pointer; }
  </style>
  <link rel="stylesheet" href="nav.css" />
</head>
<body data-nav="vault">

  <div id="rescue-btn" class="rescue-bar" onclick="rescueMissingData()">
    TAP TO SYNC MISSING PERSONAL DATA
  </div>

  <header class="site-header">
    <div class="script-title">The Vault</div>
    <div class="subtitle">Shared Collection</div>
  </header>

  <main class="container">
    <div class="controls-bar">
      <div class="search-wrap">
        <input type="text" id="vault-search" placeholder="Search the collection..." oninput="renderVault()">
      </div>
      <button class="btn-add" onclick="openToyModal()">+ Add</button>
    </div>

    <div id="vault-list"></div>
  </main>

  <div id="toy-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="tmt">Toy Details</div>
      
      <div class="form-group">
        <label class="form-label">Toy Name</label>
        <input type="text" class="form-input" id="t-name">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="t-cat"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Owner</label>
          <select class="form-select" id="t-owner">
            <option value="Dom">Dom</option>
            <option value="Sub">Sub</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" id="lbl-dom">Dom Rating</label>
          <div class="interactive-stars" id="stars-dom" data-val="0">
            <span data-star="1">★</span><span data-star="2">★</span><span data-star="3">★</span><span data-star="4">★</span><span data-star="5">★</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" id="lbl-sub">Sub Rating</label>
          <div class="interactive-stars" id="stars-sub" data-val="0">
            <span data-star="1">★</span><span data-star="2">★</span><span data-star="3">★</span><span data-star="4">★</span><span data-star="5">★</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="t-notes" rows="3"></textarea>
      </div>

      <input type="hidden" id="t-id">

      <div class="modal-actions">
        <button class="btn-delete" id="btn-del" onclick="handleDelete()">Delete</button>
        <div style="flex:1"></div>
        <button style="background:transparent; border:none; color:var(--text-dim); cursor:pointer;" onclick="closeToyModal()">Cancel</button>
        <button class="btn-primary" onclick="saveToy()">Save</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, getMyProfile, getRelationship, getUserProfile } from './auth.js';
    import { doc, setDoc, deleteDoc, getDocs, collection } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { db } from './firebase-config.js';

    // ─── STATE ───
    let myUid, relId, partnerUid;
    let toys = [], categories = ['Other'];
    let toysCol, categoryCol;
    let domName = 'Dom', subName = 'Sub';

    // ─── INIT ───
    async function init() {
      const user = await requireAuth();
      myUid = user.uid;

      const [prof, rel] = await Promise.all([getMyProfile(), getRelationship()]);
      relId = rel?.id || myUid;

      toysCol = collection(db, 'data', relId, 'vault-toys');
      categoryCol = collection(db, 'data', relId, 'categories');

      if (rel) {
        partnerUid = rel.domId === myUid ? rel.subId : rel.domId;
        const pProf = await getUserProfile(partnerUid);
        if (prof?.role === 'dom') {
          domName = prof.displayName || 'Dom';
          subName = pProf?.displayName || 'Sub';
        } else {
          subName = prof?.displayName || 'Sub';
          domName = pProf?.displayName || 'Dom';
        }
      }

      setupUI();
      await loadData();
      initStarListeners();
    }

    async function loadData() {
      const [tSnap, cSnap] = await Promise.all([getDocs(toysCol), getDocs(categoryCol)]);
      toys = tSnap.docs.map(d => d.data());
      
      const dbCats = cSnap.docs.map(d => d.data().name);
      dbCats.forEach(c => { if(!categories.includes(c)) categories.push(c); });
      
      // Category Scanner
      toys.forEach(t => { if(t.category && !categories.includes(t.category)) categories.push(t.category); });
      
      categories.sort();
      updateCategorySelects();
      renderVault();
    }

    function renderVault() {
      const list = document.getElementById('vault-list');
      const q = document.getElementById('vault-search').value.toLowerCase();
      const filtered = toys.filter(t => t.name.toLowerCase().includes(q));

      const groups = {};
      categories.forEach(c => groups[c] = []);
      filtered.forEach(t => (groups[t.category] || groups['Other']).push(t));

      list.innerHTML = categories.map(cat => {
        const items = groups[cat];
        if (!items?.length) return '';
        return `
          <div class="cat-group">
            <div class="cat-header"><span>${cat}</span><span>${items.length}</span></div>
            ${items.map(t => `
              <div class="toy-row" onclick="window.openToyModal('${t.id}')">
                <div class="toy-row-stripe ${t.owner==='Dom'?'stripe-dom':'stripe-sub'}"></div>
                <div class="toy-name">${t.name}</div>
                <div class="mini-stars">
                  <div class="star-line ${t.domRating > 0 ? 'active' : ''}">${domName[0]} ${'★'.repeat(Math.round(t.domRating))}</div>
                  <div class="star-line ${t.subRating > 0 ? 'active' : ''}">${subName[0]} ${'★'.repeat(Math.round(t.subRating))}</div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }).join('');
    }

    // ─── MODAL & STARS ───
    window.openToyModal = (id) => {
      const t = id ? toys.find(x => x.id === id) : null;
      document.getElementById('t-id').value = id || '';
      document.getElementById('tmt').textContent = id ? 'Edit Toy' : 'Add Toy';
      document.getElementById('t-name').value = t?.name || '';
      document.getElementById('t-cat').value = t?.category || 'Vibration';
      document.getElementById('t-owner').value = t?.owner || 'Dom';
      document.getElementById('t-notes').value = t?.notes || '';
      
      updateStarUI('stars-dom', t?.domRating || 0);
      updateStarUI('stars-sub', t?.subRating || 0);
      document.getElementById('btn-del').style.display = id ? 'block' : 'none';
      document.getElementById('toy-modal').classList.add('open');
    };

    function initStarListeners() {
      document.querySelectorAll('.interactive-stars span').forEach(s => {
        s.onclick = function() {
          const val = this.dataset.star;
          const parent = this.parentElement;
          parent.dataset.val = val;
          updateStarUI(parent.id, val);
        };
      });
    }

    function updateStarUI(id, val) {
      const container = document.getElementById(id);
      container.dataset.val = val;
      container.querySelectorAll('span').forEach(s => s.classList.toggle('active', s.dataset.star <= val));
    }

    window.saveToy = async () => {
      const id = document.getElementById('t-id').value || 'toy_' + Date.now();
      const toy = {
        id,
        name: document.getElementById('t-name').value,
        category: document.getElementById('t-cat').value,
        owner: document.getElementById('t-owner').value,
        notes: document.getElementById('t-notes').value,
        domRating: parseInt(document.getElementById('stars-dom').dataset.val),
        subRating: parseInt(document.getElementById('stars-sub').dataset.val),
        updated: Date.now()
      };
      await setDoc(doc(toysCol, id), toy);
      closeToyModal();
      loadData();
    };

    window.handleDelete = async () => {
      const id = document.getElementById('t-id').value;
      if (id && confirm("Delete this toy?")) {
        await deleteDoc(doc(toysCol, id));
        closeToyModal();
        loadData();
      }
    };

    // ─── HELPERS ───
    window.closeToyModal = () => document.getElementById('toy-modal').classList.remove('open');
    function setupUI() {
      document.getElementById('lbl-dom').textContent = domName + ' Rating';
      document.getElementById('lbl-sub').textContent = subName + ' Rating';
      const sel = document.getElementById('t-owner');
      sel.options[0].text = domName; sel.options[1].text = subName;
    }
    function updateCategorySelects() {
      document.getElementById('t-cat').innerHTML = categories.map(c => `<option>${c}</option>`).join('');
    }

    window.rescueMissingData = async () => {
      alert("Syncing personal data to shared vault...");
      const pToys = await getDocs(collection(db, 'data', myUid, 'vault-toys'));
      for (const d of pToys.docs) await setDoc(doc(toysCol, d.id), d.data());
      alert("Sync complete!");
      loadData();
    };

    init();
  </script>
  <script src="nav.js"></script>
</body>
</html>
