<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vault — V2</title>
  
  <!-- Global Design System -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&amp;family=Great+Vibes&amp;family=Montserrat:wght@400;600&amp;display=swap" rel="stylesheet">
  
  <style>
    /* === Sir's Protocol Global Tokens (V2) === */
    :root {
      --midnight: #051024;
      --glass: rgba(5,16,36,0.85);
      --glass2: rgba(2,8,20,0.6);
      --gold: #D4AF37;
      --gold-light: #F5E6A3;
      --gold-dim: rgba(212,175,55,0.18);
      --border: rgba(212,175,55,0.15);
      --cream: #f0e6d2;
      --cream-dim: rgba(240,230,211,0.7);
      --luxury-gradient: linear-gradient(135deg, #D4AF37, #F5E6A3);
      --dom-rose: #b76e79;
      --sub-cream: #f0e6d2;
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      background: var(--midnight);
      color: #ccc;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      padding-bottom: 90px;
    }

    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      background: rgba(5,16,36,0.92);
      backdrop-filter: blur(25px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-title {
      font-family: 'Great Vibes', cursive;
      font-size: 28px;
      background: var(--luxury-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topbar-gear {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: var(--gold);
      cursor: pointer;
      transition: transform .2s;
    }
    .topbar-gear:active { transform: scale(0.9); }

    .main { max-width: 620px; margin: 0 auto; padding: 20px; }

    /* Tabs */
    .tabs {
      display: flex; background: var(--glass); border-radius: 9999px;
      padding: 4px; margin-bottom: 20px; border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1; padding: 10px; text-align: center; font-size: 13px;
      font-weight: 600; letter-spacing: 0.5px; color: #aaa;
      border-radius: 9999px; transition: all .2s;
    }
    .tab-btn.active { background: var(--gold); color: #051024; font-weight: 700; }

    /* Glass Card */
    .glass-card {
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; margin-bottom: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    /* Toy Row V2 */
    .toy-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; background: var(--glass2);
      border: 1px solid var(--border); border-radius: 16px;
      margin-bottom: 8px; cursor: pointer; transition: all .2s;
    }
    .toy-row:active { transform: scale(0.985); }
    .toy-stripe {
      width: 5px; height: 42px; border-radius: 9999px; flex-shrink: 0;
    }
    .stripe-dom { background: var(--dom-rose); }
    .stripe-sub { background: var(--sub-cream); }
    .toy-main { flex: 1; min-width: 0; }
    .toy-name { font-family: 'Playfair Display', serif; font-size: 15px; color: #ddd; font-weight: 600; }
    .toy-ratings { display: flex; gap: 12px; margin-top: 4px; }
    .mini-star { font-size: 13px; color: #444; }
    .mini-star.filled { color: var(--gold); }

    /* Wishlist Menu Grid */
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .menu-card {
      background: var(--glass2); border: 1px solid var(--border);
      border-radius: 18px; padding: 18px 16px; text-align: center;
      transition: all .3s ease; position: relative;
    }
    .menu-card:active { transform: scale(0.96); }
    .menu-card-title { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--gold); margin-bottom: 6px; }
    .menu-card-meta { font-size: 11px; color: #888; }

    /* Bottom Sheet Modal */
    .modal-back {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px); z-index: 300;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .modal-back.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      width: 100%; max-width: 620px; background: var(--glass);
      border: 1px solid var(--border); border-radius: 24px 24px 0 0;
      padding: 8px 24px calc(32px + 80px); /* Extra padding to clear bottom nav */
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .modal-back.open .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; background: #444; border-radius: 2px; margin: 12px auto 16px; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 18px; color: #ddd; text-align: center; margin-bottom: 20px; }

    /* Form Elements */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: #0a1224; border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; color: #ddd; font-size: 15px;
    }
    .form-textarea { min-height: 90px; resize: vertical; }

    /* Star Rating */
    .star-rating { display: flex; gap: 8px; font-size: 28px; }
    .star { color: #333; cursor: pointer; transition: transform .1s; }
    .star.filled { color: var(--gold); }
    .star:active { transform: scale(1.3); }

    /* Buttons */
    .btn { padding: 14px 24px; border-radius: 14px; font-size: 12px; font-weight: 700;
           letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: .2s; }
    .btn-gold { background: var(--luxury-gradient); color: #051024; border: none; width: 100%; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: #aaa; }
    .btn-danger { background: transparent; border: 1px solid #F44336; color: #F44336; }

    .filter-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-pill {
      padding: 8px 16px; border-radius: 9999px; font-size: 12px;
      border: 1px solid var(--border); color: #aaa; background: transparent;
      transition: all .2s;
    }
    .filter-pill.active { background: var(--gold); color: #051024; border-color: var(--gold); }
  </style>
  
  <link rel="stylesheet" href="nav.css">
</head>
<body data-nav="more">

  <!-- Topbar -->
  <div class="topbar">
    <div>
      <div class="topbar-title">The Vault</div>
      <div style="font-size:10px; color:#666; letter-spacing:1px;">TOY COLLECTION</div>
    </div>
    <!-- Gear removed - category management now inside Add/Edit modal -->
  </div>

  <div class="main">

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab-btn active" onclick="switchTab('vault', this)">Collection</div>
      <div class="tab-btn" onclick="switchTab('wishlist', this)">Wishlist</div>
    </div>

    <!-- COLLECTION TAB -->
    <div id="tab-vault">
      <div style="display:flex; gap:8px; margin-bottom:16px;">
        <input type="text" id="search" placeholder="Search toys..." 
               style="flex:1; background:#0a1224; border:1px solid var(--border); border-radius:9999px; padding:12px 18px; color:#ddd;"
               oninput="renderVault()">
        <button onclick="openFilterSheet()" class="btn btn-outline" style="padding:12px 18px;">Filter</button>
      </div>

      <div id="vault-list"></div>

      <!-- Floating Add Button -->
      <button onclick="openToyModal()" 
              style="position:fixed; bottom:90px; right:20px; width:56px; height:56px; 
                     background:var(--luxury-gradient); color:#051024; border:none; 
                     border-radius:50%; font-size:28px; box-shadow:0 6px 20px rgba(212,175,55,0.4);
                     display:flex; align-items:center; justify-content:center; z-index:200;">
        +
      </button>
    </div>

    <!-- WISHLIST TAB -->
    <div id="tab-wishlist" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div style="font-size:13px; color:#888;">Your Desires</div>
        <button onclick="openWishModal()" class="btn btn-gold" style="width:auto; padding:10px 20px; font-size:11px;">+ Add Desire</button>
      </div>
      <div id="wish-list" class="menu-grid"></div>

      <!-- Floating Add Button for Wishlist -->
      <button onclick="openWishModal()" 
              style="position:fixed; bottom:90px; right:20px; width:56px; height:56px; 
                     background:var(--luxury-gradient); color:#051024; border:none; 
                     border-radius:50%; font-size:28px; box-shadow:0 6px 20px rgba(212,175,55,0.4);
                     display:flex; align-items:center; justify-content:center; z-index:200;">
        +
      </button>
    </div>

  </div>

  <!-- TOY MODAL (Bottom Sheet) -->
  <div id="toy-modal" class="modal-back">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="toy-modal-title">Add Toy</div>
      
      <div class="form-group">
        <label class="form-label">Toy Name</label>
        <input type="text" id="t-name" class="form-input">
      </div>
      
      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="t-cat" class="form-select" onchange="handleCategoryChange(this)"></select>
      </div>
      
      <div class="form-group">
        <label class="form-label">Belongs To</label>
        <select id="t-owner" class="form-select">
          <option value="Dom">My Toys</option>
          <option value="Sub">Partner's Toys</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="t-notes" class="form-textarea" placeholder="Optional notes..."></textarea>
      </div>
      
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
        <div>
          <label class="form-label" id="dom-rating-label">Mine Rating</label>
          <div class="star-rating" id="dom-stars"></div>
          <input type="hidden" id="t-drat" value="0">
        </div>
        <div>
          <label class="form-label" id="sub-rating-label">Partner Rating</label>
          <div class="star-rating" id="sub-stars"></div>
          <input type="hidden" id="t-srat" value="0">
        </div>
      </div>
      
      <input type="hidden" id="t-id">
      
      <div style="display:flex; gap:12px; margin-top:24px;">
        <button onclick="closeToyModal()" class="btn btn-outline" style="flex:1;">Cancel</button>
        <button onclick="saveToy()" class="btn btn-gold" style="flex:1;">Save</button>
      </div>
      
      <button id="toy-delete-btn" onclick="deleteToyFromModal()" 
              class="btn btn-danger" style="width:100%; margin-top:12px; display:none;">Delete Toy</button>
    </div>
  </div>

  <!-- WISHLIST MODAL -->
  <div id="wish-modal" class="modal-back">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="wish-modal-title">Add to Wishlist</div>
      
      <div class="form-group">
        <label class="form-label">Item Name</label>
        <input type="text" id="w-name" class="form-input">
      </div>
      
      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="w-cat" class="form-select"></select>
      </div>
      
      <input type="hidden" id="w-id">
      
      <div style="display:flex; gap:12px; margin-top:24px;">
        <button onclick="closeWishModal()" class="btn btn-outline" style="flex:1;">Cancel</button>
        <button onclick="saveWish()" class="btn btn-gold" style="flex:1;">Save</button>
      </div>
      
      <button id="wish-delete-btn" onclick="deleteWish()" 
              class="btn btn-danger" style="width:100%; margin-top:12px; display:none;">Remove from Wishlist</button>
    </div>
  </div>

  <!-- CATEGORY MANAGEMENT MODAL -->
  <div id="category-modal" class="modal-back">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Manage Categories</div>
      
      <div style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" id="new-category-name" class="form-input" placeholder="New category name" style="flex:1;">
        <button onclick="addNewCategory()" class="btn btn-gold" style="width:auto; padding:0 20px;">Add</button>
      </div>
      
      <div id="category-list" style="max-height:300px; overflow-y:auto; margin-bottom:20px;"></div>
      
      <button onclick="closeCategoryModal()" class="btn btn-outline" style="width:100%;">Done</button>
    </div>
  </div>

  <!-- FILTER BOTTOM SHEET -->
  <div id="filter-sheet" class="modal-back">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Filter Collection</div>
      
      <div class="form-group">
        <label class="form-label">Owner</label>
        <div class="filter-pills" id="owner-filter-pills">
          <!-- Populated dynamically with "My Toys" / "Partner's Toys" -->
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Minimum Rating</label>
        <div class="filter-pills">
          <div class="filter-pill active" onclick="setFilter('rating', 0, this)">Any</div>
          <div class="filter-pill" onclick="setFilter('rating', 3, this)">3★+</div>
          <div class="filter-pill" onclick="setFilter('rating', 4, this)">4★+</div>
          <div class="filter-pill" onclick="setFilter('rating', 5, this)">5★</div>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Smart Filters</label>
        <div class="filter-pills">
          <div class="filter-pill active" onclick="setFilter('smart', 'none', this)">None</div>
          <div class="filter-pill" onclick="setFilter('smart', 'mutual', this)">Mutual Favorites</div>
          <div class="filter-pill" onclick="setFilter('smart', 'attention', this)">Needs Attention</div>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Category</label>
        <div class="filter-pills" id="category-filter-pills">
          <!-- Populated dynamically in JS -->
        </div>
      </div>
      
      <button onclick="applyFiltersAndClose()" class="btn btn-gold" style="margin-top:20px;">Apply Filters</button>
    </div>
  </div>

  <script type="module">
    import { requireAuth, getMyProfile, getRelationship, getUserProfile } from './auth.js';
    import { doc, setDoc, deleteDoc, getDocs, collection } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { db } from './firebase-config.js';

    let myUid = null;
    let relId = null;
    let toys = [];
    let wishes = [];
    let categories = ['Vibration','Insertion','Anal Play','Impact','Restraint','Sensation','Other'];
    let myRole = null;
    let partnerName = 'Partner';

    let toysCol, wishesCol, categoryCol;
    let currentFilters = { owner: 'all', rating: 0, smart: 'none', category: 'all' };
    let expandedId = null;

    function dataCol(path, id) {
      return collection(db, 'data', id, path);
    }

    async function loadData(user) {
      myUid = user.uid;
      const rel = await getRelationship();
      relId = rel?.id || user.uid;
      
      toysCol = dataCol('vault-toys', relId);
      wishesCol = dataCol('vault-wishes', relId);
      categoryCol = dataCol('categories', relId);

      const profile = await getMyProfile();
      myRole = profile?.role || null;

      // Get partner name for dynamic labels
      if (rel) {
        const partnerUid = rel.domId === myUid ? rel.subId : rel.domId;
        const partnerProfile = await getUserProfile(partnerUid);
        partnerName = partnerProfile?.displayName || 'Partner';
      }

      // Load categories from Firestore
      const catSnap = await getDocs(categoryCol);
      catSnap.docs.forEach(d => {
        const name = d.data().name;
        if (name && !categories.includes(name)) {
          categories.push(name);
        }
      });

      const [tSnap, wSnap] = await Promise.all([getDocs(toysCol), getDocs(wishesCol)]);
      toys = tSnap.docs.map(d => d.data());
      wishes = wSnap.docs.map(d => d.data());

      // Auto-scan categories from items
      [...toys, ...wishes].forEach(item => {
        if (item.category && !categories.includes(item.category)) {
          categories.push(item.category);
        }
      });

      categories.sort((a, b) => a.localeCompare(b));

      updateCategorySelects();
      populateCategoryPills();
      populateOwnerPills();
      renderVault();
      renderWishlist();
    }

    function updateCategorySelects() {
      let html = categories.map(c => `<option>${c}</option>`).join('');
      html += `<option value="__new__">New Category...</option>`;
      html += `<option value="__manage__">Manage Categories...</option>`;
      
      const t = document.getElementById('t-cat');
      const w = document.getElementById('w-cat');
      if (t) t.innerHTML = html;
      if (w) w.innerHTML = html;
    }

    window.handleCategoryChange = function(select) {
      if (select.value === '__new__') {
        const newCat = prompt("Enter new category name:");
        if (newCat && newCat.trim()) {
          const name = newCat.trim();
          if (!categories.includes(name)) {
            categories.push(name);
            categories.sort();
            updateCategorySelects();
            select.value = name;
          } else {
            alert("Category already exists");
            select.value = '';
          }
        } else {
          select.value = '';
        }
      } 
      else if (select.value === '__manage__') {
        openCategoryModal();
        select.value = ''; // reset
      }
    };

    window.switchTab = function(tab, el) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      
      document.getElementById('tab-vault').style.display = tab === 'vault' ? 'block' : 'none';
      document.getElementById('tab-wishlist').style.display = tab === 'wishlist' ? 'block' : 'none';
    }

    function renderVault() {
      const container = document.getElementById('vault-list');
      const q = (document.getElementById('search')?.value || '').toLowerCase();

      let filtered = toys.filter(t => {
        const matchesSearch = !q || t.name.toLowerCase().includes(q) || (t.notes && t.notes.toLowerCase().includes(q));
        const matchesOwner = currentFilters.owner === 'all' || t.owner === currentFilters.owner;
        const avg = (t.domRating + t.subRating) / 2;
        const matchesRating = avg >= currentFilters.rating;
        const matchesCategory = currentFilters.category === 'all' || t.category === currentFilters.category;
        
        let matchesSmart = true;
        if (currentFilters.smart === 'mutual') matchesSmart = t.domRating >= 4 && t.subRating >= 4;
        if (currentFilters.smart === 'attention') matchesSmart = (t.domRating <= 2 || t.subRating <= 2);
        
        return matchesSearch && matchesOwner && matchesRating && matchesCategory && matchesSmart;
      });

      // Group by category
      const groups = {};
      categories.forEach(cat => groups[cat] = []);
      
      filtered.forEach(t => {
        if (groups[t.category]) {
          groups[t.category].push(t);
        } else {
          groups['Other'] = groups['Other'] || [];
          groups['Other'].push(t);
        }
      });

      let html = '';
      
      categories.forEach(cat => {
        const items = groups[cat];
        if (!items || items.length === 0) return;
        
        html += `
          <div class="glass-card" style="margin-bottom: 20px; padding: 8px 0;">
            <div onclick="toggleCategory('${cat}')" style="display:flex; align-items:center; justify-content:space-between; padding: 12px 20px; cursor:pointer;">
              <div style="display:flex; align-items:center; gap:10px;">
                <span style="font-family:'Playfair Display',serif; font-size:18px; font-weight:600; color:var(--gold);">${cat}</span>
                <span style="background:rgba(212,175,55,0.15); color:#aaa; font-size:11px; padding:3px 10px; border-radius:9999px; font-weight:500;">${items.length}</span>
              </div>
              <span id="chevron-${cat}" style="color:#666; font-size:18px; transition:transform .3s;">▾</span>
            </div>
            <div id="cat-rows-${cat}" style="padding: 0 12px;">
              ${items.map(t => `
                <div class="toy-row" onclick="openToyModal('${t.id}'); event.stopImmediatePropagation();">
                  <div class="toy-stripe ${t.owner === 'Dom' ? 'stripe-dom' : 'stripe-sub'}"></div>
                  <div class="toy-main">
                    <div class="toy-name">${t.name}</div>
                    <div class="toy-ratings">
                      <span>${t.owner === myRole ? 'Mine' : partnerName}: ${createMiniStars(t.domRating)}</span>
                      <span>${t.owner === myRole ? partnerName : 'Mine'}: ${createMiniStars(t.subRating)}</span>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html || '<div style="text-align:center; color:#666; padding:40px 20px;">No toys match your filters</div>';
    }

    // Category collapse state
    let collapsedCategories = {};

    window.toggleCategory = function(cat) {
      const rows = document.getElementById('cat-rows-' + cat);
      const chevron = document.getElementById('chevron-' + cat);
      
      if (!rows) return;
      
      collapsedCategories[cat] = !collapsedCategories[cat];
      
      if (collapsedCategories[cat]) {
        rows.style.display = 'none';
        chevron.style.transform = 'rotate(-90deg)';
      } else {
        rows.style.display = 'block';
        chevron.style.transform = 'rotate(0deg)';
      }
    };

    function createMiniStars(rating) {
      let html = '';
      const r = Math.round(rating);
      for (let i = 1; i <= 5; i++) {
        html += `<span class="mini-star ${i <= r ? 'filled' : ''}">★</span>`;
      }
      return html;
    }

    function renderWishlist() {
      const container = document.getElementById('wish-list');
      container.innerHTML = wishes.map(w => {
        const addedBy = (w.owner === myRole) ? "Added by Me" : `Added by ${partnerName}`;
        return `
          <div class="menu-card" onclick="openWishModal('${w.id}')">
            <div class="menu-card-title">${w.name}</div>
            <div class="menu-card-meta">${w.category || 'Uncategorized'} • ${addedBy}</div>
          </div>
        `;
      }).join('');
    }

    // Star Rating Component
    function initStarRating(containerId, type, currentValue) {
      const container = document.getElementById(containerId);
      if (!container) return;
      
      container.innerHTML = '';
      const value = Math.round(currentValue || 0);
      
      for (let i = 1; i <= 5; i++) {
        const star = document.createElement('span');
        star.className = `star ${i <= value ? 'filled' : ''}`;
        star.textContent = '★';
        star.onclick = () => {
          document.getElementById(type === 'dom' ? 't-drat' : 't-srat').value = i;
          initStarRating(containerId, type, i);
        };
        container.appendChild(star);
      }
    }

    window.openToyModal = function(id) {
      const modal = document.getElementById('toy-modal');
      const deleteBtn = document.getElementById('toy-delete-btn');
      const ownerSelect = document.getElementById('t-owner');
      
      // Set dynamic labels
      ownerSelect.options[0].text = "My Toys";
      ownerSelect.options[1].text = `${partnerName}'s Toys`;
      
      // Dynamic rating labels
      document.getElementById('dom-rating-label').textContent = "Mine Rating";
      document.getElementById('sub-rating-label').textContent = `${partnerName} Rating`;
      
      if (id) {
        const t = toys.find(x => x.id === id);
        document.getElementById('toy-modal-title').textContent = 'Edit Toy';
        document.getElementById('t-id').value = id;
        document.getElementById('t-name').value = t.name;
        document.getElementById('t-cat').value = t.category;
        document.getElementById('t-owner').value = t.owner;
        document.getElementById('t-notes').value = t.notes || '';
        document.getElementById('t-drat').value = t.domRating || 0;
        document.getElementById('t-srat').value = t.subRating || 0;
        
        initStarRating('dom-stars', 'dom', t.domRating);
        initStarRating('sub-stars', 'sub', t.subRating);
        
        // Ownership check
        const canDelete = (myRole === 'dom' && t.owner === 'Dom') || (myRole === 'sub' && t.owner === 'Sub');
        deleteBtn.style.display = canDelete ? 'block' : 'none';
        deleteBtn.onclick = () => deleteToyFromModal(id);
      } else {
        document.getElementById('toy-modal-title').textContent = 'Add New Toy';
        ['t-name','t-notes','t-drat','t-srat','t-id'].forEach(f => document.getElementById(f).value = '');
        document.getElementById('t-cat').value = 'Vibration';
        document.getElementById('t-owner').value = 'Dom';
        initStarRating('dom-stars', 'dom', 0);
        initStarRating('sub-stars', 'sub', 0);
        deleteBtn.style.display = 'none';
      }
      
      modal.classList.add('open');
    };

    window.closeToyModal = function() {
      document.getElementById('toy-modal').classList.remove('open');
    };

    window.saveToy = async function() {
      const name = document.getElementById('t-name').value.trim();
      if (!name) {
        showToast("Toy name is required", "error");
        return;
      }

      const currentId = document.getElementById('t-id').value;
      const isNew = !currentId;

      // Check for duplicate name (excluding current toy if editing)
      const duplicate = toys.find(t => 
        t.name.toLowerCase() === name.toLowerCase() && 
        t.id !== currentId
      );

      if (duplicate) {
        showToast("A toy with this name already exists", "error");
        return;
      }

      const id = currentId || 'toy_' + Date.now();
      const toy = {
        id,
        name,
        category: document.getElementById('t-cat').value,
        owner: document.getElementById('t-owner').value,
        notes: document.getElementById('t-notes').value.trim(),
        domRating: parseFloat(document.getElementById('t-drat').value) || 0,
        subRating: parseFloat(document.getElementById('t-srat').value) || 0,
        added: Date.now()
      };

      await setDoc(doc(toysCol, id), toy);
      toys = toys.filter(t => t.id !== id);
      toys.push(toy);
      closeToyModal();
      renderVault();

      const message = isNew ? "Toy added successfully" : "Toy updated successfully";
      showToast(message, "success");
    };

    window.deleteToyFromModal = async function(id) {
      if (!confirm("Delete this toy?")) return;
      await deleteDoc(doc(toysCol, id));
      toys = toys.filter(t => t.id !== id);
      closeToyModal();
      renderVault();
      showToast("Toy deleted successfully", "success");
    };

    // Wishlist functions
    window.openWishModal = function(id) {
      const modal = document.getElementById('wish-modal');
      const deleteBtn = document.getElementById('wish-delete-btn');
      
      if (id) {
        const w = wishes.find(x => x.id === id);
        document.getElementById('wish-modal-title').textContent = 'Edit Desire';
        document.getElementById('w-id').value = id;
        document.getElementById('w-name').value = w.name;
        document.getElementById('w-cat').value = w.category || 'Other';
        
        const canDelete = true; // Wishlist items are personal
        deleteBtn.style.display = canDelete ? 'block' : 'none';
        deleteBtn.onclick = () => deleteWish(id);
      } else {
        document.getElementById('wish-modal-title').textContent = 'Add New Desire';
        ['w-name','w-id'].forEach(f => document.getElementById(f).value = '');
        document.getElementById('w-cat').value = 'Vibration';
        deleteBtn.style.display = 'none';
      }
      
      modal.classList.add('open');
    };

    window.closeWishModal = function() {
      document.getElementById('wish-modal').classList.remove('open');
    };

    window.saveWish = async function() {
      const name = document.getElementById('w-name').value.trim();
      if (!name) {
        showToast("Name is required", "error");
        return;
      }

      const isNew = !document.getElementById('w-id').value;
      const id = document.getElementById('w-id').value || 'wish_' + Date.now();
      const wish = {
        id,
        name,
        category: document.getElementById('w-cat').value,
        owner: myRole,
        added: Date.now()
      };

      await setDoc(doc(wishesCol, id), wish);
      wishes = wishes.filter(w => w.id !== id);
      wishes.push(wish);
      closeWishModal();
      renderWishlist();

      showToast(isNew ? "Added to wishlist" : "Wishlist item updated", "success");
    };

    window.deleteWish = async function(id) {
      if (!confirm("Remove from wishlist?")) return;
      await deleteDoc(doc(wishesCol, id));
      wishes = wishes.filter(w => w.id !== id);
      closeWishModal();
      renderWishlist();
      showToast("Item removed from wishlist", "success");
    };

    // Filter Sheet
    window.openFilterSheet = function() {
      document.getElementById('filter-sheet').classList.add('open');
    };

    window.setFilter = function(type, value, el) {
      currentFilters[type] = value;
      
      // Special handling for category pills
      if (type === 'category') {
        document.querySelectorAll('#category-filter-pills .filter-pill').forEach(p => p.classList.remove('active'));
      } else {
        document.querySelectorAll('#filter-sheet .filter-pill').forEach(p => p.classList.remove('active'));
      }
      el.classList.add('active');
    };

    function populateCategoryPills() {
      const container = document.getElementById('category-filter-pills');
      if (!container) return;
      
      let html = `<div class="filter-pill active" onclick="setFilter('category', 'all', this)">All</div>`;
      
      categories.forEach(cat => {
        html += `<div class="filter-pill" onclick="setFilter('category', '${cat}', this)">${cat}</div>`;
      });
      
      container.innerHTML = html;
    }

    function populateOwnerPills() {
      const container = document.getElementById('owner-filter-pills');
      if (!container) return;
      
      const myLabel = myRole === 'dom' ? "My Toys" : "My Toys";
      const partnerLabel = `${partnerName}'s Toys`;
      
      let html = `
        <div class="filter-pill active" onclick="setFilter('owner', 'all', this)">All</div>
        <div class="filter-pill" onclick="setFilter('owner', '${myRole === 'dom' ? 'Dom' : 'Sub'}', this)">${myLabel}</div>
        <div class="filter-pill" onclick="setFilter('owner', '${myRole === 'dom' ? 'Sub' : 'Dom'}', this)">${partnerLabel}</div>
      `;
      
      container.innerHTML = html;
    }

    window.applyFiltersAndClose = function() {
      document.getElementById('filter-sheet').classList.remove('open');
      renderVault();
    };

    window.openCategoryModal = function() {
      const modal = document.getElementById('category-modal');
      renderCategoryList();
      modal.classList.add('open');
    };

    window.closeCategoryModal = function() {
      document.getElementById('category-modal').classList.remove('open');
      updateCategorySelects();
      renderVault(); // Refresh in case categories changed
    };

    function renderCategoryList() {
      const container = document.getElementById('category-list');
      if (!container) return;
      
      container.innerHTML = categories.map((cat, index) => {
        const inUse = toys.some(t => t.category === cat);
        
        return `
          <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border);">
            <span style="color:#ddd;">${cat}</span>
            ${inUse 
              ? `<span style="color:#666; font-size:11px;">In use</span>` 
              : `<button onclick="deleteCategory(${index})" style="background:none; border:none; color:#F44336; font-size:18px; cursor:pointer;">×</button>`
            }
          </div>
        `;
      }).join('');
    }

    window.addNewCategory = function() {
      const input = document.getElementById('new-category-name');
      const name = input.value.trim();
      
      if (!name) {
        showToast("Category name is required", "error");
        return;
      }
      if (categories.includes(name)) {
        showToast("Category already exists", "error");
        return;
      }
      
      categories.push(name);
      categories.sort();
      input.value = '';
      renderCategoryList();
      showToast("Category added", "success");
    };

    window.deleteCategory = function(index) {
      const cat = categories[index];
      
      // Check if any toys are using this category
      const inUse = toys.some(t => t.category === cat);
      if (inUse) {
        if (!confirm(`"${cat}" is currently used by some toys. Delete anyway?`)) {
          return;
        }
      }
      
      categories.splice(index, 1);
      renderCategoryList();
    };

    // Init
    requireAuth().then(user => loadData(user));
  </script>
  
  <script src="nav.js"></script>
</body>
</html>
