<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --gold:#c9a84c;
  --gold-l:#e2c47a;
  --gold-dim:rgba(201,168,76,0.11);
  --gold-b:rgba(201,168,76,0.2);
  --gold-glow:rgba(201,168,76,0.45);
  --crimson:#8b2230;
  --bg:#080c14;
  --surface:#0e1420;
  --text:#f0e6d2;
  --muted:#68707f;
  --muted2:#939aaa;
  --safe-t:env(safe-area-inset-top,0px);
}

html{height:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100dvh;
  background:var(--bg);
  color:var(--text);
  font-family:'Raleway',sans-serif;
  overflow-x:hidden;
}

/* Role-specific accents */
body[data-role="dom"] .accent { --accent: var(--crimson); }
body[data-role="sub"] .accent { --accent: var(--gold); }

.orb{position:fixed;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.055) 0%,transparent 68%);top:-180px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:0;animation:floatA 9s ease-in-out infinite}
.orb2{position:fixed;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(139,34,48,0.045) 0%,transparent 70%);bottom:120px;right:-60px;pointer-events:none;z-index:0;animation:floatB 11s ease-in-out infinite}
@keyframes floatA{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(22px)}}
@keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}

/* page */
.page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 120px}

/* header */
.hdr{text-align:center;padding-top:max(var(--safe-t),28px);padding-bottom:16px;border-bottom:1px solid var(--gold-b);margin-bottom:6px}
.app-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--gold-l);letter-spacing:3px;text-transform:uppercase;display:block;animation:fadeD .5s ease both}
.app-sub{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);display:block;margin-top:3px;animation:fadeD .5s .08s ease both}
.role-badge{display:inline-block;margin-top:8px;padding:2px 12px;border-radius:20px;font-size:10px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase}
body[data-role="dom"] .role-badge{background:var(--crimson);color:white}
body[data-role="sub"] .role-badge{background:var(--gold);color:#080c14}

@keyframes fadeD{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeU{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px;margin-bottom:10px;margin-top:18px;animation:fadeU .5s .18s ease both}
.card{background:var(--surface);border:1px solid var(--gold-b);border-radius:22px;padding:16px 14px 14px;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(--gold) 50%,transparent 95%);opacity:.28}
.card.wide{grid-column:1/-1}
.card.accent::after{background:linear-gradient(90deg,transparent 5%,var(--crimson) 50%,transparent 95%);opacity:.55}
.card-val{font-family:'Playfair Display',serif;font-size:32px;color:var(--gold-l);line-height:1;display:block;letter-spacing:-.5px}
.card.accent .card-val{color:#e07585}
.card-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block;margin-top:5px;font-weight:600}

/* week dots */
.week-row{display:flex;gap:6px;margin-top:12px;align-items:center}
.wdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;letter-spacing:.3px;border:1px solid rgba(255,255,255,0.07);color:var(--muted);cursor:pointer;transition:background .2s,border-color .2s,box-shadow .2s,transform .15s;flex-shrink:0;-webkit-tap-highlight-color:transparent;font-family:'Raleway',sans-serif;user-select:none}
.wdot:active{transform:scale(.9)}
.wdot.done{background:var(--gold);color:#06090f;border-color:transparent;box-shadow:0 0 14px var(--gold-glow)}
.wdot.today{border-color:var(--gold);color:var(--gold)}
.wdot.future{opacity:.28;cursor:default;pointer-events:none}

/* section label */
.sec-lbl{font-size:9px;letter-spacing:3.5px;text-transform:uppercase;color:var(--muted);margin:20px 0 11px 2px;font-weight:600;display:flex;align-items:center;gap:10px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--gold-b)}

/* quick grid */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;animation:fadeU .5s .26s ease both}
.qbtn{background:var(--surface);border:1px solid var(--gold-b);border-radius:18px;padding:14px 6px 12px;text-align:center;cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;gap:6px;transition:border-color .2s,transform .18s,box-shadow .2s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
.qbtn::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .2s}
.qbtn:hover{border-color:rgba(201,168,76,.5);box-shadow:0 4px 24px rgba(201,168,76,.07);transform:translateY(-2px)}
.qbtn:hover::before{opacity:.5}
.qbtn:active{transform:scale(.97)}
.qi{font-size:22px;display:block}
.ql{font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:600;line-height:1.1;font-family:'Raleway',sans-serif}

/* scenes list & activity feed */
.scenes-list,.activity-feed{display:flex;flex-direction:column;gap:8px;animation:fadeU .5s .34s ease both}
.srow,.arow{background:var(--surface);border:1px solid var(--gold-b);border-radius:16px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none;color:inherit;transition:border-color .2s,transform .15s;-webkit-tap-highlight-color:transparent}
.srow:hover,.arow:hover{border-color:rgba(201,168,76,.45);transform:translateX(2px)}
.sico,.aico{width:36px;height:36px;border-radius:12px;background:var(--gold-dim);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sname,.aname{font-family:'Playfair Display',serif;font-size:13px;color:var(--gold-l);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smeta,.ameta{font-size:9px;color:var(--muted);margin-top:1px;display:block;letter-spacing:.4px}
.sstars{margin-left:auto;color:var(--gold);font-size:10px;flex-shrink:0;letter-spacing:1px}

/* training progress */
.progress-card{background:var(--surface);border:1px solid var(--gold-b);border-radius:16px;padding:14px 16px;margin-bottom:8px}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-name{font-size:12px;font-weight:600;color:var(--gold-l)}
.progress-level{font-size:10px;color:var(--muted)}
.progress-bar{height:6px;background:var(--gold-dim);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));transition:width .4s ease}
.progress-fill.crimson{background:linear-gradient(90deg,var(--crimson),#c45a6a)}

/* empty state */
.empty{background:var(--surface);border:1px dashed rgba(201,168,76,.18);border-radius:18px;padding:24px 18px;text-align:center}
.empty p{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--muted);line-height:1.5}
.empty a{display:inline-block;margin-top:12px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);text-decoration:none;border:1px solid var(--gold-b);border-radius:18px;padding:8px 18px;font-weight:600;transition:background .2s,border-color .2s}
.empty a:hover{background:var(--gold-dim);border-color:var(--gold)}

/* floating action */
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 8px 30px rgba(201,168,76,.35);z-index:100;cursor:pointer;transition:transform .2s,box-shadow .2s}
.fab.dom{background:var(--crimson);color:white}
.fab.sub{background:var(--gold);color:#080c14}
.fab:active{transform:scale(.92)}

/* role header tweak */
.hdr-role{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
</style>
</head>

  const user = await requireAuth();
  currentRole = await getMyRole();
  currentProfile = await getMyProfile();

  // Get partner UID and display name if paired
  if (currentProfile?.relationshipId) {
    try {
      partnerUid = await getPartnerUid();
      if (partnerUid) {
        const partnerProfile = await getUserProfile(partnerUid);

  } else {

}

// ==================== REAL FIRESTORE FUNCTIONS ====================

async function initLiveWeekTracker() {
  const LABELS = ['M','T','W','T','F','S','S'];
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay();
  const mon = new Date(today); mon.setDate(today.getDate() - ((dow + 6) % 7));
  const weekRef = dataRef('stats/week');

  const row = document.createElement('div');
  row.className = 'week-row';

  onSnapshot(weekRef, (snap) => {
    let saved = [];
    if (snap.exists()) saved = snap.data().done || [];

    row.innerHTML = '';
    for (let i = 0; i < 7; i++) {
      const day = new Date(mon); day.setDate(mon.getDate() + i);
      const iso = day.toISOString().slice(0, 10);
      const isToday = day.getTime() === today.getTime();
      const isDone = saved.includes(iso);

      const dot = document.createElement('div');
      dot.className = 'wdot';
      dot.textContent = LABELS[i];
      if (isDone) dot.classList.add('done');
      if (isToday) dot.classList.add('today');

      dot.onclick = async () => {
        if (isToday || day > today) return;
        const idx = saved.indexOf(iso);
        if (idx === -1) saved.push(iso); else saved.splice(idx, 1);
        await setDoc(weekRef, { done: saved }, { merge: true });
      };
      row.appendChild(dot);
    }
  });

  // Add to stats grid if it exists
  setTimeout(() => {
    const stats = document.getElementById('statsGrid');
    if (stats) {
      const wide = document.createElement('div');
      wide.className = 'card wide';
      wide.innerHTML = `<span class="card-lbl" style="margin-bottom:8px">This Week</span>`;
      wide.appendChild(row);
      stats.appendChild(wide);
    }
  }, 300);
}

function loadLiveStatsForDom() {
  // Streak + Compliance (from week stats)
  const weekRef = dataRef('stats/week');
  onSnapshot(weekRef, (snap) => {
    if (!snap.exists()) return;
    const saved = snap.data().done || [];
    const today = new Date(); today.setHours(0,0,0,0);
    let streak = 0;
    let cur = new Date(today);
    while (true) {
      const iso = cur.toISOString().slice(0,10);
      if (saved.includes(iso)) { streak++; cur.setDate(cur.getDate()-1); }
      else break;
    }
    document.getElementById('streakVal').textContent = streak || '—';

    const mon = new Date(today); mon.setDate(today.getDate() - ((today.getDay()+6)%7));
    const elapsed = Math.floor((today - mon) / 86400000) + 1;
    let done = 0;
    for (let i=0; i<elapsed; i++) {
      const d = new Date(mon); d.setDate(mon.getDate()+i);
      if (saved.includes(d.toISOString().slice(0,10))) done++;
    }
    const comp = elapsed > 0 ? Math.round((done / elapsed) * 100) : 0;
    document.getElementById('compVal').textContent = comp + '%';
  });

  // Scenes count (Dom view)
  const scenesQuery = query(dataCol('scenes'));
  onSnapshot(scenesQuery, (snap) => {
    const el = document.getElementById('scenesVal');
    if (el) el.textContent = snap.size;
  });

  // Pending Reports (sub's unchecked notes/tasks)
  if (partnerUid) {
    const pendingQuery = query(partnerDataCol('notes', partnerUid), where('checked', '==', false));
    onSnapshot(pendingQuery, (snap) => {
      const el = document.getElementById('pendingVal');
      if (el) el.textContent = snap.size || '—';
    });
  } else {
    document.getElementById('pendingVal').textContent = '—';
  }

  // Live Sub Status
  loadLiveSubStatus();
}

function loadLiveActivityFeedForDom() {
  const feed = document.getElementById('activityFeed');
  if (!partnerUid || !feed) return;

  const notesCol = partnerDataCol('notes', partnerUid);
  onSnapshot(query(notesCol, orderBy('timestamp', 'desc'), limit(5)), (snap) => {
    feed.innerHTML = '';
    if (snap.empty) {
      feed.innerHTML = `<div class="empty"><p>No recent activity from your sub yet.</p></div>`;
      return;
    }
    snap.forEach(doc => {
      const n = doc.data();
      const el = document.createElement('div');
      el.className = 'arow';
      el.innerHTML = `
        <div class="aico">📝</div>
        <div style="flex:1">
          <span class="aname">${n.content || n.text || 'Note added'}</span>
          <span class="ameta">${n.timestamp ? new Date(n.timestamp.toDate()).toLocaleString() : 'just now'}</span>
        </div>
      `;
      feed.appendChild(el);
    });
  });
}

async function loadLiveStatsForSub() {
  // Streak + Compliance
  const weekRef = dataRef('stats/week');
  onSnapshot(weekRef, (snap) => {
    if (!snap.exists()) return;
    const saved = snap.data().done || [];
    const today = new Date(); today.setHours(0,0,0,0);
    let streak = 0; let cur = new Date(today);
    while (true) {
      const iso = cur.toISOString().slice(0,10);
      if (saved.includes(iso)) { streak++; cur.setDate(cur.getDate()-1); } else break;
    }
    document.getElementById('streakVal').textContent = streak || '—';

    const mon = new Date(today); mon.setDate(today.getDate() - ((today.getDay()+6)%7));
    const elapsed = Math.floor((today-mon)/86400000)+1;
    let done = 0;
    for(let i=0;i<elapsed;i++){ const d=new Date(mon);d.setDate(mon.getDate()+i); if(saved.includes(d.toISOString().slice(0,10))) done++; }
    const comp = elapsed>0 ? Math.round((done/elapsed)*100) : 0;
    document.getElementById('compVal').textContent = comp + '%';
  });

  // Tasks due today (from tasks collection)
  const tasksQuery = query(dataCol('tasks'), where('dueDate', '==', new Date().toISOString().slice(0,10)), where('completed', '==', false));
  onSnapshot(tasksQuery, (snap) => {
    const el = document.getElementById('tasksVal');
    if (el) el.textContent = snap.size || '0';
  });
}

async function loadTrainingProgress() {
  const container = document.getElementById('trainingProgress');
  if (!container) return;

  const trainings = [
    { id: 'deepthroat', name: 'Deepthroat', icon: '🍆' },
    { id: 'heel', name: 'Heel Training', icon: '👠' },
    { id: 'kegel', name: 'Kegel', icon: '💪' },
    { id: 'positions', name: 'Positions', icon: '🧘' }
  ];

  container.innerHTML = '';

  for (const t of trainings) {
    try {
      const docRef = dataRef(`training/${t.id}`);
      const snap = await getDoc(docRef);
      let level = 1, progress = 0;
      let assignedData = {};
      if (snap.exists()) {
        assignedData = snap.data();
        level = assignedData.level || 1;
        progress = assignedData.progress || 0;
      }

      const isAssignedBySir = !!assignedData.assignedBy;

      const card = document.createElement('div');
      card.className = 'progress-card';
      card.innerHTML = `
        <div class="progress-header">
          <span class="progress-name">${t.icon} ${t.name}</span>
          <span class="progress-level">Level ${level} • ${progress}%</span>
        </div>
        ${isAssignedBySir ? `
          <div style="margin:8px 0 4px 0">
            <span style="background:var(--crimson);color:white;font-size:9px;padding:1px 7px;border-radius:10px">ASSIGNED BY SIR</span>
            ${assignedData.noteFromSir ? `<div style="font-size:10px;color:#e07585;margin-top:4px">“${assignedData.noteFromSir}”</div>` : ''}
          </div>
        ` : ''}
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      `;
      container.appendChild(card);
    } catch (e) {
      console.log(`Training ${t.id} not found yet`);
    }
  }
}

function loadLiveActivityFeedForSub() {
  const feed = document.getElementById('activityFeed');
  if (!feed) return;

  const notesCol = dataCol('notes');
  onSnapshot(query(notesCol, orderBy('timestamp', 'desc'), limit(5)), (snap) => {
    feed.innerHTML = '';
    if (snap.empty) {
      feed.innerHTML = `<div class="empty"><p>No recent devotions logged yet.</p></div>`;
      return;
    }
    snap.forEach(doc => {
      const n = doc.data();
      const el = document.createElement('div');
      el.className = 'arow';
      el.innerHTML = `
        <div class="aico">✅</div>
        <div style="flex:1">
          <span class="aname">${n.content || n.text || 'Task completed'}</span>
          <span class="ameta">${n.timestamp ? new Date(n.timestamp.toDate()).toLocaleString() : 'just now'}</span>
        </div>
      `;
      feed.appendChild(el);
    });
  });
}

async function initRealScenes(isDom) {
  const listId = isDom ? 'scenesList' : 'assignedScenes';
  const list = document.getElementById(listId);
  if (!list) return;

  const q = query(dataCol('scenes'), orderBy('date', 'desc'), limit(3));
  onSnapshot(q, (snap) => {
    list.innerHTML = '';
    if (snap.empty) {
      list.innerHTML = `<div class="empty"><p>No scenes yet.<br>${isDom ? 'Build your first scene.' : 'Awaiting Sir\'s next scene.'}</p></div>`;
      return;
    }
    snap.forEach(doc => {
      const s = doc.data();
      const el = document.createElement('a');
      el.className = 'srow';
      el.href = 'scene-menu.html';
      el.innerHTML = `
        <div class="sico">${['🎭','🌹','⚡','🔒','🕯️'][Math.floor(Math.random()*5)]}</div>
        <div style="flex:1;min-width:0">
          <span class="sname">${s.name || s.title || 'Scene'}</span>
          <span class="smeta">${s.date ? new Date(s.date).toLocaleDateString() : 'Saved scene'}</span>
        </div>
      `;
      list.appendChild(el);
    });
  });
}

function loadLiveSubStatus() {
  if (!partnerUid) {
    const el = document.getElementById('liveStatusText');
    if (el) el.innerHTML = 'No partner paired yet';
    return;
  }
  const notesRef = partnerDataCol('notes', partnerUid);
  const q = query(notesRef, orderBy('timestamp', 'desc'), limit(1));
  onSnapshot(q, (snap) => {
    if (!snap.empty) {
      const latest = snap.docs[0].data();
      const text = latest.content || latest.text || 'Recently active';
      const el = document.getElementById('liveStatusText');
      if (el) el.innerHTML = `${text} <span style="color:#4ade80">• just now</span>`;
    }
  });
}
