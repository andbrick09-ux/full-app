<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#051024"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Calendar • Dom Sub Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="nav.css"/>
  <style>
    body { min-height: 100dvh; overflow-x: hidden; }
    .glow-orb {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%);
      top: -140px; left: 50%; transform: translateX(-50%);
      pointer-events: none; z-index: 0;
    }
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; padding-top: calc(14px + var(--safe-t));
      background: rgba(5,16,36,0.95); backdrop-filter: blur(25px);
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      flex-shrink: 0; width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2);
      text-decoration: none; cursor: pointer; transition: all .2s;
    }
    .topbar-center { flex: 1; min-width: 0; }
    .topbar-title {
      font-family: 'Great Vibes', cursive; font-size: 26px;
      background: var(--luxury-gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; margin: 0; line-height: 1.1;
    }
    .topbar-sub {
      font-family: 'Playfair Display', serif; color: var(--gold);
      font-size: 10px; text-transform: uppercase; letter-spacing: 2.5px;
      margin-top: 1px; opacity: 0.6;
    }
    .view-toggle {
      display: flex; gap: 6px; padding: 10px 16px 8px;
      background: rgba(5,16,36,0.95); border-bottom: 1px solid rgba(212,175,55,0.06);
      position: sticky; top: calc(68px + var(--safe-t)); z-index: 99;
    }
    .view-btn {
      flex: 1; padding: 9px 6px; border-radius: 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      color: #666; font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
      cursor: pointer; transition: all 0.2s;
    }
    .view-btn.active {
      background: var(--luxury-gradient); color: var(--midnight);
      border-color: transparent; box-shadow: 0 3px 12px rgba(212,175,55,0.3);
    }
    .page-wrap {
      position: relative; z-index: 1; max-width: 600px; margin: 0 auto;
      padding: 16px 16px calc(100px + var(--safe-b));
    }
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding: 0 4px;
    }
    .month-nav-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(212,175,55,0.07); border: 1px solid rgba(212,175,55,0.15);
      color: var(--gold); font-size: 18px; cursor: pointer;
    }
    .month-label {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--gold);
      font-weight: 600;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 24px;
    }
    .calendar-day {
      aspect-ratio: 1;
      background: rgba(5,16,36,0.6);
      border: 1px solid rgba(212,175,55,0.1);
      border-radius: 10px;
      padding: 6px;
      font-size: 12px;
      position: relative;
      cursor: pointer;
    }
    .calendar-day.today {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(212,175,55,0.3);
    }
    .fab {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--gold);
      color: #080c14;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 20px rgba(212,175,55,0.4);
      cursor: pointer;
      z-index: 200;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(5,16,36,0.95);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #888;
      font-size: 10px;
    }
    .nav-item.active {
      color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>

  <div class="topbar">
    <a href="index-enhanced.html" class="back-btn">
      <span class="material-symbols-rounded">arrow_back</span>
    </a>
    <div class="topbar-center">
      <div class="topbar-title">Calendar</div>
      <div class="topbar-sub">Shared Schedule</div>
    </div>
  </div>

  <div class="view-toggle">
    <button class="view-btn active" onclick="switchView('month')">MONTH</button>
    <button class="view-btn" onclick="switchView('week')">WEEK</button>
    <button class="view-btn" onclick="switchView('day')">DAY</button>
  </div>

  <div class="page-wrap">

    <!-- Month View -->
    <div id="view-month">
      <div class="month-nav">
        <button class="month-nav-btn" onclick="prevMonth()">←</button>
        <div class="month-label" id="monthLabel">July 2026</div>
        <button class="month-nav-btn" onclick="nextMonth()">→</button>
      </div>
      <div class="calendar-grid" id="calendarGrid">
        <!-- Calendar days populated by JS -->
      </div>
    </div>

    <!-- Week View -->
    <div id="view-week" style="display: none;">
      <div class="month-nav">
        <button class="month-nav-btn" onclick="prevWeek()">←</button>
        <div class="month-label" id="weekLabel">Week of July 13</div>
        <button class="month-nav-btn" onclick="nextWeek()">→</button>
      </div>
      <div id="weekContainer" style="padding: 20px; text-align: center; color: #888;">
        Week view coming soon
      </div>
    </div>

    <!-- Day View -->
    <div id="view-day" style="display: none;">
      <div class="month-nav">
        <button class="month-nav-btn" onclick="prevDay()">←</button>
        <div class="month-label" id="dayLabel">July 17, 2026</div>
        <button class="month-nav-btn" onclick="nextDay()">→</button>
      </div>
      <div id="dayContainer" style="padding: 20px; text-align: center; color: #888;">
        Day view coming soon
      </div>
    </div>

  </div>

  <!-- Floating Action Button -->
  <div class="fab" onclick="showAddEventModal()">
    <span class="material-symbols-rounded">add</span>
  </div>

  <!-- Add Event Modal -->
  <div id="addEventModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 300; align-items: center; justify-content: center;">
    <div style="background: #051024; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; border: 1px solid var(--border);">
      <h3 style="color: var(--gold); margin-bottom: 20px; font-family: 'Playfair Display', serif;">Add New Event</h3>
      
      <div style="margin-bottom: 16px;">
        <label style="color: #888; font-size: 12px; display: block; margin-bottom: 6px;">Event Title</label>
        <input type="text" id="eventTitle" style="width: 100%; padding: 12px; background: rgba(5,16,36,0.8); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 15px;" placeholder="Enter event title">
      </div>
      
      <div style="margin-bottom: 16px;">
        <label style="color: #888; font-size: 12px; display: block; margin-bottom: 6px;">Date</label>
        <input type="date" id="eventDate" style="width: 100%; padding: 12px; background: rgba(5,16,36,0.8); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 15px;">
      </div>
      
      <div style="margin-bottom: 16px;">
        <label style="color: #888; font-size: 12px; display: block; margin-bottom: 6px;">Type</label>
        <select id="eventType" style="width: 100%; padding: 12px; background: rgba(5,16,36,0.8); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 15px;">
          <option value="scene">Scene</option>
          <option value="task">Task</option>
          <option value="ritual">Ritual</option>
          <option value="personal">Personal</option>
        </select>
      </div>
      
      <div style="margin-bottom: 20px;">
        <label style="color: #888; font-size: 12px; display: block; margin-bottom: 6px;">Description (optional)</label>
        <textarea id="eventDesc" style="width: 100%; padding: 12px; background: rgba(5,16,36,0.8); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 15px; min-height: 80px;" placeholder="Add details..."></textarea>
      </div>
      
      <div style="display: flex; gap: 12px;">
        <button onclick="hideAddEventModal()" style="flex: 1; padding: 14px; background: transparent; border: 1px solid #666; color: #888; border-radius: 999px; font-weight: 700;">Cancel</button>
        <button onclick="saveNewEvent()" style="flex: 1; padding: 14px; background: var(--gold); color: #080c14; border: none; border-radius: 999px; font-weight: 700;">Add Event</button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <a href="index-enhanced.html" class="nav-item">
      <span class="material-symbols-rounded">home</span>
      <span>Home</span>
    </a>
    <a href="scene-menu.html" class="nav-item">
      <span class="material-symbols-rounded">theater_comedy</span>
      <span>Scenes</span>
    </a>
    <a href="training-menu.html" class="nav-item">
      <span class="material-symbols-rounded">fitness_center</span>
      <span>Training</span>
    </a>
    <a href="calendar.html" class="nav-item active">
      <span class="material-symbols-rounded">calendar_month</span>
      <span>Calendar</span>
    </a>
    <a href="more.html" class="nav-item">
      <span class="material-symbols-rounded">more_horiz</span>
      <span>More</span>
    </a>
  </div>

  <script src="nav.js"></script>
  <script>
    let currentView = 'month';
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    function switchView(view) {
      currentView = view;
      
      document.getElementById('view-month').style.display = 'none';
      document.getElementById('view-week').style.display = 'none';
      document.getElementById('view-day').style.display = 'none';
      
      document.getElementById('view-' + view).style.display = 'block';
      
      document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }

    function renderMonth() {
      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';
      
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                         'July', 'August', 'September', 'October', 'November', 'December'];
      document.getElementById('monthLabel').textContent = monthNames[currentMonth] + ' ' + currentYear;
      
      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'calendar-day';
        grid.appendChild(empty);
      }
      
      for (let day = 1; day <= daysInMonth; day++) {
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day';
        dayEl.innerHTML = `<div class="day-number">${day}</div>`;
        
        const today = new Date();
        if (currentYear === today.getFullYear() && 
            currentMonth === today.getMonth() && 
            day === today.getDate()) {
          dayEl.classList.add('today');
        }
        
        grid.appendChild(dayEl);
      }
    }

    function prevMonth() {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderMonth();
    }

    function nextMonth() {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderMonth();
    }

    function prevWeek() { alert('Week navigation coming soon'); }
    function nextWeek() { alert('Week navigation coming soon'); }
    function prevDay() { alert('Day navigation coming soon'); }
    function nextDay() { alert('Day navigation coming soon'); }

    function showAddEventModal() {
      document.getElementById('addEventModal').style.display = 'flex';
      // Set default date to today
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('eventDate').value = today;
    }

    function hideAddEventModal() {
      document.getElementById('addEventModal').style.display = 'none';
    }

    function saveNewEvent() {
      const title = document.getElementById('eventTitle').value;
      const date = document.getElementById('eventDate').value;
      const type = document.getElementById('eventType').value;
      const desc = document.getElementById('eventDesc').value;

      if (!title || !date) {
        alert('Please enter a title and date');
        return;
      }

      // Here you would save to Firestore
      alert('Event "' + title + '" added for ' + date + '! (This would save to Firestore)');

      hideAddEventModal();

      // Clear form
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventDesc').value = '';
    }

    function init() {
      renderMonth();
      document.getElementById('view-month').style.display = 'block';
      document.getElementById('view-week').style.display = 'none';
      document.getElementById('view-day').style.display = 'none';
    }

    init();
  </script>
</body>
</html>
