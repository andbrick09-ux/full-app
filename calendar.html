<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#051024" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Calendar • Dom Sub Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    body { min-height: 100dvh; overflow-x: hidden; }

    /* ── Glow orb ── */
    .glow-orb {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%);
      top: -140px; left: 50%; transform: translateX(-50%);
      pointer-events: none; z-index: 0;
      animation: orbFloat 8s ease-in-out infinite;
    }
    @keyframes orbFloat {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(24px); }
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; padding-top: calc(14px + var(--safe-t));
      background: rgba(5,16,36,0.95); backdrop-filter: blur(25px);
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      flex-shrink: 0; width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2);
      text-decoration: none; cursor: pointer; transition: all .2s;
    }
    .back-btn .material-symbols-rounded { font-size: 20px; color: var(--gold); }
    .topbar-center { flex: 1; min-width: 0; }
    .topbar-title {
      font-family: 'Great Vibes', cursive; font-size: 26px;
      background: var(--luxury-gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; margin: 0; line-height: 1.1;
    }
    .topbar-sub {
      font-family: 'Playfair Display', serif; color: var(--gold);
      font-size: 10px; text-transform: uppercase; letter-spacing: 2.5px;
      margin-top: 1px; opacity: 0.6;
    }



    /* ── View toggle ── */
    .view-toggle {
      display: flex; gap: 6px; padding: 10px 16px 8px;
      background: rgba(5,16,36,0.95); border-bottom: 1px solid rgba(212,175,55,0.06);
      position: sticky; top: calc(68px + var(--safe-t)); z-index: 99;
    }
    .view-btn {
      flex: 1; padding: 9px 6px; border-radius: 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      color: #666; font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
      cursor: pointer; transition: all 0.2s;
    }
    .view-btn.active {
      background: var(--luxury-gradient); color: var(--midnight);
      border-color: transparent; box-shadow: 0 3px 12px rgba(212,175,55,0.3);
    }

    /* ── Page wrap ── */
    .page-wrap {
      position: relative; z-index: 1; max-width: 600px; margin: 0 auto;
      padding: 16px 16px calc(100px + var(--safe-b));
    }

    /* ══════════════════════════════
       MONTH VIEW
    ══════════════════════════════ */
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding: 0 4px;
      animation: fadeUp 0.3s ease both;
    }
    .month-nav-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(212,175,55,0.07); border: 1px solid rgba(212,175,55,0.15);
      color: var(--gold); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .month-nav-btn:active { transform: scale(0.92); background: rgba(212,175,55,0.15); }
    .month-label {
      font-family: 'Playfair Display', serif; font-size: 20px;
      font-weight: 600; color: #ddd; text-align: center;
    }
    .month-year { font-size: 12px; color: rgba(212,175,55,0.5); display: block; text-align: center; }

    /* Day headers */
    .day-headers {
      display: grid; grid-template-columns: repeat(7,1fr);
      margin-bottom: 6px; gap: 3px;
    }
    .day-header {
      text-align: center; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: #444; padding: 4px 0;
    }

    /* Calendar grid */
    .cal-grid {
      display: grid; grid-template-columns: repeat(7,1fr); gap: 3px;
      animation: fadeUp 0.3s ease 0.05s both;
    }
    .cal-cell {
      aspect-ratio: 1; border-radius: 12px; padding: 5px 4px 4px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
      cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column;
      align-items: center; gap: 2px; position: relative; overflow: hidden;
    }
    .cal-cell:hover { background: rgba(212,175,55,0.05); border-color: rgba(212,175,55,0.15); }
    .cal-cell:active { transform: scale(0.93); }
    .cal-cell.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
    .cal-cell.today {
      border-color: rgba(212,175,55,0.5);
      background: rgba(212,175,55,0.06);
      box-shadow: 0 0 12px rgba(212,175,55,0.1);
    }
    .cal-cell.other-month .cal-date { opacity: 0.2; }
    .cal-cell.selected { border-color: var(--gold); background: rgba(212,175,55,0.1); }

    .cal-date {
      font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 600;
      color: #ccc; line-height: 1;
    }
    .cal-cell.today .cal-date { color: var(--gold); }

    .cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; margin-top: 1px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .dot-scene    { background: var(--gold); box-shadow: 0 0 4px rgba(212,175,55,0.6); }
    .dot-training { background: #64B5F6; }
    .dot-ritual   { background: #BA68C8; }
    .dot-protocol { background: #4CAF50; }
    .dot-personal { background: #FF8A65; }
    .dot-unavail  { background: #555; }
    .dot-work     { background: #78909C; }
    .dot-vacation { background: #26C6DA; box-shadow: 0 0 4px rgba(38,198,218,0.5); }

    /* ══════════════════════════════
       WEEK VIEW
    ══════════════════════════════ */
    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; animation: fadeUp 0.3s ease both;
    }
    .week-label {
      font-family: 'Playfair Display', serif; font-size: 14px; color: #ccc; text-align: center;
    }
    /* Scrollable outer wrapper — clips to page, scrolls internally */
    .week-scroll-wrap {
      overflow-x: auto; overflow-y: visible;
      margin: 0 -16px;            /* bleed past page-wrap padding */
      padding: 0 16px 12px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      animation: fadeUp 0.3s ease 0.05s both;
    }
    .week-scroll-wrap::-webkit-scrollbar { display: none; }
    .week-grid {
      display: flex; gap: 8px;
      width: max-content;         /* lets columns dictate natural width */
    }
    .week-col {
      width: 80px; flex-shrink: 0;
      border-radius: 14px; background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 10px 6px; display: flex; flex-direction: column;
      align-items: center; gap: 6px; cursor: pointer; transition: all 0.2s; min-height: 150px;
    }
    .week-col:hover { border-color: rgba(212,175,55,0.2); background: rgba(212,175,55,0.03); }
    .week-col.today-col { border-color: rgba(212,175,55,0.45); background: rgba(212,175,55,0.06); }
    .week-col-day { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #555; }
    .week-col-num { font-family: 'Playfair Display', serif; font-size: 18px; color: #ccc; }
    .week-col.today-col .week-col-num { color: var(--gold); }
    .week-pills { display: flex; flex-direction: column; gap: 4px; width: 100%; }
    .week-pill {
      width: 100%; padding: 4px 6px; border-radius: 7px;
      font-size: 8px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.3px; text-align: center;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .week-more { font-size: 8px; color: #555; margin-top: 2px; text-align: center; }

    /* ══════════════════════════════
       DAY VIEW
    ══════════════════════════════ */
    .day-header-bar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
      animation: fadeUp 0.3s ease both;
    }
    .day-back-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(212,175,55,0.07); border: 1px solid rgba(212,175,55,0.15);
      color: var(--gold); cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 18px; transition: all 0.2s;
    }
    .day-date-display { flex: 1; }
    .day-date-main {
      font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: #ddd;
    }
    .day-date-sub {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: rgba(212,175,55,0.5); margin-top: 2px;
    }

    /* Work & Vacation cards */
    .work-card {
      background: rgba(120,144,156,0.07); border: 1px solid rgba(120,144,156,0.25);
      border-radius: 16px; padding: 16px 18px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 14px;
      animation: fadeUp 0.4s ease both;
    }
    .work-card-icon { font-size: 22px; flex-shrink: 0; }
    .work-card-body { flex: 1; min-width: 0; }
    .work-card-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: #bbb; margin-bottom: 3px; }
    .work-card-meta  { font-size: 10px; color: #666; letter-spacing: 0.5px; }
    .work-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .work-card-edit-btn {
      padding: 6px 12px; border-radius: 8px;
      background: rgba(120,144,156,0.1); border: 1px solid rgba(120,144,156,0.2);
      color: #78909C; font-family: 'Montserrat', sans-serif;
      font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
    }
    .work-card-del-btn {
      padding: 6px 10px; border-radius: 8px;
      background: rgba(244,67,54,0.06); border: 1px solid rgba(244,67,54,0.15);
      color: #F44336; font-size: 12px; cursor: pointer;
    }

    .vacation-card {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, rgba(38,198,218,0.07), rgba(38,198,218,0.03));
      border: 1px solid rgba(38,198,218,0.3); border-radius: 16px;
      padding: 18px 20px; margin-bottom: 14px;
      animation: fadeUp 0.4s ease both;
    }
    .vacation-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #26C6DA, #80DEEA); border-radius: 16px 16px 0 0;
    }
    .vacation-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .vacation-card-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: #26C6DA; }
    .vacation-badge {
      font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      padding: 3px 9px; border-radius: 20px;
      background: rgba(38,198,218,0.1); color: #26C6DA; border: 1px solid rgba(38,198,218,0.2);
    }
    .vacation-card-desc { font-size: 12px; color: #888; line-height: 1.6; margin-bottom: 10px; }
    .vacation-card-actions { display: flex; gap: 6px; }
    .vacation-edit-btn {
      padding: 7px 14px; border-radius: 8px;
      background: rgba(38,198,218,0.08); border: 1px solid rgba(38,198,218,0.2);
      color: #26C6DA; font-family: 'Montserrat', sans-serif;
      font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
    }
    .vacation-del-btn {
      padding: 7px 10px; border-radius: 8px;
      background: rgba(244,67,54,0.06); border: 1px solid rgba(244,67,54,0.15);
      color: #F44336; font-size: 12px; cursor: pointer;
    }

    /* Scene card — surprise */
    .scene-card-surprise {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, rgba(212,175,55,0.08), rgba(212,175,55,0.03));
      border: 1px solid rgba(212,175,55,0.35); border-radius: 20px;
      padding: 28px 24px; text-align: center; margin-bottom: 18px;
      box-shadow: 0 8px 28px rgba(212,175,55,0.12), inset 0 1px 0 rgba(212,175,55,0.2);
      animation: fadeUp 0.4s ease both;
    }
    .scene-card-surprise::before {
      content: ''; position: absolute; inset: 0; border-radius: 20px;
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(212,175,55,0.015) 10px, rgba(212,175,55,0.015) 11px);
    }
    .surprise-ornament { font-size: 28px; margin-bottom: 10px; opacity: 0.6; display: block; }
    .surprise-script {
      font-family: 'Great Vibes', cursive; font-size: 32px;
      background: var(--luxury-gradient); -webkit-background-clip: text;
      background-clip: text; -webkit-text-fill-color: transparent;
      display: block; margin-bottom: 6px; line-height: 1.2;
    }
    .surprise-tagline {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 11px; color: rgba(212,175,55,0.5); letter-spacing: 2px;
      text-transform: uppercase; display: block; margin-bottom: 14px;
    }
    .surprise-prep {
      font-size: 11px; color: #888; background: rgba(0,0,0,0.2);
      border-radius: 10px; padding: 10px 16px; display: inline-block;
    }

    /* Scene card — full (Dom view or unlocked) */
    .scene-card-full {
      position: relative; overflow: hidden;
      background: rgba(212,175,55,0.06); border: 1px solid rgba(212,175,55,0.3);
      border-radius: 20px; padding: 20px; margin-bottom: 18px;
      animation: fadeUp 0.4s ease both;
    }
    .scene-card-full::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--luxury-gradient); border-radius: 20px 20px 0 0;
    }
    .scene-card-header {
      display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px;
    }
    .scene-card-title {
      font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--gold);
    }
    .scene-badge {
      font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      padding: 4px 10px; border-radius: 20px;
      background: rgba(212,175,55,0.12); color: var(--gold); border: 1px solid rgba(212,175,55,0.2);
      white-space: nowrap;
    }
    .scene-detail-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .scene-detail-chip {
      font-size: 9px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #aaa;
    }
    .scene-desc { font-size: 12px; font-weight: 300; color: #999; line-height: 1.7; }
    .scene-dom-actions { display: flex; gap: 8px; margin-top: 14px; }
    .scene-edit-btn {
      flex: 1; padding: 10px; border-radius: 10px;
      background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.2);
      color: var(--gold); font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
    }
    .scene-unlock-btn {
      flex: 1; padding: 10px; border-radius: 10px;
      background: var(--luxury-gradient); color: var(--midnight);
      border: none; font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
    }
    .scene-delete-btn {
      padding: 10px 14px; border-radius: 10px;
      background: rgba(244,67,54,0.07); border: 1px solid rgba(244,67,54,0.2);
      color: #F44336; font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }

    /* ── Task sections ── */
    .task-section { margin-bottom: 20px; animation: fadeUp 0.4s ease 0.1s both; }
    .task-section-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    }
    .task-section-icon { font-size: 14px; }
    .task-section-title {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2.5px; color: #555; flex: 1;
    }
    .task-section-line { flex: 1; height: 1px; background: rgba(255,255,255,0.05); }
    .task-count-badge {
      font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      background: rgba(255,255,255,0.05); color: #555;
    }

    .task-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px; margin-bottom: 6px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px; transition: all 0.2s;
    }
    .task-item:hover { border-color: rgba(255,255,255,0.08); }
    .task-check {
      width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
      border: 1.5px solid rgba(212,175,55,0.25); background: rgba(255,255,255,0.02);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; margin-top: 1px; transition: all .25s ease;
      font-size: 12px; color: transparent;
    }
    .task-check.checked { background: var(--gold); border-color: var(--gold); color: var(--midnight); font-size: 13px; }
    .task-info { flex: 1; min-width: 0; }
    .task-name { font-size: 13px; font-weight: 500; color: #ddd; margin-bottom: 2px; }
    .task-name.done { text-decoration: line-through; opacity: 0.4; }
    .task-meta { font-size: 10px; color: #666; display: flex; align-items: center; gap: 6px; }
    .task-owner-badge { font-size: 9px; }
    .task-cat-chip {
      font-size: 7px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
      padding: 2px 7px; border-radius: 10px; color: var(--midnight);
    }

    /* ── Reflection prompt ── */
    .reflection-prompt {
      background: rgba(186,104,200,0.06); border: 1px solid rgba(186,104,200,0.2);
      border-radius: 18px; padding: 20px; text-align: center; margin-top: 8px;
      animation: fadeUp 0.4s ease 0.2s both;
    }
    .reflection-title {
      font-family: 'Playfair Display', serif; font-size: 15px; font-style: italic;
      color: #BA68C8; margin-bottom: 6px;
    }
    .reflection-sub { font-size: 11px; color: #888; margin-bottom: 14px; }
    .reflection-moods { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
    .mood-btn {
      padding: 7px 14px; border-radius: 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: #888; font-size: 11px; cursor: pointer; transition: all 0.2s;
    }
    .mood-btn.selected { background: rgba(186,104,200,0.15); border-color: rgba(186,104,200,0.4); color: #BA68C8; }
    .reflection-textarea {
      width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 12px; color: #ddd;
      font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 300;
      outline: none; resize: none; min-height: 80px; margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .reflection-textarea:focus { border-color: rgba(186,104,200,0.3); }
    .reflection-save-btn {
      width: 100%; padding: 12px; border-radius: 12px;
      background: rgba(186,104,200,0.15); border: 1px solid rgba(186,104,200,0.3);
      color: #BA68C8; font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
      cursor: pointer; transition: all 0.2s;
    }
    .reflection-saved {
      font-size: 11px; color: #4CAF50; margin-top: 8px; text-align: center;
      font-family: 'Playfair Display', serif; font-style: italic;
    }

    /* ── No events placeholder ── */
    .day-empty {
      text-align: center; padding: 40px 20px;
      background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px; margin-bottom: 14px;
    }
    .day-empty-icon { font-size: 28px; opacity: 0.25; margin-bottom: 10px; }
    .day-empty-text { font-size: 12px; color: #555; font-family: 'Playfair Display', serif; font-style: italic; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: calc(24px + var(--safe-b)); right: 22px;
      width: 58px; height: 58px; border-radius: 50%;
      background: var(--luxury-gradient); color: var(--midnight);
      border: none; font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 90;
      box-shadow: 0 8px 24px rgba(212,175,55,0.45); transition: all 0.2s;
    }
    .fab:hover { transform: scale(1.06); }
    .fab:active { transform: scale(0.94); }

  <script type="module">
import { auth, db } from './firebase-config.js';
import { requireAuth, getMyProfile, getRelationship, dataRef } from './auth.js';
import { doc, setDoc, getDoc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  /* ══════════════════════════════════════════════════════
     DATA & STORAGE
  ══════════════════════════════════════════════════════ */
  let events       = [];
  let recurTasks   = [];
  let reflections  = [];
  let myUid = null;
  let myRole = 'dom';
  let relId = null;
  let myName = 'User';
  let partnerName = 'Partner';

  async function persist() {
    if (!relId || !myUid) return;
    
    // Shared data (Events, Tasks, Profiles)
    const relCalRef = doc(db, 'relationships', relId, 'calendar', 'data');
    await setDoc(relCalRef, { events, recurTasks }, { merge: true });

    // Private data (Reflections)
    const userCalRef = dataRef('calendar');
    await setDoc(userCalRef, { reflections }, { merge: true });
  }

  function seedDemoData() {
    const today = dateStr(new Date());
    const d = new Date(); d.setDate(d.getDate()+5);
    const future = dateStr(d);
    const d2 = new Date(); d2.setDate(d2.getDate()+12);
    const future2 = dateStr(d2);

    events = [
      { id: uid(), date: today, type:'scene', title:'Evening Protocol', desc:'Rope work and sensory exploration. Full aftercare planned.', createdBy:'dom', visibility:'both', unlocked:true, completed:false },
      { id: uid(), date: future, type:'scene', title: 'Private Evening', desc:'Extended scene with restraint and edge play.', createdBy:'dom', visibility:'surprise', unlocked:false, completed:false },
      { id: uid(), date: future2, type:'scene', title:'Weekend Retreat', desc:'Full day dynamic immersion.', createdBy:'dom', visibility:'both', unlocked:true, completed:false },
    ];

    recurTasks = [
      { id:uid(), title:'Morning check-in message', category:'ritual',   frequency:'daily',  daysOfWeek:[0,1,2,3,4,5,6], owner:'dom', startDate: today },
      { id:uid(), title:'Kegel training — 3 sets',  category:'training', frequency:'daily',  daysOfWeek:[0,1,2,3,4,5,6], owner:'dom', startDate: today },
      { id:uid(), title:'Evening gratitude journal', category:'personal', frequency:'daily',  daysOfWeek:[0,1,2,3,4,5,6], owner:'sub', startDate: today },
      { id:uid(), title:'Position practice — 15 min', category:'training', frequency:'weekly', daysOfWeek:[1,3,5], owner:'dom', startDate: today },
      { id:uid(), title:'Weekly reflection note',   category:'protocol', frequency:'weekly', daysOfWeek:[0], owner:'sub', startDate: today },
    ];
    persist();
  }

  /* ══════════════════════════════════════════════════════
     UTILITIES
  ══════════════════════════════════════════════════════ */
  function uid() { return Math.random().toString(36).slice(2,9) + Date.now().toString(36); }
  function dateStr(d) { return d.toISOString().split('T')[0]; }
  function todayStr() { return dateStr(new Date()); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function isDOM() { return myRole === 'dom'; }

  const CAT_COLORS = {
    training: { bg:'rgba(100,181,246,0.18)', color:'#64B5F6', dot:'dot-training' },
    ritual:   { bg:'rgba(186,104,200,0.18)', color:'#BA68C8', dot:'dot-ritual'   },
    protocol: { bg:'rgba(76,175,80,0.18)',   color:'#4CAF50', dot:'dot-protocol' },
    personal: { bg:'rgba(255,138,101,0.18)', color:'#FF8A65', dot:'dot-personal' },
  };

  function getTasksForDate(ds) {
    const d = new Date(ds + 'T12:00:00');
    const dow = d.getDay();
    return recurTasks.filter(t => {
      if (t.startDate && t.startDate > ds) return false;
      if (t.endDate   && t.endDate   < ds) return false;
      if (t.exceptions && t.exceptions.includes(ds)) return false;
      if (t.frequency === 'once')   return t.startDate === ds;
      if (t.frequency === 'daily')  return true;
      if (t.frequency === 'weekly' || t.frequency === 'custom') return (t.daysOfWeek || []).includes(dow);
      if (t.frequency === 'monthly') return d.getDate() === new Date(t.startDate + 'T12:00:00').getDate();
      return false;
    });
  }

  function getEventsForDate(ds) {
    return events.filter(e => {
      const check = new Date(ds + 'T12:00:00');
      const dow = check.getDay();

      // Work with specific days selected — treat as its own recurring rule
      if (e.type === 'work' && e.workDays && e.workDays.length > 0) {
        if (e.date > ds) return false;
        if (e.endDate && e.endDate < ds) return false;
        if (e.recurEnd && e.recurEnd < ds) return false;
        if (e.exceptions && e.exceptions.includes(ds)) return false;
        return e.workDays.includes(dow);
      }

      // Non-recurring: exact date match, or multi-day span
      if (!e.recurring) {
        if (e.date === ds) return true;
        if ((e.type === 'work' || e.type === 'vacation') && e.endDate && e.date <= ds && e.endDate >= ds) return true;
        return false;
      }

      // Recurring: must be on or after start date
      if (e.date > ds) return false;
      if (e.recurEnd && e.recurEnd < ds) return false;
      if (e.exceptions && e.exceptions.includes(ds)) return false;

      const start = new Date(e.date + 'T12:00:00');
      if (e.frequency === 'daily') return true;
      if (e.frequency === 'weekly' || e.frequency === 'custom') return (e.daysOfWeek || []).includes(dow);
      if (e.frequency === 'monthly') return check.getDate() === start.getDate();
      return false;
    });
  }

  function getCompletion(taskId, ds) {
    return reflections.find(r => r.taskId === taskId && r.date === ds);
  }

  /* ══════════════════════════════════════════════════════
     PROFILE & PIN
  ══════════════════════════════════════════════════════ */


  /* ══════════════════════════════════════════════════════
     VIEW MANAGEMENT
  ══════════════════════════════════════════════════════ */
  let currentView = 'month';
  let currentMonth = new Date().getMonth();
  let currentYear  = new Date().getFullYear();
  let currentWeekStart = getWeekStart(new Date());
  let currentDayStr = todayStr();

  function switchView(v) {
    currentView = v;
    ['month','week','day'].forEach(n => {
      document.getElementById('view-'+n).style.display = n === v ? 'block' : 'none';
      document.getElementById('vbtn-'+n).classList.toggle('active', n === v);
    });
    renderCurrentView();
  }

  function renderCurrentView() {
    if (currentView === 'month') renderMonth();
    if (currentView === 'week')  renderWeek();
    if (currentView === 'day')   renderDay();
  }

  /* ══════════════════════════════════════════════════════
     MONTH VIEW
  ══════════════════════════════════════════════════════ */
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
    renderMonth();
  }

  function renderMonth() {
    document.getElementById('month-label').textContent = MONTH_NAMES[currentMonth];
    document.getElementById('month-year').textContent  = currentYear;

    const grid = document.getElementById('cal-grid');
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
    const today = todayStr();
    let html = '';

    // Leading blanks
    for (let i=0; i<firstDay; i++) html += '<div class="cal-cell empty"></div>';

    for (let d=1; d<=daysInMonth; d++) {
      const ds = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEvents = getEventsForDate(ds);
      const dayTasks  = getTasksForDate(ds);
      const isToday   = ds === today;

      let dots = '';
      const hasScene   = dayEvents.some(e => e.type === 'scene');
      const hasUnavail = dayEvents.some(e => e.type === 'unavailable');
      const hasWork    = dayEvents.some(e => e.type === 'work');
      const hasVacation= dayEvents.some(e => e.type === 'vacation');
      if (hasScene)    dots += '<div class="cal-dot dot-scene"></div>';
      if (hasWork)     dots += '<div class="cal-dot dot-work"></div>';
      if (hasVacation) dots += '<div class="cal-dot dot-vacation"></div>';
      if (hasUnavail)  dots += '<div class="cal-dot dot-unavail"></div>';

      const catsSeen = new Set();
      dayTasks.forEach(t => {
        if (!catsSeen.has(t.category)) { catsSeen.add(t.category); dots += `<div class="cal-dot ${CAT_COLORS[t.category]?.dot||''}"></div>`; }
      });

      html += `<div class="cal-cell${isToday?' today':''}" onclick="openDay('${ds}')">
        <div class="cal-date">${d}</div>
        <div class="cal-dots">${dots}</div>
      </div>`;
    }

    grid.innerHTML = html;
  }

  function openDay(ds) {
    currentDayStr = ds;
    switchView('day');
  }

  /* ══════════════════════════════════════════════════════
     WEEK VIEW
  ══════════════════════════════════════════════════════ */
  function getWeekStart(d) {
    const s = new Date(d);
    s.setDate(s.getDate() - s.getDay());
    s.setHours(0,0,0,0);
    return s;
  }

  function changeWeek(dir) {
    currentWeekStart.setDate(currentWeekStart.getDate() + dir*7);
    renderWeek();
  }

  function renderWeek() {
    const DAY_INITIALS = ['S','M','T','W','T','F','S'];
    const end = new Date(currentWeekStart); end.setDate(end.getDate()+6);
    const fmt = d => d.toLocaleDateString('en-GB',{month:'short',day:'numeric'});
    document.getElementById('week-label').textContent = fmt(currentWeekStart) + ' – ' + fmt(end);

    const today = todayStr();
    let html = '';
    for (let i=0;i<7;i++) {
      const d = new Date(currentWeekStart); d.setDate(d.getDate()+i);
      const ds = dateStr(d);
      const isToday = ds === today;
      const dayEvents = getEventsForDate(ds);
      const dayTasks  = getTasksForDate(ds);
      const allItems  = [
        ...dayEvents.map(e => {
          if (e.type === 'scene')       return { color:'#D4AF37', bg:'rgba(212,175,55,0.75)',  title: e.title };
          if (e.type === 'work')        return { color:'#546E7A', bg:'rgba(120,144,156,0.65)', title: e.title };
          if (e.type === 'vacation')    return { color:'#006064', bg:'rgba(38,198,218,0.7)',   title: e.title };
          if (e.type === 'unavailable') return { color:'#888', bg:'rgba(150,150,150,0.35)', title: e.title };
          return { color:'#aaa', bg:'rgba(200,200,200,0.2)', title: e.title };
        }),
        ...dayTasks.slice(0,3).map(t => ({ color: CAT_COLORS[t.category]?.color||'#aaa', bg: CAT_COLORS[t.category]?.bg||'rgba(200,200,200,0.2)', title: t.title }))
      ];

      const pills = allItems.slice(0,3).map(item =>
        `<div class="week-pill" style="background:${item.bg};color:${item.color};" title="${item.title}">${item.label} ${item.title}</div>`
      ).join('');
      const more = allItems.length > 3 ? `<div class="week-more">+${allItems.length-3} more</div>` : '';

      html += `<div class="week-col${isToday?' today-col':''}" onclick="openDay('${ds}')">
        <div class="week-col-day">${DAY_INITIALS[i]}</div>
        <div class="week-col-num">${d.getDate()}</div>
        <div class="week-pills">${pills}${more}</div>
      </div>`;
    }
    document.getElementById('week-grid').innerHTML = html;

    // Auto-scroll so today's column is visible
    const todayCol = document.querySelector('.week-col.today-col');
    if (todayCol) {
      const wrap = document.querySelector('.week-scroll-wrap');
      const offset = todayCol.offsetLeft - wrap.offsetWidth / 2 + todayCol.offsetWidth / 2;
      wrap.scrollTo({ left: offset, behavior: 'smooth' });
    }
  }

  /* ══════════════════════════════════════════════════════
     DAY VIEW
  ══════════════════════════════════════════════════════ */
  function changeDayView(dir) {
    const d = new Date(currentDayStr + 'T12:00:00');
    d.setDate(d.getDate() + dir);
    currentDayStr = dateStr(d);
    renderDay();
  }

  function renderDay() {
    const d    = new Date(currentDayStr + 'T12:00:00');
    const today = todayStr();
    const isPast   = currentDayStr < today;
    const isFuture = currentDayStr > today;

    document.getElementById('day-date-main').textContent = d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
    document.getElementById('day-date-sub').textContent  = currentDayStr === today ? 'Today' : isPast ? 'Past' : 'Upcoming';

    const dayEvents = getEventsForDate(currentDayStr);
    const dayTasks  = getTasksForDate(currentDayStr);
    let html = '';

    /* ── Work cards ── */
    const workEvents = dayEvents.filter(e => e.type === 'work');
    workEvents.forEach(ev => {
      const spanLabel = ev.endDate && ev.endDate !== ev.date ? ` — ${ev.endDate}` : '';
      const actions = `<div class="work-card-actions">
        <button class="work-card-edit-btn" onclick="editEvent('${ev.id}')">Edit</button>
        <button class="work-card-del-btn"  onclick="confirmDelete('${ev.id}','event')">🗑</button>
      </div>`;
      html += `<div class="work-card">
        <div class="work-card-icon">💼</div>
        <div class="work-card-body">
          <div class="work-card-title">${escHtml(ev.title)}${(ev.workDays&&ev.workDays.length)||ev.recurring ? ' <span style="font-size:9px;color:#78909C;font-family:\'Montserrat\',sans-serif;font-weight:700;letter-spacing:1px;">↻</span>' : ''}</div>
          <div class="work-card-meta">${ev.shift ? escHtml(ev.shift) : ''}${ev.workDays&&ev.workDays.length ? ' · ' + ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].filter((_,i)=>ev.workDays.includes(i)).join(', ') : spanLabel ? ' · '+spanLabel : ''}</div>
        </div>
        ${actions}
      </div>`;
    });

    /* ── Vacation cards ── */
    const vacEvents = dayEvents.filter(e => e.type === 'vacation');
    vacEvents.forEach(ev => {
      const spanLabel = ev.endDate && ev.endDate !== ev.date ? `${ev.date} → ${ev.endDate}` : ev.date;
      const actions = `<div class="vacation-card-actions">
        <button class="vacation-edit-btn" onclick="editEvent('${ev.id}')">Edit</button>
        <button class="vacation-del-btn"  onclick="confirmDelete('${ev.id}','event')">🗑</button>
      </div>`;
      html += `<div class="vacation-card">
        <div class="vacation-card-header">
          <div class="vacation-card-title">✈️ ${escHtml(ev.title)}</div>
          <div class="vacation-badge">Away</div>
        </div>
        ${ev.vacDesc ? `<div class="vacation-card-desc">${escHtml(ev.vacDesc)}</div>` : ''}
        <div class="vacation-card-desc" style="font-size:10px;color:#26C6DA;opacity:0.7;">📅 ${spanLabel}</div>
        ${actions}
      </div>`;
    });

    /* ── Scene cards ── */
    const scenes = dayEvents.filter(e => e.type === 'scene');
    scenes.forEach(scene => {
      const isSurprise = scene.visibility === 'surprise' && !scene.unlocked && !isDOM();
      if (isSurprise) {
        html += `<div class="scene-card-surprise">
          <span class="surprise-ornament">✦</span>
          <span class="surprise-tagline">Be ready</span>
        </div>`;
      } else {
        const domActions = isDOM() ? `
          <div class="scene-dom-actions">
            <button class="scene-edit-btn" onclick="editEvent('${scene.id}')">Edit</button>
            ${scene.visibility==='surprise'&&!scene.unlocked ? `<button class="scene-unlock-btn" onclick="unlockScene('${scene.id}')">✦ Reveal to Sub</button>` : ''}
            <button class="scene-delete-btn" onclick="confirmDelete('${scene.id}','event')">🗑</button>
          </div>` : '';

        html += `<div class="scene-card-full">
          <div class="scene-card-header">
            <div class="scene-card-title">${escHtml(scene.title)}</div>
            <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
              ${scene.recurring ? '<span style="font-size:8px;color:rgba(212,175,55,0.6);font-family:\'Montserrat\',sans-serif;font-weight:700;letter-spacing:1px;">↻</span>' : ''}
              <div class="scene-badge">${scene.visibility==='surprise'?'✦ Surprise':'🎭 Scene'}</div>
            </div>
          </div>
          ${scene.desc ? `<div class="scene-desc">${escHtml(scene.desc)}</div>` : ''}
          ${domActions}
        </div>`;
      }
    });

    /* ── Other event cards ── */
    const otherEvents = dayEvents.filter(e => e.type === 'unavailable');
    otherEvents.forEach(ev => {
      const actions = `<div class="work-card-actions">
        <button class="work-card-edit-btn" onclick="editEvent('${ev.id}')">Edit</button>
        <button class="work-card-del-btn"  onclick="confirmDelete('${ev.id}','event')">🗑</button>
      </div>`;
      html += `<div class="work-card" style="border-color:rgba(255,255,255,0.12);background:rgba(255,255,255,0.03);">
        <div class="work-card-icon">📌</div>
        <div class="work-card-body">
          <div class="work-card-title" style="color:#ccc;">${escHtml(ev.title)}${ev.recurring?' <span style="font-size:9px;color:#666;font-family:\'Montserrat\',sans-serif;font-weight:700;letter-spacing:1px;">↻</span>':''}</div>
          ${ev.otherDesc ? `<div class="work-card-meta">${escHtml(ev.otherDesc)}</div>` : ''}
        </div>
        ${actions}
      </div>`;
    });

    /* ── Tasks ── */
    const domTasks = dayTasks.filter(t => t.owner === 'dom');
    const subTasks = dayTasks.filter(t => t.owner === 'sub');

    if (domTasks.length) {
      html += `<div class="task-section">
        <div class="task-section-header">
          <span class="task-section-icon">♛</span>
          <span class="task-section-title">${myName}'s Tasks</span>
          <span class="task-count-badge">${domTasks.length}</span>
        </div>`;
      domTasks.forEach(t => { html += taskItemHTML(t, currentDayStr); });
      html += '</div>';
    }

    if (subTasks.length) {
      html += `<div class="task-section">
        <div class="task-section-header">
          <span class="task-section-icon">✦</span>
          <span class="task-section-title">${partnerName}'s Tasks</span>
          <span class="task-count-badge">${subTasks.length}</span>
        </div>`;
      subTasks.forEach(t => { html += taskItemHTML(t, currentDayStr); });
      html += '</div>';
    }

    if (!scenes.length && !dayTasks.length && !workEvents.length && !vacEvents.length && !otherEvents.length) {
      html += `<div class="day-empty">
        <div class="day-empty-icon">✦</div>
        <div class="day-empty-text">${isFuture ? 'Nothing scheduled yet' : 'No entries for this day'}</div>
      </div>`;
    }

    /* ── Reflection prompt (past days) ── */
    if (isPast) {
      const existingReflect = reflections.find(r => r.date === currentDayStr && !r.taskId);
      if (!existingReflect) {
        html += reflectionPromptHTML(currentDayStr);
      } else {
        html += `<div class="reflection-prompt">
          <div class="reflection-title">Reflection saved ✦</div>
          <div style="font-size:12px;color:#888;font-family:'Playfair Display',serif;font-style:italic;line-height:1.6;">${escHtml(existingReflect.body)}</div>
        </div>`;
      }
    }

    document.getElementById('day-content').innerHTML = html;
  }

  function taskItemHTML(t, ds) {
    const comp = getCompletion(t.id, ds);
    const cat  = CAT_COLORS[t.category] || { bg:'rgba(200,200,200,0.1)', color:'#aaa' };
    const ownerBadge = t.owner === 'dom' ? '♛' : '✦';
    const canEdit = isDOM() || t.owner === myRole;
    const taskActions = canEdit ? `
      <div style="display:flex;gap:6px;flex-shrink:0;margin-left:6px;">
        <button onclick="editTask('${t.id}')" style="
          width:28px;height:28px;border-radius:8px;border:1px solid rgba(255,255,255,0.07);
          background:rgba(255,255,255,0.03);color:#666;font-size:13px;cursor:pointer;
          display:flex;align-items:center;justify-content:center;transition:all 0.2s;"
          title="Edit task">✎</button>
        <button onclick="confirmDelete('${t.id}','task')" style="
          width:28px;height:28px;border-radius:8px;border:1px solid rgba(244,67,54,0.15);
          background:rgba(244,67,54,0.04);color:rgba(244,67,54,0.5);font-size:13px;cursor:pointer;
          display:flex;align-items:center;justify-content:center;transition:all 0.2s;"
          title="Delete task">🗑</button>
      </div>` : '';
    return `<div class="task-item" id="ti-${t.id}">
      <div class="task-check${comp?' checked':''}" onclick="toggleTask('${t.id}','${ds}')">${comp?'✓':''}</div>
      <div class="task-info">
        <div class="task-name${comp?' done':''}">${escHtml(t.title)}</div>
        <div class="task-meta">
          <span class="task-owner-badge">${ownerBadge}</span>
          <span class="task-cat-chip" style="background:${cat.bg};color:${cat.color};">${t.category}</span>
          ${t.frequency && t.frequency !== 'once' ? `<span style="font-size:8px;color:#444;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">↻ ${t.frequency}</span>` : ''}
        </div>
      </div>
      ${taskActions}
    </div>`;
  }

  function reflectionPromptHTML(ds) {
    return `<div class="reflection-prompt" id="reflect-${ds}">
      <div class="reflection-title">How was this day?</div>
      <div class="reflection-sub">Add a reflection to your protocol record</div>
      <div class="reflection-moods" id="mood-btns-${ds}">
        <button class="mood-btn" onclick="selectMood('${ds}','fulfilled')">🌟 Fulfilled</button>
        <button class="mood-btn" onclick="selectMood('${ds}','difficult')">🌧 Difficult</button>
        <button class="mood-btn" onclick="selectMood('${ds}','joyful')">✨ Joyful</button>
        <button class="mood-btn" onclick="selectMood('${ds}','processing')">🌊 Processing</button>
      </div>
      <textarea class="reflection-textarea" id="reflect-body-${ds}" placeholder="Write freely…"></textarea>
      <button class="reflection-save-btn" onclick="saveReflection('${ds}')">Save Reflection</button>
    </div>`;
  }

  function selectMood(ds, mood) {
    document.querySelectorAll(`#mood-btns-${ds} .mood-btn`).forEach(b => b.classList.remove('selected'));
    event.target.classList.add('selected');
    event.target.dataset.mood = mood;
  }

  function saveReflection(ds) {
    const body = document.getElementById(`reflect-body-${ds}`).value.trim();
    const selected = document.querySelector(`#mood-btns-${ds} .mood-btn.selected`);
    const mood = selected ? selected.dataset.mood : 'fulfilled';
    if (!body) { showToast('Write something first'); return; }
    reflections.push({ id: uid(), date: ds, mood, body, taskId: null });
    persist(); showToast('Reflection saved ✦'); renderDay();
  }

  function toggleTask(taskId, ds) {
    const existing = reflections.findIndex(r => r.taskId === taskId && r.date === ds);
    if (existing > -1) {
      reflections.splice(existing, 1);
    } else {
      reflections.push({ id: uid(), date: ds, taskId, completed: true });
    }
    persist(); renderDay();
  }

  function unlockScene(id) {
    const ev = events.find(e => e.id === id);
    if (ev) { ev.unlocked = true; persist(); renderDay(); showToast('Scene revealed to Sub ✦'); }
  }

  /* ── Delete logic ── */
  let _deleteTarget = null; // { id, store } store = 'event' | 'task'

  function confirmDelete(id, store) {
    const ev = store === 'task'
      ? recurTasks.find(t => t.id === id)
      : events.find(e => e.id === id);

    if (!ev) return;

    // Non-recurring: delete immediately, no modal needed
    const isRecurring = store === 'task' || ev.recurring || (ev.workDays && ev.workDays.length > 0);
    if (!isRecurring) {
      events = events.filter(e => e.id !== id);
      persist(); renderDay(); showToast('Event deleted'); return;
    }

    // Recurring: show scope picker
    _deleteTarget = { id, store };
    document.getElementById('delete-modal').classList.add('open');
  }

  function deleteScope(scope) {
    closeModal('delete-modal');
    if (!_deleteTarget) return;
    const { id, store } = _deleteTarget;
    _deleteTarget = null;

    if (scope === 'all') {
      // Remove entirely from whichever store
      if (store === 'task') {
        recurTasks = recurTasks.filter(t => t.id !== id);
      } else {
        events = events.filter(e => e.id !== id);
      }
      persist(); renderCurrentView(); showToast('Recurring event removed');

    } else {
      // Skip just this date — add to an exceptions list on the event
      const ev = events.find(e => e.id === id);
      if (ev) {
        if (!ev.exceptions) ev.exceptions = [];
        ev.exceptions.push(currentDayStr);
        persist(); renderDay(); showToast('Removed from this date');
      } else {
        // For recurring tasks, add date exception directly on the task object
        const task = recurTasks.find(t => t.id === id);
        if (task) {
          if (!task.exceptions) task.exceptions = [];
          task.exceptions.push(currentDayStr);
          persist(); renderDay(); showToast('Removed from this date');
        }
      }
    }
  }

  function deleteEvent(id) {
    events = events.filter(e => e.id !== id);
    persist(); renderDay(); showToast('Event deleted');
  }

  /* ══════════════════════════════════════════════════════
     ADD / EDIT MODAL
  ══════════════════════════════════════════════════════ */
  let editingEventId = null;
  let formState = {
    type: 'scene', isSurprise: false, isRecurring: false,
    freq: 'daily', cat: 'training', daysOfWeek: []
  };

  function openAddModal(evId) {
    editingEventId = evId || null;
    formState = { type:'scene', isSurprise:false, isRecurring:false, freq:'daily', cat:'training', daysOfWeek:[], workDays:[] };

    if (evId) {
      const ev = events.find(e => e.id === evId);
      document.getElementById('add-modal-heading').textContent = 'Edit Entry';
      document.getElementById('add-modal-sub').textContent = 'Update your record';
      document.getElementById('ev-title').value   = ev.title || '';
      document.getElementById('ev-date').value    = ev.date  || '';
      document.getElementById('ev-desc').value    = ev.desc  || '';
      document.getElementById('ev-shift').value   = ev.shift || '';
      document.getElementById('ev-vac-desc').value   = ev.vacDesc   || '';
      document.getElementById('ev-other-desc').value = ev.otherDesc || '';
      document.getElementById('ev-enddate').value = ev.endDate || '';
      formState.type = ['scene','task','work','vacation','unavailable'].includes(ev.type)
        ? (ev.type === 'unavailable' ? 'unavail' : ev.type) : 'scene';
      formState.isSurprise  = ev.visibility === 'surprise';
      formState.isRecurring = ev.recurring || false;
      formState.freq        = ev.frequency || 'daily';
      formState.daysOfWeek  = ev.daysOfWeek || [];
      formState.workDays    = ev.workDays || [];
      document.getElementById('ev-recur-end').value = ev.recurEnd || '';
      // Restore work DOW picker
      document.querySelectorAll('#work-dow-picker .dow-btn').forEach(b => {
        b.classList.toggle('active', formState.workDays.includes(+b.dataset.wdow));
      });
    } else {
      document.getElementById('add-modal-heading').textContent = 'New Entry';
      document.getElementById('add-modal-sub').textContent     = 'Schedule your protocol';
      document.getElementById('ev-title').value    = '';
      document.getElementById('ev-date').value     = currentDayStr || todayStr();
      document.getElementById('ev-desc').value     = '';
      document.getElementById('ev-shift').value    = '';
      document.getElementById('ev-vac-desc').value   = '';
      document.getElementById('ev-other-desc').value = '';
      document.getElementById('ev-enddate').value  = '';
      document.getElementById('ev-recur-end').value= '';
      formState.isRecurring = false;
      formState.freq        = 'daily';
      formState.daysOfWeek  = [];
      formState.workDays    = [];
      document.querySelectorAll('#work-dow-picker .dow-btn').forEach(b => b.classList.remove('active'));
    }

    setType(formState.type);
    updateToggleUI('surprise-toggle', formState.isSurprise);
    updateToggleUI('recur-toggle', formState.isRecurring);
    document.getElementById('recur-fields').style.display = formState.isRecurring ? 'block' : 'none';
    setFreq(formState.freq);
    document.querySelectorAll('.dow-btn').forEach(b => {
      b.classList.toggle('active', formState.daysOfWeek.includes(+b.dataset.dow));
    });
    document.getElementById('add-modal').classList.add('open');
  }

  function editTask(taskId) {
    const t = recurTasks.find(t => t.id === taskId);
    if (!t) return;

    editingEventId = taskId;
    const isRecurring = t.frequency && t.frequency !== 'once';
    formState = {
      type: 'task', isSurprise: false,
      isRecurring,
      freq: isRecurring ? (t.frequency || 'daily') : 'daily',
      cat: t.category || 'ritual',
      daysOfWeek: t.daysOfWeek || [],
      workDays: []
    };

    document.getElementById('add-modal-heading').textContent = 'Edit Task';
    document.getElementById('add-modal-sub').textContent     = 'Update this task';
    document.getElementById('ev-title').value    = t.title || '';
    document.getElementById('ev-date').value     = t.startDate || todayStr();
    document.getElementById('ev-desc').value     = '';
    document.getElementById('ev-shift').value    = '';
    document.getElementById('ev-vac-desc').value   = '';
    document.getElementById('ev-other-desc').value = '';
    document.getElementById('ev-enddate').value  = '';
    document.getElementById('ev-recur-end').value= t.endDate || '';

    setType('task');
    setCat(t.category || 'ritual');
    updateToggleUI('surprise-toggle', false);
    updateToggleUI('recur-toggle', isRecurring);
    document.getElementById('recur-fields').style.display = isRecurring ? 'block' : 'none';
    setFreq(isRecurring ? (t.frequency || 'daily') : 'daily');
    document.querySelectorAll('.dow-btn').forEach(b => {
      b.classList.toggle('active', formState.daysOfWeek.includes(+b.dataset.dow));
    });
    document.querySelectorAll('#work-dow-picker .dow-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('add-modal').classList.add('open');
  }

  function editEvent(id) { openAddModal(id); }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function handleModalClick(e, id) { if (e.target.id === id) closeModal(id); }

  function setType(t) {
    formState.type = t;
    const activeClasses = { scene:'active-scene', task:'active-task', work:'active-work', vacation:'active-vacation', unavail:'active-unavail' };
    ['scene','task','unavail','work','vacation'].forEach(k => {
      const btn = document.getElementById('type-'+k);
      if (!btn) return;
      btn.className = 'type-btn' + (k===t ? ` ${activeClasses[k]||'active-unavail'}` : '');
    });
    document.getElementById('scene-fields').style.display    = t==='scene'    ? 'block' : 'none';
    document.getElementById('task-fields').style.display     = t==='task'     ? 'block' : 'none';
    document.getElementById('work-fields').style.display     = t==='work'     ? 'block' : 'none';
    document.getElementById('vacation-fields').style.display = t==='vacation' ? 'block' : 'none';
    document.getElementById('other-fields').style.display    = t==='unavail'  ? 'block' : 'none';
    document.getElementById('enddate-field').style.display   = (t==='work'||t==='vacation') ? 'block' : 'none';
  }

  function setCat(c) {
    formState.cat = c;
    ['training','ritual','protocol','personal'].forEach(k => {
      const btn = document.getElementById('cat-'+k);
      const cc = CAT_COLORS[k];
      if (k===c) btn.style.cssText = `background:${cc.bg};border-color:${cc.color}44;color:${cc.color};`;
      else       btn.style.cssText = '';
    });
  }

  function setFreq(f) {
    formState.freq = f;
    ['daily','weekly','monthly','custom'].forEach(k => {
      const btn = document.getElementById('freq-'+k);
      if (btn) btn.classList.toggle('active', k===f);
    });
    document.getElementById('dow-row').style.display = (f==='weekly'||f==='custom') ? 'block' : 'none';
  }

  function toggleWorkDow(d) {
    const idx = formState.workDays.indexOf(d);
    if (idx > -1) formState.workDays.splice(idx,1); else formState.workDays.push(d);
    document.querySelectorAll('#work-dow-picker .dow-btn').forEach(b => {
      b.classList.toggle('active', formState.workDays.includes(+b.dataset.wdow));
    });
  }

  function toggleDow(d) {
    const idx = formState.daysOfWeek.indexOf(d);
    if (idx > -1) formState.daysOfWeek.splice(idx,1); else formState.daysOfWeek.push(d);
    document.querySelectorAll('.dow-btn').forEach(b => {
      b.classList.toggle('active', formState.daysOfWeek.includes(+b.dataset.dow));
    });
  }

  function toggleSwitch(elId, key) {
    formState[key] = !formState[key];
    updateToggleUI(elId, formState[key]);
    if (key === 'isRecurring') {
      document.getElementById('recur-fields').style.display = formState.isRecurring ? 'block' : 'none';
    }
  }

  function updateToggleUI(elId, val) {
    document.getElementById(elId).classList.toggle('on', val);
  }

  function saveEvent() {
    const title   = document.getElementById('ev-title').value.trim();
    const date    = document.getElementById('ev-date').value;
    const recurEnd = document.getElementById('ev-recur-end').value || null;
    if (!title) { showToast('Please add a title'); return; }
    if (!date)  { showToast('Please pick a date');  return; }

    const type = formState.type === 'unavail' ? 'unavailable' : formState.type;

    // Build shared recurring metadata
    const recurMeta = formState.isRecurring ? {
      recurring:   true,
      frequency:   formState.freq,
      daysOfWeek:  formState.daysOfWeek,
      recurEnd:    recurEnd,
    } : { recurring: false };

    // ALL tasks go into recurTasks store — recurring or single-date
    if (type === 'task') {
      const task = {
        id: editingEventId || uid(),
        title, category: formState.cat,
        frequency: formState.isRecurring ? formState.freq : 'once',
        daysOfWeek: formState.isRecurring ? formState.daysOfWeek : [],
        owner: myRole,
        startDate: date,
        endDate: formState.isRecurring ? recurEnd : date,
      };
      if (editingEventId) {
        const idx = recurTasks.findIndex(t => t.id === editingEventId);
        if (idx > -1) recurTasks[idx] = task; else recurTasks.push(task);
        showToast('Task updated');
      } else {
        recurTasks.push(task);
        showToast(formState.isRecurring ? 'Recurring task added ✦' : 'Task added ✦');
      }
      persist(); closeModal('add-modal'); renderCurrentView(); return;
    }

    // All other types (including non-recurring tasks) go into events store
    const payload = {
      id: editingEventId || uid(),
      date, type, title,
      desc:      document.getElementById('ev-desc').value.trim(),
      shift:     document.getElementById('ev-shift').value.trim(),
      workDays:  formState.workDays,
      vacDesc:   document.getElementById('ev-vac-desc').value.trim(),
      otherDesc: document.getElementById('ev-other-desc').value.trim(),
      endDate:   document.getElementById('ev-enddate').value || null,
      createdBy: myRole,
      visibility: formState.isSurprise ? 'surprise' : 'both',
      unlocked:   !formState.isSurprise,
      completed:  false,
      ...recurMeta,
    };

    if (editingEventId) {
      const idx = events.findIndex(e => e.id === editingEventId);
      if (idx > -1) events[idx] = payload;
      showToast('Event updated');
    } else {
      events.push(payload);
      const toasts = { scene:'Scene scheduled ✦', work:'Work schedule saved', vacation:'Vacation added ✈️', unavailable:'Other event saved' };
      showToast(toasts[type] || 'Entry saved');
    }

    persist(); closeModal('add-modal'); renderCurrentView();
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ══════════════════════════════════════════════════════
     INIT
  ══════════════════════════════════════════════════════ */
  async function init() {
    const user = await requireAuth();
    myUid = user.uid;
    
    const profile = await getMyProfile();
    myRole = profile?.role || 'dom';
    myName = profile?.displayName || (myRole === 'dom' ? 'Dom' : 'Sub');

    const rel = await getRelationship();
    if (rel) {
      relId = rel.id;
      // Get partner name
      const partnerUid = rel.domId === myUid ? rel.subId : rel.domId;
      const pSnap = await getDoc(doc(db, 'users', partnerUid));
      if (pSnap.exists()) {
        partnerName = pSnap.data().displayName || (myRole === 'dom' ? 'Sub' : 'Dom');
      }

      // Listen for shared calendar data
      onSnapshot(doc(db, 'relationships', relId, 'calendar', 'data'), snap => {
        if (snap.exists()) {
          const d = snap.data();
          events = d.events || [];
          recurTasks = d.recurTasks || [];
          
          // Inject dynamic names into profiles if they are default
        } else {
          // Initialize relationship calendar if missing
          seedDemoData();
        }
        refreshAll();
      });
    }

    // Listen for private reflections
    onSnapshot(dataRef('calendar'), snap => {
      if (snap.exists()) {
        reflections = snap.data().reflections || [];
      }
      refreshAll();
    });

    renderMonth();
  }

  function refreshAll() {
    renderCurrentView();
  }

  // Expose to window for HTML onclicks
  Object.assign(window, {
    switchView, changeMonth, openDay, changeWeek,
    changeDayView, selectMood, saveReflection, toggleTask, unlockScene,
    confirmDelete, deleteScope, deleteEvent, openAddModal, editTask,
    editEvent, closeModal, handleModalClick, setType, setCat, setFreq,
    toggleWorkDow, toggleDow, toggleSwitch, saveEvent
  });

  init().catch(console.error);
  </script>
