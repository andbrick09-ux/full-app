<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#051024"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Calendar • Dom Sub Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="nav.css"/>
  <style>
    body { min-height: 100dvh; overflow-x: hidden; }
    .glow-orb {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%);
      top: -140px; left: 50%; transform: translateX(-50%);
      pointer-events: none; z-index: 0;
    }
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; padding-top: calc(14px + var(--safe-t));
      background: rgba(5,16,36,0.95); backdrop-filter: blur(25px);
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      flex-shrink: 0; width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2);
      text-decoration: none; cursor: pointer; transition: all .2s;
    }
    .topbar-center { flex: 1; min-width: 0; }
    .topbar-title {
      font-family: 'Great Vibes', cursive; font-size: 26px;
      background: var(--luxury-gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; margin: 0; line-height: 1.1;
    }
    .topbar-sub {
      font-family: 'Playfair Display', serif; color: var(--gold);
      font-size: 10px; text-transform: uppercase; letter-spacing: 2.5px;
      margin-top: 1px; opacity: 0.6;
    }
    .view-toggle {
      display: flex; gap: 6px; padding: 10px 16px 8px;
      background: rgba(5,16,36,0.95); border-bottom: 1px solid rgba(212,175,55,0.06);
      position: sticky; top: calc(68px + var(--safe-t)); z-index: 99;
    }
    .view-btn {
      flex: 1; padding: 9px 6px; border-radius: 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      color: #666; font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
      cursor: pointer; transition: all 0.2s;
    }
    .view-btn.active {
      background: var(--luxury-gradient); color: var(--midnight);
      border-color: transparent; box-shadow: 0 3px 12px rgba(212,175,55,0.3);
    }
    .page-wrap {
      position: relative; z-index: 1; max-width: 600px; margin: 0 auto;
      padding: 16px 16px calc(100px + var(--safe-b));
    }
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding: 0 4px;
    }
    .month-nav-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(212,175,55,0.07); border: 1px solid rgba(212,175,55,0.15);
      color: var(--gold); font-size: 18px; cursor: pointer;
    }
    .month-label {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--gold);
      font-weight: 600;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 24px;
    }
    .calendar-day {
      aspect-ratio: 1;
      background: rgba(5,16,36,0.6);
      border: 1px solid rgba(212,175,55,0.1);
      border-radius: 10px;
      padding: 6px;
      font-size: 12px;
      position: relative;
      cursor: pointer;
    }
    .calendar-day.today {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(212,175,55,0.3);
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.6;
    }
    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .empty-state p {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      cursor: pointer;
      background: var(--gold);
      color: #080c14;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(5,16,36,0.95);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #888;
      font-size: 10px;
    }
    .nav-item.active {
      color: var(--gold);
    }
    .nav-item .material-symbols-rounded {
      font-size: 20px;
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>

  <div class="topbar">
    <a href="index-enhanced.html" class="back-btn">
      <span class="material-symbols-rounded">arrow_back</span>
    </a>
    <div class="topbar-center">
      <div class="topbar-title">Calendar</div>
      <div class="topbar-sub">Shared Schedule</div>
    </div>
  </div>

  <div class="view-toggle">
    <button class="view-btn active">MONTH</button>
    <button class="view-btn">WEEK</button>
    <button class="view-btn">DAY</button>
  </div>

  <div class="page-wrap">

    <!-- Empty State -->
    <div class="empty-state">
      <div class="icon">📅</div>
      <h3>No events yet</h3>
      <p>Nothing has been scheduled.<br>Add your first event to get started.</p>
      <button class="btn" onclick="alert('Event creation coming soon!')">Add First Event</button>
    </div>

    <!-- Month Calendar Grid -->
    <div class="month-nav">
      <button class="month-nav-btn">←</button>
      <div class="month-label">July 2026</div>
      <button class="month-nav-btn">→</button>
    </div>

    <div class="calendar-grid">
      <!-- Calendar days will be generated here -->
      <div class="calendar-day"><div class="day-number">1</div></div>
      <div class="calendar-day"><div class="day-number">2</div></div>
      <div class="calendar-day"><div class="day-number">3</div></div>
      <div class="calendar-day"><div class="day-number">4</div></div>
      <div class="calendar-day"><div class="day-number">5</div></div>
      <div class="calendar-day"><div class="day-number">6</div></div>
      <div class="calendar-day"><div class="day-number">7</div></div>
      <!-- Add more days as needed -->
    </div>

  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <a href="index-enhanced.html" class="nav-item">
      <span class="material-symbols-rounded">home</span>
      <span>Home</span>
    </a>
    <a href="scene-menu.html" class="nav-item">
      <span class="material-symbols-rounded">theater_comedy</span>
      <span>Scenes</span>
    </a>
    <a href="training-menu.html" class="nav-item">
      <span class="material-symbols-rounded">fitness_center</span>
      <span>Training</span>
    </a>
    <a href="calendar.html" class="nav-item active">
      <span class="material-symbols-rounded">calendar_month</span>
      <span>Calendar</span>
    </a>
    <a href="more.html" class="nav-item">
      <span class="material-symbols-rounded">more_horiz</span>
      <span>More</span>
    </a>
  </div>

  <script src="nav.js"></script>
</body>
</html>
