<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#051024" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Calendar • Dom Sub Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    body { min-height: 100dvh; overflow-x: hidden; }
    .glow-orb {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%);
      top: -140px; left: 50%; transform: translateX(-50%);
      pointer-events: none; z-index: 0;
      animation: orbFloat 8s ease-in-out infinite;
    }
    @keyframes orbFloat {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(24px); }
    }
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; padding-top: calc(14px + var(--safe-t));
      background: rgba(5,16,36,0.95); backdrop-filter: blur(25px);
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      flex-shrink: 0; width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2);
      text-decoration: none; cursor: pointer; transition: all .2s;
    }
    .back-btn .material-symbols-rounded { font-size: 20px; color: var(--gold); }
    .topbar-center { flex: 1; min-width: 0; }
    .topbar-title {
      font-family: 'Great Vibes', cursive; font-size: 26px;
      background: var(--luxury-gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; margin: 0; line-height: 1.1;
    }
    .topbar-sub {
      font-family: 'Playfair Display', serif; color: var(--gold);
      font-size: 10px; text-transform: uppercase; letter-spacing: 2.5px;
      margin-top: 1px; opacity: 0.6;
    }
    .view-toggle {
      display: flex; gap: 6px; padding: 10px 16px 8px;
      background: rgba(5,16,36,0.95); border-bottom: 1px solid rgba(212,175,55,0.06);
      position: sticky; top: calc(68px + var(--safe-t)); z-index: 99;
    }
    .view-btn {
      flex: 1; padding: 9px 6px; border-radius: 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      color: #666; font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
      cursor: pointer; transition: all 0.2s;
    }
    .view-btn.active {
      background: var(--luxury-gradient); color: var(--midnight);
      border-color: transparent; box-shadow: 0 3px 12px rgba(212,175,55,0.3);
    }
    .page-wrap {
      position: relative; z-index: 1; max-width: 600px; margin: 0 auto;
      padding: 16px 16px calc(100px + var(--safe-b));
    }
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding: 0 4px;
      animation: fadeUp 0.3s ease both;
    }
    .month-nav-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(212,175,55,0.07); border: 1px solid rgba(212,175,55,0.15);
      color: var(--gold); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .month-nav-btn:active { transform: scale(0.92); background: rgba(212,175,55,0.15); }
    .month-label {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--gold);
      font-weight: 600;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 24px;
    }
    .calendar-day {
      aspect-ratio: 1;
      background: rgba(5,16,36,0.6);
      border: 1px solid rgba(212,175,55,0.1);
      border-radius: 10px;
      padding: 6px;
      font-size: 12px;
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
    }
    .calendar-day:hover {
      border-color: var(--gold);
      background: rgba(212,175,55,0.08);
    }
    .calendar-day.today {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(212,175,55,0.3);
    }
    .calendar-day.other-month {
      opacity: 0.4;
    }
    .day-number {
      font-weight: 600;
      color: var(--gold);
    }
    .day-events {
      position: absolute;
      bottom: 4px;
      left: 4px;
      right: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
    }
    .event-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.6;
    }
    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .empty-state p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      cursor: pointer;
      background: var(--gold);
      color: #080c14;
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>

  <div class="topbar">
    <a href="index-enhanced.html" class="back-btn">
      <span class="material-symbols-rounded">arrow_back</span>
    </a>
    <div class="topbar-center">
      <div class="topbar-title">Calendar</div>
      <div class="topbar-sub">Shared Schedule</div>
    </div>
  </div>

  <div class="view-toggle">
    <button id="vbtn-month" class="view-btn active" onclick="switchView('month')">Month</button>
    <button id="vbtn-week" class="view-btn" onclick="switchView('week')">Week</button>
    <button id="vbtn-day" class="view-btn" onclick="switchView('day')">Day</button>
  </div>

  <div class="page-wrap">

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="icon">📅</div>
      <h3>No events yet</h3>
      <p>Nothing has been scheduled.<br>Add your first event to get started.</p>
      <button class="btn" onclick="addFirstEvent()">Add First Event</button>
    </div>

    <!-- Month View -->
    <div id="view-month">
      <div class="month-nav">
        <button class="month-nav-btn" onclick="prevMonth()">←</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="month-nav-btn" onclick="nextMonth()">→</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- Week View -->
    <div id="view-week" style="display: none;">
      <div class="month-nav">
        <button class="month-nav-btn" onclick="prevWeek()">←</button>
        <div class="month-label" id="weekLabel"></div>
        <button class="month-nav-btn" onclick="nextWeek()">→</button>
      </div>
      <div id="weekContainer"></div>
    </div>

    <!-- Day View -->
    <div id="view-day" style="display: none;">
      <div class="month-nav">
        <button class="month-nav-btn" onclick="prevDay()">←</button>
        <div class="month-label" id="dayLabel"></div>
        <button class="month-nav-btn" onclick="nextDay()">→</button>
      </div>
      <div id="dayContainer"></div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { requireAuth, getMyProfile, getRelationship, dataRef } from './auth.js';
    import { doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    let events = [];
    let recurTasks = [];
    let reflections = [];
    let myUid = null;
    let myRole = 'dom';
    let relId = null;
    let myName = 'User';
    let partnerName = 'Partner';

    async function init() {
      const user = await requireAuth();
      myUid = user.uid;
      
      const profile = await getMyProfile();
      myRole = profile?.role || 'dom';
      myName = profile?.displayName || 'User';

      const rel = await getRelationship();
      if (rel) {
        relId = rel.id;
        partnerName = rel.partnerName || 'Partner';
      }

      // Load data from Firestore
      await loadCalendarData();

      // Only seed demo data if nothing exists AND user wants it
      if (events.length === 0 && recurTasks.length === 0) {
        // Do NOT auto-seed for new users
        // User can manually add first event
      }

      renderCurrentView();
      setupListeners();
    }

    async function loadCalendarData() {
      if (!relId) return;

      try {
        const relCalRef = doc(db, 'relationships', relId, 'calendar', 'data');
        const snap = await getDoc(relCalRef);
        
        if (snap.exists()) {
          const data = snap.data();
          events = data.events || [];
          recurTasks = data.recurTasks || [];
        }
      } catch (e) {
        console.log('No calendar data found yet');
      }
    }

    async function persist() {
      if (!relId || !myUid) return;
      
      const relCalRef = doc(db, 'relationships', relId, 'calendar', 'data');
      await setDoc(relCalRef, { events, recurTasks }, { merge: true });
    }

    // Demo seeding is DISABLED for new users
    // function seedDemoData() { ... removed ... }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ... rest of the original calendar code remains the same ...
    // (month/week/day rendering, etc.)

    function renderCurrentView() {
      // Placeholder - you can paste the rest of your original rendering code here
      const emptyState = document.getElementById('emptyState');
      
      if (events.length === 0 && recurTasks.length === 0) {
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
        // Render events here
      }
    }

    window.addFirstEvent = function() {
      alert('Event creation modal would open here');
      // You can implement the add event modal
    };

    function setupListeners() {
      // Add any click handlers here
    }

    // Initialize
    init();
  </script>

  <script src="nav.js"></script>
</body>
</html>
