<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#051024"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Dom Sub Hub — Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    :root {
      --cream: #f0e6d2;
      --cream-dim: rgba(240,230,211,0.7);
      --cream-mute: rgba(240,230,211,0.35);
    }
    body { min-height: 100dvh; background: var(--bg); color: var(--cream); overflow-x: hidden; position: relative; }
    .glow-orb { position: fixed; width: 460px; height: 460px; border-radius: 50%; background: radial-gradient(circle, rgba(212,175,55,0.07) 0%, transparent 70%); top: -120px; left: 50%; transform: translateX(-50%); pointer-events: none; z-index: 0; }
    .shell { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
    .settings-container { padding: 24px 20px 40px; }
    .settings-group { margin-bottom:28px; }
    .settings-group-label { font-family:'Playfair Display',serif; font-size:10px; font-weight:600; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:14px; display:block; border-bottom:1px solid var(--border); padding-bottom:6px; }
    .settings-field { margin-bottom:16px; }
    .settings-field label { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:600; color:var(--cream-dim); margin-bottom:6px; display:block; }
    .settings-input { width:100%; padding:14px 16px; background:rgba(5,16,36,.85); border:1px solid var(--border); border-radius:12px; color:var(--cream); font-family:'Montserrat',sans-serif; font-size:14px; outline:none; transition:all .2s; }
    .settings-input:focus { border-color:var(--gold); transform:scale(1.01); background:rgba(5,16,36,1); }
    .theme-options { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
    .theme-option { padding:10px; border-radius:12px; background:rgba(5,16,36,.85); border:1px solid var(--border); cursor:pointer; text-align:center; transition:all .2s; }
    .theme-option.selected { border-color:var(--gold); background:rgba(212,175,55,.1); box-shadow:0 0 10px rgba(212,175,55,.15); }
    .theme-swatch { height:36px; border-radius:8px; margin-bottom:8px; border:1px solid rgba(255,255,255,.1); }
    .theme-name { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:600; color:var(--cream-dim); }
    .theme-option.selected .theme-name { color:var(--gold); }
    .limits-input-row { display:flex; gap:10px; margin-bottom:12px; }
    .limits-add-btn { width:46px; border-radius:12px; background:rgba(212,175,55,.12); border:1px solid rgba(212,175,55,.3); color:var(--gold); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; }
    .limits-add-btn:active { transform:scale(.95); }
    .limits-list { display:flex; flex-direction:column; gap:8px; }
    .limits-empty { font-family:'Montserrat',sans-serif; font-size:11px; color:var(--cream-mute); font-style:italic; }
    .limits-item { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:12px; background:rgba(244,67,54,.08); border:1px solid rgba(244,67,54,.2); }
    .limits-item-text { flex:1; font-family:'Montserrat',sans-serif; font-size:13px; color:#ffcdd2; }
    .limits-item-del { background:transparent; border:none; color:rgba(244,67,54,.8); cursor:pointer; padding:4px; display:flex; align-items:center; justify-content:center; }
    .limits-item-del:active { transform:scale(.9); }
    .dynamic-pill { padding:10px 18px; border-radius:20px; font-family:'Montserrat',sans-serif; font-size:12px; font-weight:600; background:rgba(5,16,36,.85); border:1px solid var(--border); color:var(--cream-dim); cursor:pointer; transition:all .2s; flex:1; text-align:center; }
    .dynamic-pill.selected { background:rgba(212,175,55,.15); border-color:var(--gold); color:var(--gold-light); }
    .settings-save-btn { width:100%; padding:16px; border-radius:14px; background:var(--luxury-gradient); color:#051024; font-family:'Playfair Display',serif; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; border:none; cursor:pointer; transition:all .2s; margin-top:10px; box-shadow:0 6px 20px rgba(212,175,55,0.25); display:flex; align-items:center; justify-content:center; gap:8px; }
    .settings-save-btn:active { transform:scale(.98); }
    .settings-danger-btn { width:100%; padding:16px; border-radius:14px; background:transparent; border:1px solid rgba(244,67,54,.4); color:#e57373; font-family:'Montserrat',sans-serif; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; cursor:pointer; transition:all .2s; margin-top:16px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .settings-danger-btn:active { background:rgba(244,67,54,.15); }
    .pairing-status { background:rgba(5,16,36,.85); border:1px solid var(--border); border-radius:14px; padding:16px 18px; }
    .pairing-status.paired { border-color:#4CAF50; background:rgba(76,175,80,.08); }
    .pairing-status.unpaired { border-color:var(--gold); }
    .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-20px); background:var(--gold); color:#051024; padding:12px 24px; border-radius:30px; font-family:'Montserrat',sans-serif; font-size:13px; font-weight:700; box-shadow:0 8px 25px rgba(212,175,55,0.4); opacity:0; pointer-events:none; transition:all .3s cubic-bezier(.22,.68,0,1.2); z-index:1000; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
<link rel="stylesheet" href="nav.css" />
</head>
<body data-nav="more">
  <div class="glow-orb"></div>
  
  <div class="shell">
    <div class="topbar">
      <div class="topbar-center">
        <h1 class="topbar-title">Settings</h1>
        <div class="topbar-sub">App Preferences</div>
      </div>
    </div>

    <div class="settings-container" id="settingsSheet">
      
      <!-- Personalization -->
      <div class="settings-group">
        <span class="settings-group-label">Personalization</span>
        <div class="settings-field">
          <label>Your Name (Sub)</label>
          <input class="settings-input" id="settingName" type="text" maxlength="30" placeholder="e.g. Becca"/>
        </div>
        <div class="settings-field">
          <label>Partner's Name (Dominant)</label>
          <input class="settings-input" id="settingPartnerName" type="text" maxlength="30" placeholder="e.g. Sir"/>
        </div>
        <div class="settings-field">
          <label>Safeword</label>
          <input class="settings-input" id="settingSafeWord" type="text" maxlength="30" placeholder="e.g. Red" style="color:#e57373; font-weight:600;"/>
        </div>
      </div>

      <!-- Pairing Status (NEW) -->
      <div class="settings-group">
        <span class="settings-group-label">Pairing Status</span>
        <div id="pairingStatus" class="pairing-status unpaired">
          <div style="font-size:13px; font-weight:600; color:var(--gold);" id="pairingText">Loading pairing status…</div>
          <div style="font-size:11px; color:var(--cream-mute); margin-top:4px;" id="pairingSubtext"></div>
        </div>
        <button onclick="window.location.href='pair.html'" class="settings-save-btn" style="margin-top:12px; background:transparent; border:1px solid var(--gold); color:var(--gold);">
          <span class="material-symbols-rounded">link</span>
          Manage Pairing
        </button>
      </div>

      <!-- Theme Engine -->
      <div class="settings-group">
        <span class="settings-group-label">Theme Engine</span>
        <div class="theme-options" id="themeOptions">
          <div class="theme-option selected" data-theme="midnight" onclick="selectTheme(this)">
            <div class="theme-swatch" style="background:linear-gradient(135deg,#051024,#0a1b3f)"></div>
            <div class="theme-name">Midnight Gold</div>
          </div>
          <div class="theme-option" data-theme="rose" onclick="selectTheme(this)">
            <div class="theme-swatch" style="background:linear-gradient(135deg,#2a0815,#4a0f25)"></div>
            <div class="theme-name">Deep Rose</div>
          </div>
          <div class="theme-option" data-theme="obsidian" onclick="selectTheme(this)">
            <div class="theme-swatch" style="background:linear-gradient(135deg,#0a0a0a,#1a1a1a)"></div>
            <div class="theme-name">Obsidian</div>
          </div>
          <div class="theme-option" data-theme="light" onclick="selectTheme(this)">
            <div class="theme-swatch" style="background:linear-gradient(135deg,#f5f0e1,#e8dcc8)"></div>
            <div class="theme-name">Parchment</div>
          </div>
        </div>
      </div>

      <!-- Font Size -->
      <div class="settings-group">
        <span class="settings-group-label">Text Size</span>
        <div id="fontSizePills" style="display:flex; gap:8px;">
          <div class="dynamic-pill" data-size="fs-small" onclick="selectFontSize(this)">Small</div>
          <div class="dynamic-pill selected" data-size="fs-medium" onclick="selectFontSize(this)">Medium</div>
          <div class="dynamic-pill" data-size="fs-large" onclick="selectFontSize(this)">Large</div>
        </div>
      </div>

      <!-- Hard Limits -->
      <div class="settings-group">
        <span class="settings-group-label">Hard Limits</span>
        <div class="limits-input-row">
          <input id="limitInput" class="settings-input" type="text" placeholder="Add a hard limit (e.g. No breath play)" style="flex:1;"/>
          <button class="limits-add-btn" onclick="addLimit()">
            <span class="material-symbols-rounded">add</span>
          </button>
        </div>
        <div id="limitsList" class="limits-list"></div>
      </div>

      <!-- Training Roster -->
      <div class="settings-group">
        <span class="settings-group-label" style="color:#e57373;">Training Roster <span style="font-size:9px; opacity:0.6;">(Sir's Eyes Only)</span></span>
        <div class="settings-field">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
            <input type="checkbox" id="trk5" class="training-toggle" value="the-5-training.html"/> The "5" Training
          </label>
        </div>
        <div class="settings-field">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
            <input type="checkbox" id="trkPlug" class="training-toggle" value="anal-plug-training.html"/> Anal Plug Training
          </label>
        </div>
        <div class="settings-field">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
            <input type="checkbox" id="trkDeep" class="training-toggle" value="deepthroat-training.html"/> Deep Throat Training
          </label>
        </div>
        <div class="settings-field">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
            <input type="checkbox" id="trkKegel" class="training-toggle" value="kegel-training.html"/> Kegel Training
          </label>
        </div>
        <div class="settings-field">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
            <input type="checkbox" id="trkPos" class="training-toggle" value="position-training.html"/> Position Training
          </label>
        </div>
      </div>

      <!-- Save Button -->
      <button class="settings-save-btn" onclick="saveSettings()">
        <span class="material-symbols-rounded">save</span>
        Save Changes
      </button>

      <!-- Account -->
      <div class="settings-group" style="margin-top:28px;">
        <span class="settings-group-label">Account</span>
        <div style="background:rgba(5,16,36,.85);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:16px">
          <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--gold-light)" id="acctName">—</div>
          <div style="font-size:11px;letter-spacing:1px;color:var(--gold);margin:4px 0 2px" id="acctRole">—</div>
          <div style="font-size:11px;color:var(--cream-mute)" id="acctEmail">—</div>
        </div>
        <button class="settings-danger-btn" onclick="handleSignOut()">
          <span class="material-symbols-rounded">logout</span>
          Sign Out
        </button>
        <button class="settings-danger-btn" onclick="clearHistory()">
          <span class="material-symbols-rounded">delete_forever</span>
          Clear All App Data
        </button>
      </div>

    </div>
  </div>

  <div id="toast" class="toast">Changes Saved</div>

  <script type="module">
    import { requireAuth, getMyProfile, logOut, dataRef, getMyRelationship } from './auth.js';
    import { getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    let currentUser;
    let myProfile;
    let settingsCache = {};

    async function init() {
      currentUser = await requireAuth();
      myProfile = await getMyProfile();

      // Show account info
      document.getElementById('acctName').textContent  = myProfile?.displayName || currentUser.email;
      document.getElementById('acctRole').textContent  = myProfile?.role === 'dom' ? '👑 Dom' : '🌸 Sub';
      document.getElementById('acctEmail').textContent = currentUser.email;

      await loadSettings();
      await loadPairingStatus();
    }

    async function getSettings() {
      try {
        const snap = await getDoc(dataRef('settings'));
        settingsCache = snap.exists() ? snap.data() : {};
      } catch { settingsCache = {}; }
      return settingsCache;
    }
    
    async function loadSettings() {
      const s = await getSettings();
      document.getElementById('settingName').value = s.subName || '';
      document.getElementById('settingPartnerName').value = s.domName || '';
      document.getElementById('settingSafeWord').value = s.safeWord || '';
      
      const theme = s.theme || 'midnight';
      document.querySelectorAll('.theme-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.theme === theme);
      });
      
      const size = s.fontSize || 'fs-medium';
      document.querySelectorAll('#fontSizePills .dynamic-pill').forEach(el => {
        el.classList.toggle('selected', el.dataset.size === size);
      });
      
      const activeTs = s.activeTrainings || ['anal-plug-training.html', 'position-training.html', 'kegel-training.html'];
      document.querySelectorAll('.training-toggle').forEach(chk => {
        chk.checked = activeTs.includes(chk.value);
      });
      
      renderLimitsList();
    }

    async function loadPairingStatus() {
      const statusEl = document.getElementById('pairingStatus');
      const textEl = document.getElementById('pairingText');
      const subEl = document.getElementById('pairingSubtext');

      try {
        const rel = await getMyRelationship();
        
        if (rel && rel.status === 'active') {
          statusEl.classList.remove('unpaired');
          statusEl.classList.add('paired');
          textEl.textContent = '✓ Paired';
          textEl.style.color = '#4CAF50';
          subEl.textContent = myProfile?.role === 'dom' 
            ? `Linked with your Sub` 
            : `Linked with your Dominant`;
        } else if (rel && rel.status === 'pending') {
          statusEl.classList.remove('paired');
          statusEl.classList.add('unpaired');
          textEl.textContent = 'Invite Pending';
          textEl.style.color = '#FFB300';
          subEl.textContent = myProfile?.role === 'dom' 
            ? 'Waiting for your Sub to accept' 
            : 'Waiting for your Dom to confirm';
        } else {
          statusEl.classList.remove('paired');
          statusEl.classList.add('unpaired');
          textEl.textContent = 'Not Paired';
          textEl.style.color = 'var(--gold)';
          subEl.textContent = 'Pair with your partner to share notes & data';
        }
      } catch (e) {
        console.error('Pairing status error:', e);
        textEl.textContent = 'Pairing status unavailable';
        subEl.textContent = 'Please try again later';
      }
    }
    
    async function saveSettings() {
      const existing = settingsCache;
      const themeEl  = document.querySelector('.theme-option.selected');
      const sizeEl   = document.querySelector('#fontSizePills .dynamic-pill.selected');
      const activeTs = Array.from(document.querySelectorAll('.training-toggle:checked')).map(c => c.value);

      const s = {
        ...existing,
        subName:         document.getElementById('settingName').value.trim(),
        domName:         document.getElementById('settingPartnerName').value.trim(),
        safeWord:        document.getElementById('settingSafeWord').value.trim(),
        theme:           themeEl ? themeEl.dataset.theme : 'midnight',
        fontSize:        sizeEl  ? sizeEl.dataset.size   : 'fs-medium',
        activeTrainings: activeTs
      };

      try {
        await setDoc(dataRef('settings'), s, { merge: true });
        settingsCache = s;
        showToast('Settings saved ✦');
      } catch(ex) {
        showToast('Save failed — check your connection');
        console.error(ex);
      }
    }
    
    function selectTheme(el) {
      document.querySelectorAll('.theme-option').forEach(p => p.classList.remove('selected'));
      el.classList.add('selected');
    }
    
    function selectFontSize(el) {
      document.querySelectorAll('#fontSizePills .dynamic-pill').forEach(p => p.classList.remove('selected'));
      el.classList.add('selected');
    }
    
    function renderLimitsList() {
      const list   = document.getElementById('limitsList');
      const limits = settingsCache.limits || [];
      if (!limits.length) {
        list.innerHTML = '<div class="limits-empty">No hard limits active. Sir will have full creative freedom.</div>'; 
        return; 
      }
      list.innerHTML = limits.map((l,i) => `
        <div class="limits-item">
          <span class="material-symbols-rounded" style="font-size:18px;color:rgba(244,67,54,.8);flex-shrink:0">block</span>
          <span class="limits-item-text">${l}</span>
          <button class="limits-item-del" onclick="removeLimit(${i})">
            <span class="material-symbols-rounded" style="font-size:20px;">close</span>
          </button>
        </div>`).join('');
    }
    
    async function addLimit() {
      const input = document.getElementById('limitInput');
      const val = (input.value||'').trim();
      if (!val) return;
      
      const limits = settingsCache.limits || [];
      if (limits.includes(val)) { showToast('Limit already exists'); return; }
      
      limits.push(val);
      settingsCache.limits = limits;
      await setDoc(dataRef('settings'), settingsCache, { merge: true });
      input.value = '';
      renderLimitsList();
      showToast('Limit added');
    }

    async function removeLimit(index) {
      const limits = settingsCache.limits || [];
      limits.splice(index, 1);
      settingsCache.limits = limits;
      await setDoc(dataRef('settings'), settingsCache, { merge: true });
      renderLimitsList();
    }
    
    async function handleSignOut() {
      if (confirm('Sign out of Dom Sub Hub?')) {
        await logOut();
      }
    }
    
    async function clearHistory() {
      if (!confirm('This will permanently delete ALL your settings and data. This cannot be undone. Continue?')) return;
      
      try {
        // For now we only clear settings — extend this later to delete other subcollections
        await setDoc(dataRef('settings'), {});
        showToast('All data cleared');
        setTimeout(() => location.reload(), 800);
      } catch (e) {
        showToast('Failed to clear data');
        console.error(e);
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // Expose functions for inline onclick handlers
    window.saveSettings = saveSettings;
    window.addLimit = addLimit;
    window.removeLimit = removeLimit;
    window.selectTheme = selectTheme;
    window.selectFontSize = selectFontSize;
    window.handleSignOut = handleSignOut;
    window.clearHistory = clearHistory;

    init();
  </script>
<!-- nav.js injects the nav bar, overlay and More sheet automatically -->
<script src="nav.js"></script>
</body>
</html>
