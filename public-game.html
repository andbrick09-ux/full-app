    <style>
        :root {
            --midnight: #01040a;
            --surface: rgba(15, 23, 42, 0.97);
            --champagne: #D4AF37;
            --punish-red: #dc2626;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--midnight);

            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .serif { font-family: 'Cinzel', serif; }

        @keyframes shuffle-blur {
            0%   { transform: translateY(0) scaleX(1);       filter: blur(0px);  opacity: 1; }
            20%  { transform: translateY(-6px) scaleX(0.97); filter: blur(3px);  opacity: 0.5; }
            40%  { transform: translateY(4px) scaleX(1.02);  filter: blur(5px);  opacity: 0.7; }
            60%  { transform: translateY(-3px) scaleX(0.98); filter: blur(3px);  opacity: 0.55; }
            80%  { transform: translateY(2px) scaleX(1.01);  filter: blur(2px);  opacity: 0.8; }
            100% { transform: translateY(0) scaleX(1);       filter: blur(0px);  opacity: 1; }
        }

        @keyframes revealResult {
            0%   { opacity: 0; transform: translateY(10px) scale(0.97); filter: blur(4px); }
            100% { opacity: 1; transform: translateY(0) scale(1);       filter: blur(0px); }
        }

        @keyframes cardGlow {
            0%   { box-shadow: 0 35px 90px rgba(0,0,0,1); }
            50%  { box-shadow: 0 35px 90px rgba(0,0,0,1), 0 0 50px rgba(212,175,55,0.2); }
            100% { box-shadow: 0 35px 90px rgba(0,0,0,1); }
        }

        @keyframes timerReveal {
            0%   { opacity: 0; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes urgencyPulse {
            0%, 100% { box-shadow: 0 35px 90px rgba(0,0,0,1), 0 0 0px rgba(220,38,38,0); }
            50%       { box-shadow: 0 35px 90px rgba(0,0,0,1), 0 0 50px rgba(220,38,38,0.35); }
        }

        .shuffling     { animation: shuffle-blur 0.12s infinite; color: var(--champagne); }
        .result-reveal { animation: revealResult 0.55s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .card-glow     { animation: cardGlow 1s ease both; }
        .urgency-pulse { animation: urgencyPulse 1.2s ease-in-out infinite; }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 40px;
            box-shadow: 0 35px 90px rgba(0,0,0,1);
            transition: border-color 0.4s ease;
        }

        .directive-display {
            min-height: clamp(260px, 45vh, 420px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem 2.5rem;
        }

        .filter-chip {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: rgba(212, 175, 55, 0.5);
            background: rgba(15, 23, 42, 0.5);
            transition: 0.3s all ease;
        }
        .filter-chip.active {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--champagne);
            color: white;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .risk-tab {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-bottom: 6px;
            border-bottom: 2px solid transparent;
            opacity: 0.3;
            transition: 0.3s all ease;
        }
        .risk-tab.active { opacity: 1; transform: translateY(-2px); }
        .risk-tab[data-val="[Low Risk]"].active    { border-color: #D4AF37; }
        .risk-tab[data-val="[Medium Risk]"].active { border-color: #d97706; }
        .risk-tab[data-val="[High Risk]"].active   { border-color: #dc2626; }

        .filter-briefing {
            font-size: 10px;
            color: rgba(212, 175, 55, 0.4);
            font-style: italic;
            text-align: center;
            margin-top: 8px;
            letter-spacing: 0.05em;
        }

        /* Timer wrapper — hidden by default */
        #timer-wrap {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 1.25rem;
            animation: timerReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        /* Begin Task button */
        #timer-start-btn {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--midnight);
            background: linear-gradient(135deg, #D4AF37, #F3E5AB);
            border: none;
            border-radius: 20px;
            padding: 9px 26px;
            cursor: pointer;
            transition: 0.2s all ease;
        }
        #timer-start-btn:active { transform: scale(0.93); opacity: 0.85; }

        /* Ring container — hidden until Begin Task tapped */
        #timer-ring-wrap {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #timer-ring-svg    { transform: rotate(-90deg); }
        #timer-ring-track  { fill: none; stroke: rgba(212,175,55,0.1); stroke-width: 4; }
        #timer-ring-fill   {
            fill: none; stroke: var(--champagne); stroke-width: 4;
            stroke-linecap: round; stroke-dasharray: 283; stroke-dashoffset: 0;
            transition: stroke 0.5s ease;
        }
        #timer-text {
            font-family: 'Cinzel', serif; font-size: 1.1rem;
            fill: var(--champagne); dominant-baseline: middle;
            text-anchor: middle; transition: fill 0.5s ease;
        }
        #timer-label {
            font-size: 9px; text-transform: uppercase;
            letter-spacing: 0.25em; color: rgba(212,175,55,0.45); margin-top: 0.5rem;
        }
        #timer-expired {
            display: none; font-family: 'Cinzel', serif; font-size: 0.75rem;
            color: var(--punish-red); text-transform: uppercase;
            letter-spacing: 0.2em; margin-top: 0.75rem;
            animation: revealResult 0.4s ease both;
        }

        #result-label {
            font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase;
            font-weight: 900; color: rgba(212, 175, 55, 0.45);
            margin-bottom: 1.25rem; transition: color 0.3s ease;
        }

        #empty-msg {
            display: none; font-size: 11px; color: rgba(239, 68, 68, 0.7);
            text-transform: uppercase; letter-spacing: 0.15em;
            margin-top: 1rem; font-style: italic;
        }

        .btn-corner {
            position: absolute; top: 1.25rem;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 4px; width: 50px; height: 50px;
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 14px;
            background: rgba(212, 175, 55, 0.08); z-index: 50; transition: 0.2s all ease;
        }
        .btn-corner:active { transform: scale(0.88); background: rgba(212,175,55,0.18); }
        .btn-corner-label  { font-size: 7px; text-transform: uppercase; color: rgba(212,175,55,0.6); font-weight: 700; }

        .btn-action { transition: 0.3s all ease; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; font-size: 13px; }
        .btn-action:active { transform: scale(0.97); }
        .btn-directive { background: linear-gradient(135deg, #D4AF37 0%, #F3E5AB 100%); color: #01040a; }
        .btn-directive:disabled { opacity: 0.35; pointer-events: none; }

        .slide-modal-overlay {
            position: fixed; inset: 0; background: #01040a; z-index: 200;
            transform: translateY(100%); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            overflow-y: auto; padding: 2rem;
        }
        .slide-modal-overlay.open { transform: translateY(0); }
    </style>
</head>

        function extractSeconds(desc) {
            const t = desc.toLowerCase();
            const m = t.match(/(\d+)[\s-](?:full\s)?minutes?/);
            if (m) return parseInt(m[1]) * 60;
            const s = t.match(/(\d+)\s+seconds?/);
            if (s) return parseInt(s[1]);
            const c = t.match(/(\d+)\s+counts?/);
            if (c) return parseInt(c[1]);
            return null;
        }

        let timerInterval  = null;
        let timerTotal     = 0;
        let timerRemaining = 0;
        const RING_CIRC    = 283;

        // Called after roll reveal — shows "Begin Task", hides ring
        function prepareTimer(seconds) {
            clearTimer();
            timerTotal     = seconds;
            timerRemaining = seconds;

            const fill = document.getElementById('timer-ring-fill');
            const text = document.getElementById('timer-text');
            fill.style.stroke           = 'var(--champagne)';
            text.style.fill             = 'var(--champagne)';
            fill.style.strokeDashoffset = '0';

            document.getElementById('timer-expired').style.display   = 'none';
            document.getElementById('timer-start-btn').style.display = 'block';
            document.getElementById('timer-ring-wrap').style.display = 'none';
            document.getElementById('timer-wrap').style.display      = 'flex';
        }

        function beginTimer() {
            document.getElementById('timer-start-btn').style.display = 'none';
            document.getElementById('timer-ring-wrap').style.display = 'flex';
            document.getElementById('roll-btn').disabled             = true;

            renderRing();

            timerInterval = setInterval(() => {
                timerRemaining--;
                renderRing();

                if (timerRemaining <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;

                    const fill = document.getElementById('timer-ring-fill');
                    const text = document.getElementById('timer-text');
                    fill.style.stroke     = 'var(--punish-red)';
                    text.style.fill       = 'var(--punish-red)';
                    text.textContent      = '00:00';

                    document.getElementById('timer-expired').style.display = 'block';
                    document.getElementById('result-card').classList.add('urgency-pulse');
                    document.getElementById('roll-btn').disabled = false;

                    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                }
            }, 1000);
        }

        function renderRing() {
            const fill     = document.getElementById('timer-ring-fill');
            const text     = document.getElementById('timer-text');
            const progress = timerRemaining / timerTotal;

            fill.style.strokeDashoffset = RING_CIRC * (1 - progress);

            const m = Math.floor(timerRemaining / 60);
            const s = timerRemaining % 60;
            text.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

            if (progress < 0.2) {
                fill.style.stroke = 'var(--punish-red)';
                text.style.fill   = 'var(--punish-red)';
            }

            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

            if (isRolling) return;

            const pool = masterVault.filter(t =>
                selectedRisks.includes(t.risk) && t.loc.some(l => selectedLocs.includes(l))
            );

            if (pool.length === 0) {
                document.getElementById('empty-msg').style.display = 'block';
                return;
            }
            document.getElementById('empty-msg').style.display = 'none';

            let available = pool.filter(t => !historyBuffer.includes(t.name));
            if (available.length === 0) {
                historyBuffer.splice(0, Math.ceil(historyBuffer.length / 2));
                available = pool.filter(t => !historyBuffer.includes(t.name));
            }

            clearTimer();
            isRolling = true;

            const label = document.getElementById('result-label');
            const title = document.getElementById('result-title');
            const desc  = document.getElementById('result-desc');
            const card  = document.getElementById('result-card');

            label.textContent = 'Finding directive…';
            label.style.color = 'rgba(212,175,55,0.9)';

            let count = 0;
            const shuffle = setInterval(() => {
                title.textContent  = pool[Math.floor(Math.random() * pool.length)].name;
                title.className    = 'serif text-2xl shuffling italic px-4';
                desc.textContent   = '· · ·';
                desc.style.opacity = '0.3';

                if (++count > 25) {
                    clearInterval(shuffle);

                    const final = available[Math.floor(Math.random() * available.length)];
                    historyBuffer.push(final.name);
                    if (historyBuffer.length > BUFFER_SIZE) historyBuffer.shift();

                    title.textContent  = final.name;
                    title.className    = 'serif text-3xl text-white font-bold result-reveal';
                    desc.textContent   = final.desc;
                    desc.className     = 'text-[16px] text-slate-400 italic px-6 leading-relaxed result-reveal';
                    desc.style.opacity = '1';
                    label.textContent  = 'Your directive:';
                    label.style.color  = 'rgba(212,175,55,0.5)';

                    card.classList.remove('card-glow');
                    void card.offsetWidth;
                    card.classList.add('card-glow');

                    // Show Begin Task button after reveal settles — user taps when ready
                    const seconds = extractSeconds(final.desc);
                    if (seconds) setTimeout(() => prepareTimer(seconds), 600);

                    isRolling = false;
                }
            }, 60);
        }

        // ── Modals ──
        function toggleDatabase(open) {
            if (open) {
                document.getElementById('db-content').innerHTML = masterVault.map(i => `
                    <div class="border-b border-white/5 pb-3">
                        <h4 class="serif text-white font-bold uppercase text-sm">
                            ${i.name}
                            <span class="text-[9px] text-slate-500 ml-2 tracking-widest">${i.risk}</span>
                        </h4>
                        <p class="text-xs text-slate-400 italic mt-1 leading-relaxed">${i.desc}</p>
                        <p class="text-[9px] text-slate-600 mt-1 tracking-widest uppercase">${i.loc.join(' · ')}</p>
                    </div>
                `).join('');
                document.getElementById('database-overlay').classList.add('open');
            } else {
                document.getElementById('database-overlay').classList.remove('open');
            }
        }

        function toggleRules(open) {
            if (open) {
                document.getElementById('rules-content').innerHTML = rulesOfEngagement.map(r => `
                    <div class="border-b border-white/5 pb-3">
                        <h4 class="serif text-white font-bold uppercase tracking-wider text-sm">${r.name}</h4>
                        <p class="text-xs text-slate-400 italic mt-1 leading-relaxed">${r.desc}</p>
                    </div>
                `).join('');
                document.getElementById('rules-overlay').classList.add('open');
            } else {
                document.getElementById('rules-overlay').classList.remove('open');
            }
        }

        // ── Connection Status ──
        function updateConnectionStatus() {
            const statusElement = document.getElementById('connection-status');
            if (!statusElement) return;
            if (navigator.onLine) {
                statusElement.classList.remove('bg-red-500', 'shadow-[0_0_10px_#ef4444]');
                statusElement.classList.add('bg-green-500', 'shadow-[0_0_10px_#22c55e]');
            } else {
                statusElement.classList.remove('bg-green-500', 'shadow-[0_0_10px_#22c55e]');
                statusElement.classList.add('bg-red-500', 'shadow-[0_0_10px_#ef4444]');
            }
        }

        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        updateConnectionStatus(); // Initial check

        // ── Time Display ──
        function updateTime() {
            const timeElement = document.getElementById('current-time');
            if (!timeElement) return;
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('current-time').textContent = `${hours}:${minutes}`;
        }

        setInterval(updateTime, 1000);
        updateTime();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
