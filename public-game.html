        .serif { font-family: 'Cinzel', serif; }

        @keyframes shuffle-blur {

            justify-content: center;

        .btn-corner {

            height: 50px;

            justify-content: center;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 14px;
            background: rgba(212, 175, 55, 0.08);
            z-index: 50;
            transition: 0.3s all cubic-bezier(0.4, 0, 0.2, 1);

        .btn-corner:active { transform: scale(0.85); background: var(--champagne); }
        .btn-left { left: 1.25rem; }
        .btn-right { right: 1.25rem; }

        .btn-action {

            letter-spacing: 4px;
            font-weight: 900;
            font-size: 14px;

        .btn-discipline {
            background: #0f172a;
            color: var(--punish-red);

            inset: 0;
            background: #01040a;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            overflow-y: auto;
            padding: 2.5rem 2rem;

        .modal-overlay.open { transform: translateY(0); }

        .protocol-item {
