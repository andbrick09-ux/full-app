<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Becca's Sirrender | The Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#051024">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Page-specific layout applied over the global sirender-theme */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* The rest is inherited from styles.css .sirender-theme */
        }

        .container {
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            z-index: 1;
        }

        .pill-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .pill {
            display: block;
            padding: 18px 20px;
            background: rgba(2, 8, 20, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 50px;
            text-decoration: none;
            color: #ccc;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .pill:hover {
            background: var(--luxury-gradient);
            color: var(--midnight);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            font-weight: 700;
            transform: scale(1.02);
        }

        .pill span {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            text-transform: none;
            margin-top: 6px;
            opacity: 0.7;
            letter-spacing: 1px;
            color: inherit;
        }

        .seal-decoration {
            margin-top: 4rem;
            color: var(--gold);
            font-size: 1.5rem;
            opacity: 0.4;
        }
    </style>
</head>
<body class="sirender-theme">

    <div class="container">
        <div class="branding">Becca's Surrender</div>
        <h1>Clarity in Submission</h1>

        <div class="pill-wrapper">
            <a href="scene_menu.html" class="pill">
                Scene Menu
                <span>Set the gaurd rails for Sir so make the perfect scene</span>
            </a>

            <a href="Predicament%20Bondage%20Menu.html" class="pill">
                Predicament Bondage Menu
                <span>Rating Menu for Predicament Bondage Ideas</span>
            </a>

            <a href="public%20play%20menu.html" class="pill">
                Public Play Menu
                <span>Rating Menu for Public Play Ideas</span>
            </a>

            <a href="public-game.html" class="pill">
                Sir's Public Tasks
                <span>Interactive environment directives for public play</span>
            </a>
        </div>

        <div class="seal-decoration">❦</div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('ServiceWorker registration successful');
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
