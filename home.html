<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Becca's Sirrender | The Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight: #051024;
            --paper-dark: #081226;
            --deep-blue: #020814;
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.4);
            --glass: rgba(5, 16, 36, 0.85);
            --border: rgba(212, 175, 55, 0.35);
            --luxury-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #b38728 100%);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--midnight);
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Montserrat', sans-serif;
            color: #f0f0f0;
            overflow: hidden;
        }

        .container {
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            z-index: 1;
        }

        .branding {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            text-align: center;
            background: var(--luxury-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            padding-bottom: 5px;
            letter-spacing: 1px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
            font-style: italic;
            opacity: 0.95;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.6;
        }

        .pill-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .pill {
            display: block;
            padding: 18px 20px;
            background: rgba(2, 8, 20, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 50px;
            text-decoration: none;
            color: #ccc;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .pill:hover {
            background: var(--luxury-gradient);
            color: var(--midnight);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            font-weight: 700;
            transform: scale(1.02);
        }

        .pill span {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            text-transform: none;
            margin-top: 6px;
            opacity: 0.7;
            letter-spacing: 1px;
            color: inherit;
        }

        .seal-decoration {
            margin-top: 4rem;
            color: var(--gold);
            font-size: 1.5rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="branding">Becca's Surrender</div>
        <h1>Clarity in Submission</h1>

        <div class="pill-wrapper">
            <a href="https://andbrick09-ux.github.io/full-app/scene_menu.html" class="pill">
                Scene Menu
                <span>Set the gaurd rails for Sir so make the perfect scene</span>
            </a>

            <a href="https://andbrick09-ux.github.io/full-app/Predicament%20Bondage%20Menu.html" class="pill">
                Predicament Bondage Menu
                <span>Rate Menu for Predicament Bondage Ideas</span>
            </a>

            <a href="https://andbrick09-ux.github.io/full-app/public%20play%20menu.html" class="pill">
                Public Play Menu
                <span>Rate Menu for Public Play Ideas</span>
            </a>
        </div>

        <div class="seal-decoration">❦</div>
    </div>

</body>
</html>
